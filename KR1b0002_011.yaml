body:
  text: 監本纂圖重言重意互注尚書卷第十一周官第二十二周書孔氏傳成王既黜殷命滅淮夷黜殷在周公東征時滅淮夷在成王即政後事相因故連言之還歸在豐作周官成王雖作洛邑猶還西周還音旋徐音全周官言周家設官分職用人之法惟周王撫萬邦巡侯甸即政撫萬國巡行天下侯服甸服行下孟反四征弗庭綏厥兆民四面征討諸侯之不直者所以安其兆民十億曰兆言多六服羣辟罔不承德歸于宗周董正治官六服諸侯奉承周德言協服還歸於豐督正治理職司之百官辟必亦反治直吏反下至冡宰經注同王曰若昔大猷制治于未亂保邦于未危言當順古大道制治安國必于未亂未危之前思患預防之曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯道堯舜考古以建百官內置百揆四嶽象天之有五行外置州牧十二及五國之長上下相維外內咸治言有法長丁丈反下官長助長君長同重意唐虞稽古見堯典舜典大禹皋陶若稽古庶政惟和萬國咸寧官職有序故衆政惟和萬國皆安所以為至治重意萬國咸寧大禹謨萬邦咸寧洛誥冏命萬邦咸休夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要明王立政不惟其官惟其人言聖帝明王立政修教不惟多其官惟在得其人重意不惟其官惟其人咸有一德左右惟其人又下文官不必備惟其人今豫小子祗勤于德夙夜不逮今我小子敬勤於德雖夙夜匪懈不能及古人言自有極逮音代又大計反懈佳賣反重言今豫小子二君奭本篇仰惟前代時若訓迪厥官言仰惟先代之法是順訓蹈其所建官而則之不敢自同堯舜之官準擬夏殷而蹈之立太師太傅太保兹惟三公論道經邦燮理隂陽師天子所師法傳傳相天子保保安天子於德義者此惟三公之任佐王論道以經緯國事和理隂陽言有德乃堪之燮素協反相息亮反官不必備惟其人三公之官不必備貟惟其人有德乃處之處昌慮反少師少傅少保曰三孤此三官名曰三孤孤特也言卑於公尊於卿特置此三者少詩照反下同二公弘化寅亮天地弼豫一人副二三公弘大道化敬信天地之教以輔我一人之治重言弼豫一人二前見泰誓又奉豫一人湯誓豫一人微子之命毗豫一人冡宰掌邦治統百官均四海天官卿稱太宰主國政治統理百官均平四海之內邦國言任大重意統百官說命總百官司徒掌邦教敷五典擾兆民地官卿司徒主國教化布五常之教以安和天下衆民使小大協睦擾而小反徐又音饒重意敷五典君牙弘敷五典舜典愼徽五典宗伯掌邦禮治神人和上下春官卿宗廟官長主國禮治天地神祇人鬼之事及國之吉凶軍賔嘉五禮以和上下尊卑等列司馬掌邦政統六師平邦國夏官卿主戎馬之事掌國征伐統正六軍平治王邦四方國之亂者重意統六師嗣征掌六帥司寇掌邦禁詰姦慝刑暴亂秋官卿主寇賊法禁治姦惡刑強暴作亂者夏司馬計惡助長物秋司寇刑姦順時殺慝吐得反司空掌邦土居四民時地利冬官卿主國空土以居民上農工商四人使順天時分地利授之土能吐生百榖故曰土六卿分職各率其屬以倡九牧阜成兆民六卿各率其屬官大夫士治其所分之職以倡導九州牧伯為政大成兆民之性命皆能其官則政治倡尺亮反下同阜音負治直吏反六年五服一朝五服侯甸男采衛六年一朝㑹京師朝直遙反又六年王乃時巡考制度于四嶽周制十二年一巡守春東夏南秋西冬北故曰時巡考正制度禮法于四嶽之下如虞帝巡守然守音狩下同本亦作狩重意又六年王乃時巡舜典五載一巡守諸侯各朝于方嶽大明黜陟覲四方諸侯各朝于方嶽之下大明考績黜陟之法黜丑律反貶下也重意諸侯各朝于方嶽舜典羣后四朝大明黜陟舜典黜陟幽明王曰嗚呼凡我有官君子欽乃有司慎乃出令令出惟行弗惟反有官君子大夫已上歎而戒之使敬汝所司慎汝出令從政之本令出必惟行之不惟反改若二三其令亂之道上時掌反以公滅私民其允懷從政以公平滅私情則民其信歸之學古入官議事以制政乃不迷言當先學古訓然後入官治政凡制事必以古義議度終始政乃不迷錯度徒洛反其爾典常作之師無以利口亂厥官其汝為政當以舊典常故事為師法無以利口辨佞亂其官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩積疑不决必敗其謀怠惰忽略必亂其政人而不學其猶正牆面而立臨政事必煩蓄勑六反蒞音利又音類戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱此戒凡有官位但言卿士舉其掌事者功髙由志業廣由勤惟能果斷行事乃無後難言多疑必致患斷丁亂反下注同位不期驕祿不期侈貴不與驕期而驕自至冨不與侈期而侈自來驕侈以行己所以速亡恭儉惟德無載爾僞言當恭儉惟以立德無行姦僞作德心逸日休作僞心勞日拙為德直道而行於心逸豫而名日美為僞飾巧百端於心勞苦而事日拙不可為居寵思危罔不惟畏弗畏入畏言雖居貴寵當思危懼無所不畏若乃不畏則入可畏之刑推賢讓能庶官乃和不和政厖賢能相讓俊乂在官所以和諧厖亂也厖武江反舉能其官惟爾之能稱匪其人惟爾不任所舉能修其官亦惟汝之功能舉非其人亦惟汝之不勝其任勝音升王曰嗚呼三事暨大夫敬爾有官亂爾有政歎而勑之公卿巳下各敬居汝所有之官治汝所有之職以佑乃辟永康兆民萬邦惟無斁言當敬治官政以助汝君長安天下兆民則天下萬國惟乃無厭我周德斁音亦長直艮反厭於豔反成王既伐東夷肅愼來賀海東諸夷駒麗扶餘馯貃之屬武王克商皆通道焉成王即政而叛王伐而服之故肅愼氏來賀肅愼馬本作息愼云北夷也駒俱付反又如字麗力支反馯戶旦反地理志音寒貃孟白反說文作貉北方豸種孔子曰貉之言貃貃惡也王俾榮伯作賄肅愼之命榮國名同姓諸侯為卿大夫王使之為命書以幣賄賜肅愼之夷亡俾必爾反馬本作辨周公在豐致政老歸將沒欲葬成周已所營作示始終念之公薨成王葬于畢不敢臣周公故使近文武之墓近附近之近告周公作亳姑周公徙奄君於毫姑因告柩以葬畢之義并及奄君已定亳姑言所遷之功成亡柩其久反君陳第二十三周書孔氏傳周公既沒命君陳分正東郊成周成王重周公所營故命君陳分居正東郊成周之邑里官司君陳鄭注禮記云周公之子作君陳作書命之君陳臣名也因以名篇王若曰君陳惟爾令德孝恭言其有令德善事父母行己以恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施有政令命汝尹兹東郊敬哉正此東郊監殷頑民教訓之監工銜反重意尹兹東郊微子之命尹兹東夏重言敬哉五康誥二洛誥蔡仲之命本篇各一又皋陶謨敬哉有上昔周公師保萬民民懷其德往愼乃司兹率厥常言周公師安天下之民民歸其德今往承其業當愼汝所主此循其常法而教訓之懋昭周公之訓惟民其乂勉明周公之教惟民其治懋音茂我聞曰至治馨香感于神明黍稷非馨明德惟馨所聞上古聖賢之言政治之至者芬芳馨氣動於神明所謂芬芳非黍稷之氣乃明德之馨勵之以德治直吏反下住政治同重言我聞曰六無浼二康誥多土本篇畢命各一重意至治馨香感于神明酒誥弗惟德馨香祀登聞于天吕刑罔有馨香德刑發聞惟腥互注見前蔡仲之命爾尚式時周公之猷訓惟日孜孜無敢逸豫汝庶幾用是周公之道教殷民惟當日孜孜勤行之無敢自寬暇逸豫孜音兹重意惟日孜孜益稷豫思日孜孜凡人未見聖若不克見既見聖亦不克由聖此言凡人有𥘉無終未見聖道如不能得見巳見聖道亦不能用之所以無成爾其戒哉爾惟風下民惟草汝戒勿為凡人之行民從上教而變猶草應風而偃不可不愼行下孟反下德行同應應對之應重言爾其戒哉二前見泰誓圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不先慮其難有所廢有所起出納之事當用汝衆言度之衆言同則陳而布之禁其專繹音亦度待洛反重言圖厥政三多方二本篇一互注記緇衣君陳曰出入自爾師虞庶言同注云言出內政教尚由汝衆之所謀度衆言同乃行之政教當由一也爾有嘉謀嘉猷則入告爾后于內爾乃順之于外汝有善謀善道則入告汝君於內汝乃順行之於外曰斯謀斯猷惟我后之德此善謀此善道惟我君之德善則稱君人臣之義嗚呼臣人咸若時惟良顯哉歎而美之曰臣於人者皆順此道是惟良臣則君顯明於丗重言臣人咸若時皋陶謨咸若時互注記坊記子云善則稱君過則稱己則民作忠君陳曰爾有嘉謀嘉猷入告爾君于內女乃順之于外曰此謀此猷惟我君之德於乎是惟良顯哉注云美君之德王曰君陳爾惟弘周公丕訓無依勢作威無倚法以削汝為政當闡大周公之大訓無乘勢位作威人上無倚法制以行刻削之政寬而有制從容以和寬不失制動不失和德教之治從七容反殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中殷人有罪在刑法者我曰刑之汝勿刑我曰赦宥汝勿宥惟其當以中正平理斷之辟婢亦反下同中如字或丁仲反斷丁亂反重意惟厥中大禹謨允執厥中民協于中吕刑故乃明于刑之中有弗若于汝政弗化于汝訓辟以止辟乃辟有不順於汝政不變於汝教刑之而懲止犯刑者乃刑之狃于姦宄敗常亂俗三細不宥習於姦宄凶惡毀敗五常之道以亂風俗之教罪雖小二犯不赦所以絶惡源狃女九反爾無忿疾于頑無求備于一夫人有頑嚚不喻汝當訓之無忿怒疾之使人當器之無責備于一夫重意無求備于一夫伊訓與人不求備必有忍其乃有濟有容德乃大為人君長必有所含忍其乃有所成有所包容德乃為大欲其忍恥藏垢長誅丈反簡厥修亦簡其或不修簡别其德行修者亦别其有不修者善以勸能惡以沮否别彼列反阻在汝反否方九反又音鄙進厥良以率其或不良進顯其賢良者以率勉其有不良者使為善惟民生厚因物有遷言人自然之性敦厚因所見所習之物有變遷之道故必愼所以示之違上所命從厥攸好人之於上不從其令從其所好故人主不可不愼所好好呼報反爾克敬典在德時乃罔不變允升于大猷汝治人能敬常在道德是乃無不變化其政教則信升于大道惟豫一人膺受多福汝能升大道則惟我一人亦當受其多福無凶危重言惟豫一人二本篇康王之誥又景命惟豫一人無良重意惟豫一人膺受多福畢命豫小子永膺多福其爾之休終有辭於永丗非但我受多福而巳其汝之美名亦終見稱誦於長丗沒而不朽長如字朽許久反顧命第二十四周書孔氏傳成王將崩命召公畢公二公為二伯中分天下而治之治直吏反率諸侯相康王作顧命臨終之命曰顧命相息亮反顧工戶反命馬云成王將崩顧念康王命召公畢公率諸侯輔相之顧命實命羣臣叙以要言惟四月哉生魄王不懌成王崩年之四月始生魄月十六日王有疾故不恱懌懌音亦馬本作不釋云不釋疾不解也重意惟四月哉生魄武成厥四月哉生明康誥惟三月哉生魄甲子王乃洮頮水相𬒳冕服憑玉几王大發大命臨羣臣必齊戒沭浴今疾病故但洮盥頮面扶相者𬒳以冠冕加朝服慿玉几以出命洮他刀反徐音逃馬云洮洮髮也頮音悔說文作沫云古文作頮馬云頮頮面也𬒳皮義反徐扶僞反注同慿皮氷反下同說文作憑云依凡也字林同父氷反齊側皆反盥音管又音灌朝直遙反重言慿玉几二重見篇末乃同召太保奭芮伯彤伯畢公衛侯毛公同召六卿下至御治事太保畢毛稱公則三公矣此先後六卿次第冡宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之司冦第五衛侯為之司空第六毛公領之召芮彤畢衛毛皆國名入為天子公卿奭音釋芮如鋭反彤徒冬反師氏虎臣百尹御事師氏大夫官虎臣虎賁氏百尹百官之長及諸御治事者賁音奔長丁丈反王曰嗚呼疾大漸惟幾自歎其疾大進篤推危殆幾音機徐音畿下同病日臻既彌留恐不獲誓言嗣兹豫審訓命汝病日至言困甚已久留言無瘳恐不得結信出言嗣續我志以此故我詳䉒教命汝瘳勑留反昔君文王武王宣重光奠麗陳教則肄言昔先君文武布其重光纍聖之德定天命施陳教則勤勞重光上直龍反馬云日月星也大極上元十一月朔旦冬至日月如疊璧五星如連珠故曰重光麗力馳反肄徐以至反又音以制反重意宣重光舜典重華協于帝肄不違用克逹殷集大命文武定命陳教雖勞而不違道故能通殷為周成其大命在後之侗敬迓天威嗣守文武大訓無敢昏逾在文武後之侗稚成王自斤敬迎天之威命言奉順繼守文武大教無敢昏亂逾越言戰傈畏懼侗徐音同又勑動反馬本作詷云共也斥昌亦反重意嗣守文武大訓君牙嗣守文武成康遺緒今天降疾殆弗興弗悟爾尚明時朕言今天下疾我身甚危殆不起不悟言必死汝當庶幾明是我言勿忽略用敬保元子釗弘濟于艱難用奉我言敬安太子釗釗康王名大渡於艱難勤德政釗姜遼反又音昭徐之肴反柔逺能邇安勸小大庶邦言當和逺又能和近安小大衆國勸使為善重言柔逺能邇三舜典本篇文侯思夫人自亂於威儀爾無以釗冒貢于非幾羣臣皆冝思夫人夫人自治正於威儀有威可畏有儀可象然後足以率人汝無以釗冒進于非危之事夫人如字注同冒亡報反一音墨馬鄭王作朂貢如字馬鄭王作贑音勑用反馬云陷也兹既受命還此羣臣已受顧命各還本位出綴衣于庭越翼日乙丑王崩綴衣幄帳羣臣既退徹出幄帳於庭王寢於北墉下東首反𥘉生於其明日王崩出如字徐尺遂反綴丁衛反下同王崩馬本作成王崩注云安民立政曰成幄於角反下同墉音容本亦作牖首手又反太保命仲桓南宫毛冡宰攝政故命二臣相毛名俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外臣子皆侍左右將正太子之尊故出於路寢門外使桓毛二臣各執干戈於齊侯吕伋索虎賁百人更新逆門外所以殊之伋為天子虎賁氏俾必爾反伋居及反齊侯名太公子延入翼室恤宅宗明室路寢延之使居憂為天下宗主丁卯命作冊度三日命史為冊書法度傳顧命於康王度舊音杜洛反恐誤注云作冊書法度音冝如字傳直專反越七日癸酉伯相命士須材邦伯為相則召公於丁卯七日癸酉召公命士致材木須待以供喪用相息亮反供音恭狄設黼扆綴衣狄下士扆屏風畫為斧文置户牖間復設幄帳象平生所為黼音甫徐音𥙷扆於豈反屏步經反畫胡卦反牖音酉復扶又反牖間南嚮敷重篾席黼純華玉仍几篾桃枝竹白黑雜繒緣之華彩色華玉以飾慿几仍因也因生時几不改作此見羣臣覲諸侯之坐嚮許亮反篾眠結反馬云纎蒻純之允反又之閏反下同緣恱絹反本或作純西序東嚮敷重砥席綴純文貝仍几東西廂謂之序砥蒻蘋綴雜彩有文之貝飾几此旦夕聽事之坐砥之復反馬云青蒲也蒻音弱蘋音平東序西嚮敷重豐席畫純雕玉仍几豐管彩色為畫雕刻鏤此養國老饗羣臣之坐豐芳弓反管音管又音關鏤來豆反西夾南嚮敷重筍席玄紛純漆仍几西箱夾室之前筍蒻竹玄紛黑綬此親屬私宴之坐故席几質飾夾工洽反徐音頰注同筍息允反馬云箁箬也徐云竹子竹為席于貧反紛孚云反漆音七徐七利反綬音受越玉五重陳寶於東西序坐比列玉五重又陳先王所寶之器物越馬云越地所獻玉也重直容反赤刀大訓弘璧琬琰在西序寶刀赤刀削大訓虞書典謨大璧琬琰之圭為二重琬紆晚反琰以冉反削音笑大玉夷玉天球河圖在東序三玉為三重夷常也球雍州所貢河圗八卦伏犧氏王天下龍馬出河遂則其文以畫八卦謂之河圖及典謨皆歷代傳寶之夷玉馬云越地東夷之美玉說文夷玉即珣玗琪球音求馬云玉磬雍於用反本亦作雍㣧之舞衣大貝鼖鼓在西房㣧國所為舞者之衣皆中法大貝如車渠鼖鼓長八尺商周傳寶之西房西夾坐東鼖扶云反注同中丁仲反車渠上尺遮反車渠車䡃也兊之戈和之弓垂之竹矢在東房兊和古之巧人垂舜共工所為皆中法故亦傳寶之東房東廂夾室兊徒外反共音恭大輅在賔階面綴輅在阼階面大輅玉綴輅金面前皆南向阼才故反向許亮反先輅在左孰之前次輅在右孰之前先輅象次輅木金玉象皆以飾車木則無飾皆在路寢門內左右孰前北面凡所陳列皆象成王生時華國之事所以重顧命孰音孰一音育重直用反二人雀辨執惠立于畢門之內士衛殯與在廟同故雀韋辨惠三隅矛路寢門一名畢門辨皮彥反徐扶變反四人綦辨執戈上刃夾兩階戺綦文鹿子皮辨亦士堂廉曰戺士所立處綦音其馬本作騏云青黑色夾徐工洽反戺音侯徐音士廉力占反稜也一人冕執劉立于東堂一人冕執鉞立于西堂冕皆大夫也劉鉞屬立於東西廂之前堂鉞音越說文云大斧也一人冕執戣立于東垂一人冕執瞿立于西垂戣瞿皆㦸屬正于東西下之階上戣音逵瞿其俱反徐音懼一人冕執鋭立于側階鋭矛屬也側階北下立階上鋭以稅反王麻冕黼裳由賔階隮王及羣臣皆吉服用西階升不敢當主隮子西反徐子詣反重言由賔階隮二重見下文卿士邦君麻冕蟻裳入即位公卿大夫及諸侯皆同服亦廟中之禮蟻裳名色玄蟻魚綺反太保太史太宗皆麻冕彤裳執事各異裳彤纁也太宗上宗即宗伯也太保承介圭上宗奉同瑁由阼階隮大圭尺二寸天子守之故奉以奠康王所以同爵名瑁所以冒諸侯圭以齊瑞信方四寸邪刻之用阼階升由便不嫌瑁莫報反太史秉書由賔階隮御王冊命太史持冊書顧命進康王故同階曰皇后憑玉几道揚末命命汝嗣訓冊命之辭大君成王言憑玉几所道稱揚終命所以感動康王命汝繼嗣其道言任重因以託戒憑皮氷反臨君周邦率循大卞用是道臨君周國率群臣循大法下皮彥反徐扶變反燮和天下用答揚文武之光訓言用和道和天下用對揚聖祖文武之大教叙成王意重意答揚文武之光訓君牙對揚文武之光命王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威言微微我淺末小子其能如父祖治四方以敬忌天威德乎謙辭託不能眇彌小反乃受同瑁王三宿三祭三咤王受瑁為王受同以祭禮成於三故酌者實三爵於王王三進爵三祭酒三奠爵告巳受羣臣所傳顧命咤陟嫁反字亦作宅又音妬徐又音託又豬夜反說文作丁故反奠爵也馬本作詫與說文音義同上宗曰饗祭必受福讃王日饗福酒太保受同降受王所饗同下堂反於篚盥以異同秉璋以酢太保以盥手洗異同實酒秉璋以酢祭半圭曰璋臣所奉玉巳祭太保又祭報祭曰酢酢才各反授宗人同拜王答拜宗人小宗伯佐太宗者大宗供王宗人供太保拜曰巳傳顧命故授宗人同拜王答拜尊所受命供音恭太保受同祭嚌太保既拜而祭既祭受福嚌至齒則王亦至齒王言饗太保言嚌互相備嚌才細反互音護宅授宗人同拜王答拜太保居其所授宗人同拜白成王以事畢王答拜敬所白宅如字馬同徐殆故反重言王答拜二重見下文太保降收太保下堂則王亦可知有司於此盡收徹徹丑列反徐直列反諸侯出廟門俟言諸侯則卿士巳下亦可知殯之所處故曰廟皆待主後命處昌吕反康王之誥第二十五周書孔氏傳康王既尸天子尸主也主天子之正號康王既尸天子馬本此句上更有成王崩三字遂誥諸侯作康王之誥既受顧命羣臣陳戒遂誥報之因事曰遂康王之誥求諸侯之見匡弼王出在應門之內出畢門立應門內之中庭南面太保率西方諸侯入應門左畢公率東方諸侯入應門右二公為二伯各率其所掌諸侯隨其方為位皆北靣皆布乘黃朱諸侯皆陳四黃馬朱鬛以為庭實乘繩證反鬛力輒反賔稱奉圭兼幣曰一二臣衛敢執壤奠賔諸侯也舉奉圭兼幣之辭言一二見非一也為蕃衛故曰臣衛來朝而遇國喪遂因見新王敢執壤地所出而奠贄也壤如丈反見賢遍反下同蕃方袁反朝直遙反喪息浪反贄音至皆再拜稽首王義嗣德答拜諸侯拜送幣而首至地盡禮也康王以義繼先人明德答其拜受其幣盡子忍反重言皆再拜稽首一見下侯甸男衛康誥侯甸男邦采衛酒誥侯甸男衛惟豫一人釗報誥報其戒昔君文武丕平冨不務咎言先君文武道大政化平美不務咎惡重意昔君文武冏命昔在文武砥至齊信用昭明于天下致行至中信之道用顯明於天下言聖德洽砥之履反至齊馬讀絶句則亦有熊羆之士不二心之臣保乂王家言文武既聖則亦有勇猛如熊羆之士忠一不二心之臣共安治王家熊音雄羆彼皮反重意則亦有熊羆之士泰誓如熊如羆用端命于上帝皇天用訓厥道付卑四方君聖臣良用受端直之命於上天大天用順其道付與四方之國王天下卑必利反徐甫至反王于况反乃命建侯樹屏在我後之人言文武乃施政令立諸侯樹以為蕃屏傳王業在我後之人謂子孫今豫一二伯父尚胥暨顧綏爾先公之臣服于先王天子稱同姓諸侯曰伯父言今我一二伯父庶幾相與顧念文武之道安汝先公之臣服於先王而法循之雖爾身在外乃心罔不在王室言雖汝身在外士為諸侯汝心常當忠篤無不在王室熊羆之士勵朝臣此督諸侯用奉恤厥若無遺鞠子羞當各用心奉憂其所行順道無自荒怠遺我稚子之羞辱稚子康王自謂也鞠音菊羣公既皆聽命相揖趨出巳聽誥命趨出罷退諸侯歸國朝臣就次王釋冕反喪服脫去黼冕反服喪服居倚廬去羌吕反監本纂圖重言重意互注尚書卷第十一
