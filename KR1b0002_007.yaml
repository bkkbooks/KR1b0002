body:
  text: 監本纂圖重言重意互注尚書卷第七洪範第六周書孔氏傳武王勝殷殺受立武庚不放而殺紂自焚也武庚紂子以為王者後一名祿父勝商證反祿父下音甫以箕子歸作洪範歸鎬京箕子作之範音范鎬胡老反本又作鄗武王所都也洪範洪大範法也言天地之大法惟十有三祀王訪于箕子商曰祀箕子稱祀不忘本此年四月歸宗周先告武成次問天道重意惟十有三祀泰誓惟十有三年春王乃言曰嗚呼箕子惟天隂騭下民相協厥居隲定也天不言而默定下民是助合其居使有常生之資隂默也馬云覆也騭之逸反馬云升也升猶舉也舉猶生也相協上息亮反助也我不知其彞倫攸敘言我不知天所以定民之常道理次序問何由彞以之反重言彞倫攸敘二並本篇箕子乃言曰我聞在昔鯀堙洪水汨陳其五行堙塞汨亂也治水失道亂陳其五行鯀工本反堙音因汨工匆反五行戶庚反重意汨陳其五行甘誓威侮五行帝乃震怒不卑洪範九疇彞倫攸斁卑與斁敗也天動怒鯀不與大法九疇疇類也故常道所以敗不卑必二反徐甫至反注同與也斁多路反徐同路反敗也重意帝乃震怒泰誓上皇天震怒鯀則殛死禹乃嗣興放鯀至死不赦嗣繼也廢父興子堯舜之道殛紀力反本或作極音同天乃錫禹洪範九疇彞倫攸敘天與禹洛出書神龜負文而出列於背有數至于九禹遂因而第之以成九類常道所以次序錫星歷反𥘉一曰五行九類類一章以五行為始次二曰敬用五事五事在身用之必敬乃善次三曰農用八政農厚也厚用之政乃成農馬云食為八政之首故以農名之次四曰協用五紀協和也和天時使得正用五紀次五曰建用皇極皇大極中也凡立事當用大中之道次六曰乂用三德治民必用剛柔正直之三德次七曰明用稽疑明用卜筮考疑之事次八曰念用庶徴次九曰嚮用五福威用六極言天所以嚮勸人用五福所以威沮人用六極此巳上禹所第敘嚮許亮反又許兩反沮在汝反此巳上時掌反禹所第敘馬云從五行巳下至六極洛書文也漢書五行志以𥘉一巳下皆洛書文也一五行一曰水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性炎榮鉗反上時掌反又如字下同木曰曲直金曰從革木可以揉曲直金可以改更揉如酉反土爰稼穡種曰稼斂曰穡土可以種可以斂潤下作鹹水鹵所生鹹音咸鹵音魯炎上作苦焦氣之味曲直作酸木實之性從革作辛金之氣味稼穡作甘甘味生於百穀五行以下箕子所陳二五事一曰貌容儀貌本亦作貌二曰言詞章三曰視觀正視常止反徐市止反四曰聽察是非五曰思心慮所行思如字徐息吏反下同貌曰恭儼恪儼魚檢反言曰從是則可從視曰明必清審聽曰聰必微諦諦音帝思曰睿必通於微睿恱歲反馬云通也恭作肅心敬從作乂可以治明作晢照了晢之舌反徐丁列反又之丗反聰作謀所謀必成當當丁浪反睿作聖於事無不通謂之聖三八政一曰食勸農業二曰貨寶用物三曰祀敬鬼神以成教四曰司空主空土以居民五曰司徒主徒衆教以禮義六曰司寇王姦盜使無縱縱子用反或作從音同七曰賔禮賔客無不敬八曰師簡師所任必良士卒必練士卒子忽反四五巳罍一曰歲所以紀四時二曰月所以紀一月三曰日紀一日四曰星辰二十八宿迭見以敘氣節十二辰以紀日月所會宿音秀迭田節反見賢遍反五曰曆數曆數節氣之度以為曆敬授民時五皇極皇建其有極大中之道大立其有中謂行九疇之義斂時五福用敷錫厥庶民斂是五福之道以為教用布與衆民使慕之惟時厥庶民于汝極錫汝保極君上有五福之教衆民於君取中與君以安中之善言從化凡厥庶民無有淫朋人無有比德惟皇作極民有安中之善則無淫過朋黨之惡比周之德惟天下皆大為中正比毗志反注同重言凡厥庶民二並本篇凡厥庶民有猷有為有守汝則念之民戢有道有所為有所執守汝則念録敘之不協于極不罹于咎皇則受之凡民之行雖不合於中而不罹於咎惡皆可進用大法受之罹馬力馳反又來多反之行下孟反而康而色曰豫攸好德汝則錫之福汝當安汝顔色以謙下人人曰我所好者德汝則與之爵祿好呼報反下人遐稼反時人斯其惟皇之極不合於中之人汝與之福則是人此其惟大之中言可勉進無虐煢獨而畏髙明煢單無兄弟也無子曰獨單獨者不侵虐之寵貴者不枉法畏之無虐馬本作亡侮煢𡵨扄反畏如字徐云鄭音威人之有能有為使羞其行而邦其昌功能有為之士使進其所行汝國其昌盛其行如字徐不孟反重意而邦其昌仲虺之誥邦乃其昌凡厥正人既富方榖凡其正直之人既當以爵祿富之又當以善道接之重意凡厥正人康誥惟厥正人汝弗能使有好于而家時人斯其辜不能使正直之人有好于國家則是人斯其詐取罪而去于其無好德汝雖錫之福其作汝用咎於其無好德之人汝雖與之爵祿其為汝用惡道以敗汝善其為于偽反無偏無陂遵王之義偏不平陂不正言當循先王之正義以治民陂音祕舊本作頗音普多反無有作好遵王之道無有作惡遵王之路言無有亂為私好惡動必循先王之道路好呼報反惡烏路反注同無偏無黨王道蕩蕩言開闢闢婢亦反互注左襄公三年君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣無黨無偏王道平平言辨治平平婢綿反治直吏反無反無側王道正直言所行無反道不正則王道正直會其有極歸其有極言會其中而行之則天下皆歸其有中矣曰皇極之敷言是彞是訓于帝其訓曰者大其義言以大中之道布陳言教不失是常則人皆是順矣天且其順而况于人乎凡厥庶民極之敷言是訓是行以近天子之光凡其衆民中心之所陳言凡順是行之則可以近益天子之光明以近附近之近曰天子作民父母以為天下王言天子布德惠之教為兆民之父母是為天下所歸往不可不務重意天子作民父母泰誓元后作民父母以為天下王禹謨為天下君六三德一曰正直能正人之曲直二曰剛克剛能立事克馬云勝也三曰柔克和柔能治三者皆德平康正直丗平安用正直治之強弗友剛克友順也丗強禦不順以剛能治之禦魚吕反能治直吏反燮友柔克燮和也丗和順以柔能治之燮息協反沈潛剛克沈潛謂地雖柔亦有剛能出金石髙明柔克髙明謂天言天為剛德亦有柔克不干四時喻臣當執剛以正君君亦當執柔以納臣惟辟作福惟辟作威惟辟玉食言惟君得專威福為美食辟徐輔亦反玉食張晏注漢書云玉食珍食也韋昭云諸侯備珍異之食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒在位不敦平則下民僭差頗普多反僻匹亦反僭子念反忒他得反馬云惡也七稽疑擇建立卜筮人龜日卜蓍曰筮考正疑事當選擇知卜筮人而建立之蓍音尸乃命卜筮建立其人命以其職曰雨曰霽龜兆形有似雨者有似雨止者霽子細反曰蒙蒙隂暗蒙武工反徐亡鉤反曰驛氣落驛不連屬驛音亦注同屬音燭曰克兆相交錯五者卜兆之常法曰貞曰悔內卦曰貞外卦曰悔凡七卜筮之數卜五占用二衍忒立時人作卜筮三人占則從二人之言立是知卜筮人使為卜筮之事夏殷周卜筮各異三法並卜從二人之言善鈞從衆卜筮各三人占用二馬云占筮也衍以淺反汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮將舉事而汝則有大疑先盡汝心以謀慮之次及卿士衆民然後卜筮以決之汝則從龜從筮從卿士從庶民從是之謂大同人心和順龜筮從之是謂大同於吉身其康強子孫其逢吉動不違衆故後丗遇吉逢馬云逢大也汝則從龜從筮從卿士逆庶民逆吉三從二逆中吉亦可舉事卿士從龜從筮從汝則逆庶民逆吉君臣不同決之卜筮亦中吉庶民從龜從筮從汝則逆卿士逆吉民與上異心亦卜筮以決之汝則從龜從筮逆卿士逆庶民逆作內吉作外凶二從三逆龜筮相違故可以祭祀冠婚不可以出師征伐冠官喚反龜筮共違于人皆逆用靜吉用作凶安以守常則吉動則凶八庶徴曰雨曰暘曰燠曰寒曰風曰時雨以潤物暘以乾物暖以長物寒以成物風以動物五者各以其時所以為衆驗暘音陽乾音干暖乃管反以長丁丈反五者來備各以其敘庶草蕃廡言五者備至各以次序則庶草蕃滋廡豐也蕃音煩廡無甫反徐莫柱反一極備凶一極無凶一者備極過甚則凶一者極無不至亦凶謂失時失序曰休徴敘美行之驗美行下孟反曰肅時雨若君行敬則時雨順之曰乂時暘若君行政治則時暘順之治直吏反治其職同曰晢時燠若君能照晢則時燠順之曰謀時寒若君能謀則時寒順之曰聖時風若君能通理則時風順之曰咎徴敘惡行之驗咎其九反曰狂恆雨若君行往妄則常雨順之曰僭恆暘若君行僭差則常暘順之曰豫恆燠若君行逸豫則常暖順之豫羊庶反徐又音舒曰急恆寒若君行急則常寒順之曰蒙恆風若君行蒙暗則常風順之曰王省惟歲王所省職兼所揔羣吏如歲兼四時省息井反卿士惟月卿士各有所掌如月之各有别别彼列反師尹惟日衆正官之吏分治其職如日之有歲月歲月日時無易各順常百榖用成乂用明歲月日時無易則百榖成君臣無易則政治明俊民用章家用平康賢臣顯用國家平寧日月歲時既易是三者巳易喻君臣易職百榖用不成乂用昏不不明俊民用微家用不寧君失其柄權臣擅命治暗賢隱國家亂庶民惟星星有好風星有好雨星民象故衆民惟若星箕星好風畢星好雨亦民所好好呼報反日月之行則有冬有夏日月之行冬夏各有常度君臣政治小大各有常法月之從星則以風雨月經於箕則多風離於畢則多雨政教失常以從民欲亦所以亂九五福一曰壽百二十年二曰冨財豐備三曰康寧無疾病四曰攸好德所好者德福之道五曰考終命各成其短長之命以自終不撗夭撗華孟反又如字六極一曰凶短折動不遇吉短未六十折未三十言辛苦凶馬云終也折時設反又之舌反二曰疾常抱疾苦三曰憂多所憂四曰貧困於財五曰惡醜惡六曰弱尫劣尫烏黃反武王既勝殷邦諸侯班宗彞賦宗廟彞器酒鐏賜諸侯班本又作般音同作分器言諸侯尊卑各有分也亡分器扶問反注同旅􅋙第七周書孔氏傳西旅獻獒西戎逺國貢大犬獒五羔反馬云作豪酋豪也太保作旅獒召公陳戒召公詩照反後召公皆放此旅獒因􅋙而陳道義惟克商遂通道于九夷八蠻四夷慕化貢其方賄九八言非一皆通道路無逺不服賄呼罪反西旅砥貢厥獒西戎之長致貢其獒大髙四尺曰獒以犬為異砥之履反長丁丈反太保乃作旅獒用訓于王陳貢􅋙之義以訓諌王曰嗚呼明王愼德四夷咸賔言明王愼德以懷逺故四夷皆賔服無有逺邇畢獻方物惟服食器用天下萬國無有逺近盡貢其方土所生之物惟可以供服食器用者言不為耳目華侈供音恭為于偽反侈昌氏反重言無有逺邇重見盤庚王乃昭德之致于異姓之邦無替厥服德之所致謂逺夷之貢以分賜異姓諸侯使無廢其職分寶玉于伯叔之國時庸展親以寶玉分同姓之國是用誠信其親親之道人不易物惟德其物言物貴由人有德則物貴無德則物賤所貴在於德易羊質反德盛不狎侮盛德必自敬何狎易侮慢之有易以䜴反狎侮君子罔以盡人心以虛受人則人盡其心矣盡津忍反下同狎侮小人罔以盡其力以恱使民民忘其勞則力盡矣不役耳目百度惟貞言不以聲色自役則百度正玩人喪德玩物喪志以人為戲弄則喪其德以器物為戲弄則喪其志玩五貫反喪息浪反志以道寧言以道接在心為志發氣為言皆以道為本故君子勤道不作無益害有益功乃成不貴異物賤用物民乃足遊觀為無益竒巧為異物言明王之道以德義為益器用為貴所以化俗生民觀官喚反犬馬非其土性不畜非此土所生不畜以不習其用畜許六反珍禽竒獸不育于國皆非所用有損害故不寶逺物則逺人格不侵奪其利則來服矣所寶惟賢則邇人安寶賢任能則近人安近人安則逺人安矣嗚呼夙夜罔或不勤言當早起夜寐常勤於德不矜細行終纍大德輕忽小物積害毀大故君子愼其微行下孟反纍劣偽反為山九仞功虧一簣八尺曰仞喻向成也未成一簣猶不為山故曰功虧一簣是以聖人乾乾日􅉴愼終如始仞音刃字又作刃七尺曰仞虧曲為反簣其貴反向許亮反乾其連反􅉴音側允迪兹生民保厥居惟乃丗王言其能信蹈行此誡則生人安其居天子乃丗丗王天下武王雖聖猶設此誡况非聖人可以無誡乎其不免於過則亦冝矣丗王如字又于况反注同巢伯來朝殷之諸侯伯爵也南方逺國武王克商慕義來朝巢仕交反徐吕交反芮伯作旅巢命芮伯周同姓圻內之國為卿大夫陳威德以命巢亡芮如鋭反圻音祈金縢第八周書孔氏傳武王有疾周公作金縢為請命之書藏之於匱緘之以金不欲人開之縢徒登反緘工咸反金縢遂以所藏為篇名既克商二年王有疾弗豫伐紂明年武王有疾不恱豫豫本又作忬二公曰我其為王穆卜周公曰未可以戚我先王穆敬戚近也召公太公言王疾當敬卜吉凶周公言未可以死近我先王相順之辭為于偽反戚千歷反公乃自以為功周公乃自以請命為己事為三壇同墠因大王王季文王請命於天故為三壇壇築土墠除地大除地於中為三壇璮徒丹反築土也馬云土堂墠音善為壇於南方北面周公立焉立壇上對三王植璧秉圭乃告太王王季文王璧以禮神植置也置於三王之坐周公秉桓圭以為贄告謂祝辭植時職反徐音置贄音至祝如字或之又反下同史乃册祝曰惟爾元孫某遘厲虐疾史為册書祝辭也元孫武王某名臣諱君故曰某厲危虐暴也遘工豆反遇也若爾三王是有丕子之責于天以旦代某之身太子之責謂疾不可救於天則當以旦代之死牛有命不可請代聖人敘臣子之心以垂丗教丕普悲反馬同徐甫眉反鄭音不豫仁若考能多材多藝能事鬼神我周公仁能順父又多材多藝能事鬼神言可以代武王之意乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方汝元孫受命於天庭為天子布其德教以佑助四方言不可以死用能定爾子孫于下地四方之民罔不祗畏言武王用受命帝庭之故能定先人子孫於天下四方之民無不敬畏嗚呼無墜天之降寶命我先王亦永有依歸歎惜武王言不救則墜天之寶命救之則先王長有依歸今我即命于元龜就受三王之命於大龜卜知吉凶爾之許我我其以璧與圭歸俟爾命許謂疾瘳特命當以事神瘳勑留反下同爾不許我我乃屏璧與圭不許謂不愈也屏藏也言不得事神乃卜三龜一習吉習因也以三王之龜卜一相因而吉啓籥見書乃并是吉三兆既同吉開籥見占兆書乃亦并是吉箚茅若反徐以略反馬云藏卜兆書管并必政反公曰體王其罔害公視兆曰如此兆體王其無害言必愈豫小子新命于三王惟永終是圖周公言我小子新受三王之命武王惟長終是謀周之道兹攸俟能念豫一人言武王愈此所以待能念我天子事成周道公歸乃納册于金縢之匱中王翼日乃瘳從壇歸翼明瘳差也差𥘉賣反武王既喪管叔及其羣弟乃流言於國武王死周公攝政其弟管叔及蔡叔霍叔乃放言於國以誣周公以惑成王喪息浪反曰公將不利於孺子三叔以周公大聖有次立之勢遂生流言孺稚也稚子成王孺如樹反周公乃告二公曰我之弗辟我無以告我先王辟法也告召公太公言我不以法法三叔則我無以成周道告我先王辟扶亦反治也説文作璧音必亦反法也馬鄭音避謂避居東都周公居東二年則罪人斯得周公既告二公遂東征之二年之中罪人此得于後公乃為詩以貽王名之曰鴟梟王亦未敢誚公成王信流言而疑周公故周公既誅三監而作詩解所以冝誅之意以遺王王猶未悟故欲讓公而未敢貽羊支反名如字徐亡政反鴟尺夷反梟吁嬌反誚在笑反以遺唯季反秋大熟未穫天大雷電以風二年秋也蒙恆風若雷以威之故有風雷之異穫戶郭反禾盡偃大木斯拔邦人大恐風災所及邦人皆大恐拔皮八反王與大夫盡辨以啓金縢之書皮辨質服以應天辨皮彥反徐扶變反應應對之應乃得周公所自以為功代武王之説所藏請命册書本説如字徐始鋭反二公及王乃問諸史與百執事二公倡王啓之故先見書史百執事皆從周公請命倡昌亮反皆從才用反又如字對曰信噫公命我勿敢言史百執事言信有此事周公使我勿道今言之則負周公噫恨辭噫於其反馬本作懿猶憶也王執書以泣曰其勿穆卜本欲敬卜吉凶今天意可知故止之昔公勤勞王家惟豫沖人弗及知言巳幼童不及知周公昔日忠勤沖直中反重意昔公勤勞王家武成王季其勤王家惟豫沖人弗及知大誥肆豫沖人永思艱今天動威以彰周公之德發雷風之威以明周公之聖德惟朕小子其新逆我國家禮亦冝之周公以成王未寤故留東未還改過自新遣使者迎之亦國家禮有德之冝新逆馬本作親迎遣使所吏反王出郊天乃雨反風禾則盡起郊以玉幣謝天天即反風起禾明郊之是重意天乃雨反風舜典烈風雷雨弗迷二公命邦人凡大木所偃盡起而築之歲則大熟木有偃拔起而立之築有其根桑果無虧百榖豐熟周公之德此巳上大誥後因武王喪并見之築音竹本亦作築謂築其根馬云築拾也見賢遍反大誥第九周書孔氏傳武王崩三監及淮夷叛三監管蔡商淮夷徐奄之屬皆叛周監古懴反視也周公相成王將黜殷作大誥相謂攝政黜絶也將以誅叛者之義大誥天下相息亮反注同大誥陳大道以誥天下遂以名篇誥本亦作靠王若曰猷大誥爾多邦越爾御事周公稱成王命順大道以告天下衆國及於御治事者盡及之猷音由道也馬本作大誥繇爾多邦盡津忍反重言越爾御事三本篇二下篇一弗弔天降割于我家不少言周道不至故天下凶害於我家不少謂三監淮夷並作難弔音的又如字割馬本作害不少朱氏依馬讀不少延為句難乃旦反重言弗弔重見多士君奭延洪惟我幼沖人凶害延大惟纍我幼童人成王言其不可不誅之意纍劣偽反嗣無疆大歷服弗造哲迪民康言子孫承繼祖考無窮大數服行其政而不能為智道以安人故使叛先自責矧曰其有能格知天命安人且猶不能况其有能至知天命者乎矧失忍反巳豫惟小子若涉淵水豫惟往求朕攸濟已發端歎辭也我惟小子承先人之業如涉淵水往求我所以濟渡言祗懼重言巳豫惟小子本篇二康誥巳汝惟小子又洛誥巳汝惟沖子重意若涉淵水微子若涉大水君奭若遊大川敷賁敷前人受命兹不忘大功前人文武也我求濟渡在布行賢者有十大來翼佐我周用撫安武事謀立其功言人事先應敉亡婢反應應對之應我有大事休朕卜并吉大事戎事也人謀既從卜又并吉所以為美并必政反注及篇末同肆豫告我友邦君越尹氏庶士御事以美故告我友國諸侯及於正官尹氏卿大夫衆士御治事者言謀及之曰豫得吉卜豫惟以爾庶邦于伐殷逋播臣用汝衆國往伐殷逋亡之臣謂祿父逋布吾反爾庶邦君越庶士御事罔不反曰艱大汝衆國上下無不反曰征伐四國為大難敘其情以戒之重言爾庶邦君二並本篇民不靜亦惟在王宫邦君室言四國不安亦在天子諸侯教化之過自責不能綏近以及逺越豫小子考翼不可征王害不違卜於我小子先卜敬成周道若謂今四國不可征則王室有害故冝從卜肆豫沖人永思艱曰嗚呼允蠢鰥寡哀哉故我童人成王長思此難而歎曰信蠢動天下使無妻無夫者受其害可哀哉鰥故頑反重意肆豫沖人永思艱金縢惟豫沖人弗及知豫造天役遺大投艱于朕身我周家為天下役事遺我甚大投此艱難於我身言不得巳造為也馬云遺也越豫沖人不卬自恤義爾邦君越爾多士尹氏御事言征四國於我童人不惟自憂而巳乃欲施義於汝衆國君臣上下至御治事者卬五剛反我也綏豫曰無毖于恤不可不成乃寧考圖功汝衆國君臣當安勉我曰無勞於憂不可不成汝寧祖聖考文武所謀之功責其以善言之助毖音祕巳豫惟小子不敢替上帝命不敢廢天命言卜吉當必征之重言巳豫惟小子二並本篇又康誥巳汝惟小子洛誥巳汝惟沖子天休于寧王興我小邦周寧王惟卜用克綏受兹命言天美文王興周者以文王惟卜之用故能安受此天命明卜冝用今天其相民矧亦惟卜用人獻十夫是天助民况亦用卜乎吉可知矣亦言文王相息亮反嗚呼天明畏弼我丕丕基歎天之明德可畏輔成我大大之基業言卜不可違也畏如字徐音威重言天明畏三臯陶本篇多士重意弼我丕丕基立政以並受此丕丕基王曰爾惟舊人爾丕克逺省爾知寧王若勤哉特命久老之人知文王故事者大能逺省識古事汝知文王若彼之勤勞哉目所親見法之又明省息井反天閟毖我成功所豫不敢不極卒寧王圖事閟愼也言天愼勞我周家成功所在我不敢不極盡文王所謀之事謂致太平閟音祕肆豫大化誘我友邦君我欲極盡文王所謀故大化天下道我友國諸侯天棐忱辭其考我民言我周家有大化誠辭為天所輔其成我民矣棐徐音匪又芳鬼反忱市林反豫曷其不于前寧人圖功攸終我何其不於前文王安人之道謀立其功所終乎天亦惟用勤毖我民若有疾天亦勞愼我民欲安之如人有疾欲己去之重言若有疾二本篇康誥豫曷敢不于前寧人攸受休畢天欲安民我何敢不於前文王所受美命終畢之王曰若昔朕其逝朕言艱日思順古道我其往東征矣我所言國家之難備矣日思念之日人實反難乃旦反下為難同若考作室既砥法厥子乃弗肯堂矧肯構以作室喻治政也父巳致法子乃不肯為堂基况肯構立屋乎不為其易則難者可知底之履反構古候反治直吏反厥父災厥子乃弗肯播矧肯穫又以農喻其父巳災耕其田其子乃不肯播種况肯收穫乎災側其反草也田一歲曰災穫戶郭反重意厥父災厥子乃弗肯播矧肯穫無逸厥父母勤勞稼穡厥子乃不知稼穡之艱難厥考翼其肯曰豫有後弗棄基其父敬事創業而子不能繼成其功其肯言我有後不棄我基業乎今不征是棄之肆豫曷敢不越卬敉寧王大命作室農人猶惡棄基故我何敢不於今日撫循文王大命以征逆乎惡烏路反若兄考乃有友伐厥子民養其勸弗救若兄弟父子之家乃有明友來伐其子民養其勸心不救者以子惡故以此四國將誅而無救者罪大故王曰嗚呼肆哉爾庶邦君越爾御事歎今伐四國必克之故以告諸侯及臣下御治事者重言爾庶邦君二並本篇越爾御事三本篇二後篇一爽邦由哲亦惟十人迪知上帝命言其故有明國事用智道十人蹈知天命謂人獻十夫來佐周越天棐忱爾時罔敢易法矧今天降戾于周邦於天輔誠汝天下是知無敢易天法况今天下罪於周使四國叛乎重意越天棐忱康誥天畏棐忱君奭若天棐忱惟大艱人誕鄰胥伐于厥室爾亦不知天命不易惟大為難之人謂三叔也大近相伐於其室家謂叛逆也若不早誅汝天下亦不知天命之不易也易以䜴反重言天命不易重見君奭豫永念曰天惟喪殷若穡夫豫曷敢不終朕畒稼穡之夫除草養苗我長念天亡殷惡主亦猶是矣我何敢不順天終竟我壟畒乎言當滅殷壟力勇反天亦惟休于前寧人豫曷其極卜敢弗于從天亦惟美于文王受命我何其極卜法敢不於從言必從也率寧人有指疆土矧今卜并吉循文王所有指意以安疆土則善矣况今卜并吉乎言不可不從重意矧今卜并吉本篇朕卜并吉金縢乃并是吉肆朕誕以爾東征天命不僭卜陳惟若兹以卜吉之故大以汝衆東征四國天命不僭差卜兆陳列惟若此吉必克之不可不勉僭子念反微子之命第十周書孔氏傳成王既黜殷命殺武庚一名祿父命微子啓代殷後啓知紂必亡而奔周命為宋公為湯後作微子之命封命之書微子之命稱其本爵以名篇王若曰猷殷王元子微子帝乙元子故順道本而稱之惟稽古崇德象賢惟考古典有尊德象賢之義言今法之重意惟稽古見堯典崇德象賢武成崇德報功統承先王修其禮物言二王之後各修其典禮正朔服色與時王並通三統正音政作賔于王家與國咸休永丗無窮為時王賔客與時皆美長丗無竟嗚呼乃祖成湯克齊聖廣淵言汝祖成湯能齊德聖逹廣大深逺澤流後世重意克齊聖廣淵冏命聰明齊聖皇天眷佑誕受厥命大天眷顧湯佑助之大受其命謂天命重言皇天眷佑二泰誓中本篇大禹謨皇天眷命誕受厥命重見康誥撫民以寬除其邪虐撫民以寬政放桀邪虐湯之德功加于時德垂後裔言湯立功加於當時德澤垂及後世裔末也裔以制反重意德垂後裔仲虺垂𥙿後昆爾惟踐修厥猷舊有令聞汝微子言能踐湯德久有善譽昭聞逺近令聞如字又音問恪愼克孝肅恭神人豫嘉乃德曰篤不忘言微子敬愼能孝嚴恭神人故我善汝德謂厚不可忘篤本又作笁東谷反上帝時歆下民祗協庸建爾于上公尹兹東夏孝恭之人祭祀則神歆享施令則人敬和用是封立汝於上公之位正此東方華夏之國宋在京師東歆許今反重意尹兹東夏君奭尹兹東郊欽哉往敷乃訓愼乃服命率由典常以蕃王室敬哉敬其為君之德往臨人布汝教訓愼汝祖服命數循用舊典無失其常以蕃屏周室戒之蕃方元反本又作藩重言欽哉八堯典禹謨本篇景命各一舜典益稷二以蕃王室二本篇蔡仲之命弘乃烈祖律乃有民永綏厥位毗豫一人大汝烈祖成湯之道以法度齊汝所有之人則長安其位以輔我一人言上下同榮慶毗房脂反重意永綏厥位文侯之命永綏在位毗豫一人泰誓周官弼豫一人丗丗享德萬邦作式言微子纍丗享德不忝厥祖雖同公侯而特為萬國法式俾我有周無斁汝丗丗享德則使我有周好汝無厭俾必爾反斁音亦好呼報反厭於豔反嗚呼往哉惟休無替朕命歎其德遣往之國言當惟為美政無廢我命重言往哉七舜典二盤庚本篇康誥畢命文侯之命各一唐叔得禾異畒同頴唐叔成王母弟食邑內得異禾也畒壟頴穗也禾各生一壟而合為一穗頴役領反穗似醉反本亦作遂獻諸天子拔而貢之王命唐叔歸周公于東異畒同頴天下和同之象周公之德所致周公東征未還故命唐叔以禾歸周公唐叔後封晉作歸禾亡周公既得命禾旅天子之命巳得唐叔之禾遂陳成王歸禾之命而推美成王善則稱君作嘉禾天下和同政之善者故周公作書以嘉禾名篇告天下亡監本纂圖重言重意互注尚書卷第七
