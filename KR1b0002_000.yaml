body:
  text: 尚書序釋文此孔氏所作述尚書起之時代并敘為注之由故相承講之今依舊為音古者伏犧氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉釋文伏羲氏伏古作宓犧本又作羲亦作戲許皮反説文云賈侍中説此犧非古字張揖字詁云羲古字戲今字氏一號庖羲氏三皇之最先風姓母曰華胥以木德王即太皥也王于况反畫乎麥反卦俱賣反契苦計反書者文字契者刻木而書其側故曰書契也一云以書契約其事也鄭玄云以書書木邊言其事刻其木謂之書契也結繩易繫辭云上古結繩以治後丗聖人易之以書契文文字也籍籍書伏犧神農黃帝之書謂之三墳言大道也釋文神農炎帝也薑姓母曰女登以火德王三皇之二也黃帝軒轅也姬姓少典之子母曰附寶以土德王三皇之三也史記云姓公孫名軒轅一號有熊氏墳扶云反大也少昊顓頊髙辛唐虞之書謂之五典言常道也釋文少詩照反昊胡老反少昊金天氏名摯字胥陽一曰玄嚻己姓黃帝之子母曰女節以金德王五帝之最先顓音專頊許玉反顓頊髙陽氏姬姓黃帝之孫昌意之子母曰景僕謂之女樞以水德王五帝之二也髙辛帝嚳也姬姓嚳口毒反母曰不見以木德王五帝之三也唐帝堯也姓伊耆氏堯初為唐侯後為天子都陶故號陶唐氏帝嚳之子帝摯之弟母曰慶都以火德王五帝之四也虞帝舜也姓姚氏國號有虞顓頊六丗孫瞽瞍之子母曰握登以土德王五帝之五也先儒解三皇五帝與孔不同並見發題至于夏商周之書雖設教不倫雅誥奧義其歸一揆是故歷代寶之以為大訓釋文夏禹天下號也以金德王三王之最先商湯天下號也亦號殷以水德王三王之二也周文王武王有天下號也以木德王三王之三也誥故報反告也示也奧烏報反深也揆葵癸反度也八卦之説謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上丗帝王遺書也釋文八索所白反下同求也徐音素本或作素左史史官在左倚於綺反劉琴綺反相息亮反倚相楚靈王時史官也先君孔子生於周末覩史籍之煩文懼覽之者不一遂乃定禮樂明舊章刪詩為三百篇約史記而修春秋讃易道以黜八索述職方以除九丘討論墳典斷自唐虞以下訖于周芟夷煩亂翦截浮辭舉其宏綱撮其機要足以垂丗立教釋文刪色姦反斷丁亂反訖居乙反又許乙反芟色咸反翦咨淺反撮七活反機本又作幾典謨訓誥誓命之文凡百篇所以恢洪至道示人主以軌範也釋文典凡十五篇正典二攝十三十一篇亡謨莫胡反凡三篇正二攝一訓凡十六篇正二篇亡攝十四三篇亡誥凡三十八篇正八攝三十十八篇亡誓市制反凡十篇正八攝二一篇亡命凡十八篇正十二三篇亡攝六四篇亡恢苦回反大也帝王之制坦然明白可舉而行三千之徒並受其義釋文坦他但反及秦始皇滅先代典籍焚書坑儒天下學士逃難解散釋文始皇名政二十六年𥘉并六國自號始皇帝焚詩書在始皇之三十四年坑儒在三十五年坑苦庚反難乃旦反解音蟹我先人用藏其家書于屋壁漢室龍興開設學校旁求儒雅以闡大猷釋文校戶教反詩箋云鄭國謂學為校闡尺善反大也明也濟南伏生年過九十失其本經口以傳授裁二十餘篇以其上古之書謂之尚書百篇之義丗莫得聞釋文濟子禮反郡名也伏生名勝過古卧反後同傳直專反下傳之同二十餘篇即馬鄭所注二十九篇是也至魯共王好治宫室壞孔子舊宅以廣其居釋文共音恭亦作龔又作恭共王漢景帝之子名餘好呼報反下好古同壞音怪下同字林作敷云公壞反毀也於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字釋文傳謂春秋也一云周易十翼非經謂之傳論如字又音倫科苦禾反科斗蟲名蝦蟇子書形似之王又升孔子堂聞金石絲竹之音乃不壞宅悉以書還孔氏科斗書廢巳久時人無能知者以所聞伏生之書考論文義定其可知者為隸古定更以竹簡寫之增多伏生二十五篇隸音麗謂用隸書寫古文二十五篇謂虞書大禹謨夏書五子之歌㣧征商書仲虺之誥湯誥伊訓太甲三篇咸有一德説命三篇周書泰誓三篇武成旅􅋙微子之命蔡仲之命周官君陳畢命君牙冏命伏生又以舜典合於堯典益稷合於皋陶謨盤庚三篇合為一康王之誥合於顧命合舊音閣又如字下同皋音髙本又作咎陶音遙本又作繇盤步干反又作般復出此篇并序凡五十九篇為四十六卷復扶又反下同五十九篇即今所行五十八篇其一是百篇之序其餘錯亂摩滅弗可復知謂虞書汨作九共九篇稿飫夏書帝告釐沃湯征汝鳩汝方商書夏社疑至臣扈典寶明居肆命徂后沃丁咸乂四篇伊陟原命仲丁河亶甲祖乙髙宗之訓周書分器旅巢命歸禾嘉禾成王政將蒲姑賄肅慎之命亳姑凡四十二篇亡悉上送官藏之書府以待能者承詔為五十九篇作傳上時掌反為于偽反於是遂研精覃思博考經籍採托羣言以立訓傳約文由義敷暢厥旨庶幾有輔於將來覃徒南反深也思息嗣反採本又作采托之石反又之若反敷芳夫反暢音悵書序序所以為作者之意昭然義見冝相附近故引之各冠其篇首為于偽反又如字見賢遍反定五十八篇既畢會國有巫蠱事經籍道息用不復以聞傳之子孫以貽後代若好古博雅君子與我同志亦所不隱也巫蠱漢武帝末征和中江充造蠱敗戾太子故經籍道息焉巫音無蠱音古貽以之反遺也尚書序
