body:
  text: 監本纂圖重言重意互註尚書卷第十君奭第十八周書孔氏傳召公爲保周公爲師相成王爲左右召公不說周公作君奭君奭尊之曰君奭名同姓也陳古以告之故以名篇爲保太保也爲師大師也馬云保氏師氏皆大夫官相息亮反左右馬云分陜爲二伯東爲左西爲右說音恱奭始亦反召公名周公若曰君奭順古道呼其名而告之弗弔天降䘮于殷殷旣墜厥命我有周旣受言殷道不至故天下䘮亡於殷殷巳墜失其王命我有周道至巳受之弔音的重言弗弔三本篇大誥多士我不敢知曰厥基永孚于休若天棐忱廢興之迹亦君所知言殷家其始長信於美道順天輔誠所以國也棐音匪又芳鬼反忱市林反重言我不敢知六召誥四本篇二重意若天棐忱大誥越天棐忱康誥天畏棐忱我亦不敢知曰其終出于不祥言殷紂其終墜厥命以出於不善之故亦君所知終馬本作崇云充也嗚呼君巳曰時我我亦不敢寜于上帝命歎而言曰君巳當是我之留我亦不敢安于上天之命故不敢不留巳音以弗永逺念天威越我民罔尤違言君不長逺念天之威而勤化於我民使無過違之闕惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知惟衆人共存在我後嗣子孫若大不能恭承天地絶失先王光大之道我老在家則不得知遏於葛反徐音謁絶反佚音逸天命不易天難諶乃其墜命弗克經歷天命不易天難信無德者乃其墜失王命不能經乆歷逺不可不愼易以䜴反注同諶氏壬反重言天命不易二本篇大誥天難諶二本篇咸有一德嗣前人恭明德在今予小子旦繼先王之大業恭奉其明德正在今我小子旦言異於餘臣非克有正迪惟前人光施于我冲子我留非能有改正但欲蹈行先王光大之道施政于我童子童子成王又曰天不可信我道惟寜王德延無德去之是天不可信故我以道惟安寜王之德謀欲延乆我道馬本作我迪去如字又起吕反天不庸釋于文王受命言天不用令釋廢於文王所受命故我留佐成王公曰君奭我聞在昔成湯旣受命巳放桀受命爲天子時則有若伊尹格于皇天尹摯佐湯功至大天謂致太平摯音至重言格于皇天二前見說命下文格于上帝在太甲時則有若保衡太甲繼湯時則有如此伊尹爲保衡言天下所取安所取平在太戊太甲之孫時則有伊陟臣扈格于上帝巫咸乂王家伊陟臣扈率伊尹之職使其君不隕祖業故至天之功不隕巫咸治王家言不及二臣隕于敏反在祖乙時則有若巫賢祖乙殷家亦祖其功時賢臣有如此巫賢賢咸子巫氏在武丁時則有若甘盤髙宗即位甘盤佐之後有傳說說音恱率惟兹有陳保乂有殷故殷禮陟配天多歷年所言伊尹至甘盤六臣佐其君循惟此道有陳列之功以安治有殷故殷禮能升配天享國乆長多歷年所治直吏反下同重言保乂有殷見下文天惟純佑命則商實百姓殷禮配天天惟大佑助其王命使商家百姓豐實皆知禮節王人罔不秉德明恤小臣屏侯甸自湯至武丁其王人無不持德立業明憂其小臣使得其人以爲藩屏侯甸之服小臣且憂得人則大臣可知屏賔領反矧咸奔走惟兹惟德稱用乂厥辟王猶秉德憂臣况臣下得不皆奔走惟王此事惟有德者舉用治其君事辟必亦反故一人有事于四方若卜筮罔不是孚一人天子也君臣務德故有事於四方而天下化服如卜筮無不是而信之公曰君奭天壽平格保乂有殷有殷嗣天滅威言天壽有平至之君故安治有殷有殷嗣子紂不能平至天㓕亡加之以威今汝永念則有固命厥亂明我新造邦今汝長念平至者安治反是者滅亡以爲法戒則有堅固王命其治理足以明我新成國矣公曰君奭在昔上帝割申勸寜王之德其集大命于厥躬在昔上天割制其義重勸文王之德故能成其大命於其身謂勸德以受命重直庸反互註記緇衣君奭曰昔在上帝周田觀文王之德其集大命於厥躬注云言文王有誠信之德天蓋申勸之集大命於其身謂命之使王天下也惟文王尚克修和我有夏亦惟有若虢叔有若閎夭文王庶幾能修政化以和我所有諸夏亦惟賢臣之助爲治有如此虢閎閎氏虢國叔字文王弟夭名虢寡白反徐公百反閎音宏夭於表反徐於驕反有若散冝生有若泰顚有若南宫括散泰南宫皆氏冝生顚括皆名凡五臣佐文王爲胥附奔走先後禦侮之任散素但反顚丁田反又音田南宫括工活反南宫氏括名也馬本作南君胥附毛詩作䟽附傳曰率下親上曰䟽附鄭箋云䟽附使䟽者親也奔走奔又作本走又作奏音同詩傳云喻德宣譽曰奔奏鄭箋云奔走使人歸趣先後上悉薦反下戸豆反毛詩傳云相導前後曰先後禦侮詩傳云武臣折衝曰禦侮又曰無能往來兹迪彞教文王蔑德降于國人有五賢臣猶曰其少無所能往來而五人以此道法教文王以精微之德下政令於國人言雖聖人亦須良佐蔑徐亡結反亦惟純佑秉德迪知天威乃惟時昭文王文王亦如殷家惟天所大佑文王亦秉德蹈知天威乃惟是五人明文王之德迪見冒聞于上帝惟時受有殷命哉言能明文王德蹈行顯見覆冒下民彰聞上天惟是故受有殷之王命見賢遍反注同冒莫報反下同馬作勗勉也聞音問或如字重言聞于上帝本篇康誥武王惟兹四人尚迪有禄文王没武王立惟此四人庶幾輔相武王蹈有天禄虢叔先死故曰四人相息亮反後曁武王誕將天威咸劉厥敵言此四人後與武王皆殺其敵謂誅紂重意誕將天威泰誓上肅將天威惟兹四人昭武王惟冒丕單稱德惟此四人明武王之德使布冒天下大盡舉行其德今在予小子旦若游大川予往曁汝奭其濟小子同未在位誕無我責我新還政今任重在我小子旦不能同於四人若游大川我往與汝奭其共濟渡成王同於未在位即政時汝大無非責我留重意若游大川微子若渉大水大誥若渉淵水収罔朂不及耇造德不降我則鳴鳥不聞矧曰其有能格今與汝留輔成王欲収教無自勉不及道義者立此化而老成德不降意爲之我周則鳴鳯不得聞况曰其有能格于皇天乎造才老反一音七到反鳴鳥馬云鳴鳥謂鳯凰也本或作鳴鳯者非公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱以朝臣無能立功至天故其當視於此我周受命無窮惟美亦大惟艱難不可輕忽謂之易治朝直遥反易以豉反重意我受命無疆惟休召誥惟王受命無疆惟休太甲實萬丗無疆之休告君乃猷𥙿我不以後人迷告君汝謀寛饒之道我留與汝輔王不用後人迷惑故欲教之公曰前人敷乃心乃悉命汝作汝民極前人文武布其乃心爲法度乃悉以命汝矣爲汝民立中正矣爲汝于僞反曰汝明勗偶王在亶乗兹大命汝以前人法度明勉配王在於誠信行此大命而巳亶丁但反惟文王德丕承無疆之恤惟文王聖德爲之子孫無忝厥祖大承無窮之憂公曰君告汝朕允告汝以我之誠信保奭其汝克敬以予監于殷䘮大否呼其官而名之勑使能敬以我言視於殷䘮亡大否言其大不可不戒䘮息浪反否方九反肆念我天威予不允惟若兹誥予惟曰襄我二人以殷䘮大故當念我天德可畏言命無常我不信惟若此誥我惟曰當因我文武之道而行之汝有合哉言曰在時二人天休滋至惟時二人弗戡言汝行事動當有所合哉發言常在是文武則天美周家日益至矣惟是文武不勝受言多福戡音堪勝音升其汝克敬德明我俊民在讓後人于丕時其汝能敬行德明我賢人在禮讓則後代將於此道大且是嗚呼篤棐時二人我式克至于今日休言我厚輔是文武之道而行之我用能至于今日其政羙我咸成文王功于不怠丕冐海隅出日罔不率俾今我周家皆成文王功于不懈怠則德教大覆冐海隅日所出之地無不循化而使之俾必耳反懈佳賣反重言罔不率俾二本篇武成公曰君予不惠若兹多誥予惟用閔于天越民我不順若此多誥而巳欲使汝念躬行之閔勉也我惟用勉於大道加於民公曰嗚呼君惟乃知民德亦罔不能厥𥘉惟其終惟汝所知民德亦無不能其𥘉鮮能有終惟其終則惟君子戒召公以慎終鮮息淺反重意惟其終下篇惟厥終祗若兹往敬用治當敬順我此言自今以往敬用治民職事蔡仲之命第十九周書孔氏傳蔡叔旣没以罪放而卒王命蔡仲踐諸侯位成王也父卒命子罪不相及作蔡仲之命冊書命之蔡仲之命蔡國名仲字因以名篇惟周公位冡宰正百工百官緫巳以聽冢宰謂武王崩時羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乗致法謂誅殺囚謂制其出入郭鄰中國之外地名從車七乗言少管蔡國名辟婢亦反徐扶亦反乗䋲證反從才用反降霍叔于庻人三年不齒罪輕故退爲衆人三年之後乃齒録封爲霍侯子孫爲晉所㓕蔡仲克庸祗德周公以爲卿士蔡仲能用敬德稱其賢也明王之法誅父用子言至公周公圻内諸侯二卿治事圻巨依反下同叔卒乃命諸王邦之蔡叔之所封圻内之蔡仲之所封淮汝之間圻内之蔡名巳㓕故取其名以名新國欲其戒之王若曰小子胡言小子明當受教訓胡仲名順其事而告之重言小子胡二本篇惟爾率德改行克慎厥猷言汝循祖之德改父之行能愼其道歎其賢行下孟反肆予命爾侯于東土往即乃封敬哉以汝率德改行之故故我命汝爲諸侯於東土往就汝所封之國當修已以敬哉封如字徐音甫用反重言敬哉五康誥二洛誥本篇君陳各一爾尚蓋前人之愆惟忠惟孝汝當庻幾修德掩蓋前人之過子能蓋父所以爲惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後汝乃行善迹用汝身使可蹤迹而法循之能勤無懈怠以垂法子孫丗丗稱頌乃當我意率乃祖文王之彛訓無若爾考之違王命言當循文武之常教以父違命爲丗戒重意率乃祖文王之彛訓太甲率乃祖之攸行君牙率乃祖考之攸行皇天無親惟德是輔民心無常惟惠之懷天之於人無有親踈惟有德者則輔佐之民心於上無有常主惟愛己者則歸之重意皇天無親止惟惠之懷太甲下皇天無親克敬惟親民罔常懷懷于有仁互注左僖公五年晉侯復假道於虞以伐虢宫之竒諫云云公曰吾享祀豐㓗神必據我對曰臣聞之鬼神非人是親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德其物如是則非德民不和神不享矣神所慿依將在德矣爲善不同同歸于治爲惡不同同歸于亂言人爲善爲惡各有百端未必正同而治亂所歸不殊冝慎其微治直吏反重意爲善止于亂大甲下與治同道罔不興與亂同事罔不亡爾其戒哉慎厥𥘉惟厥終終以不困不惟厥終終以困窮汝其戒治亂之機哉作事云爲必慎其𥘉念其終則終用不困窮重言爾其戒哉二本篇君陳重意惟厥終君奭惟其終懋乃攸績睦乃四鄰以蕃王室以和兄弟勉汝所立之功親汝四鄰之國以蕃屏王室以和協同姓之邦諸侯之道懋音茂蕃芳元反注同重言以蕃王室又見微子之命康濟小民率自中無作聦明亂舊章汝爲政當安小民之居成小民之業循用大中之道無敢爲小聦明作異辯以變乱舊典文章詳乃視聽罔以側言改厥度則予一人汝嘉詳審汝視聽非禮義勿視聽無以邪巧之言易其常度必亂主所任任同已者乃胥惟虐于民至于百爲大不克開桀之衆士乃相與惟暴虐於民至於百端所爲言虐非一大不能開民以善言與桀合志乃惟成湯克以爾多方簡代夏作民主乃惟成湯能用汝衆方之賢大代夏政爲天下民主愼厥麗乃勸厥民刑用勸湯愼其施政於民民乃勸善其人雖刑亦用勸善言政刑清以至于帝乙罔不明德愼罰亦克用勸言自湯至于帝乙皆能成其王道畏愼輔相無不明有德愼去刑罰亦能用勸善相息亮反去羌吕反重言亦克用勸三見下文重意以至于帝乙罔不明德愼罰多士自成易至于帝乙罔不明德恤祀要囚殄戮多罪亦克用勸開釋無辜亦克用勸帝乙巳上要祭囚情絶戮衆罪亦能用勸善開放無罪之人必無枉縱亦能用勸善要一遥反又一妙反注同殄亭遍反上時掌反今至于爾辟弗克以爾多方享天之命今至于汝君謂紂不能用汝衆方享天之命故誅滅之辟必亦反重言享天之命二見下文嗚呼王若曰誥告爾多方非天庸釋有夏歎而順其事以告汝衆方非天用釋棄桀桀縱惡自棄故誅放非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭非天用棄有殷乃惟汝君紂用汝衆方大爲過惡者共謀天之命惡事盡有辭說布在天下故見誅滅乃惟有夏圖厥政不集于享天降時䘮有邦間之更說桀也言桀謀其政不成于享故天下是䘮亡以禍之使天下有國聖人代之言有國明皇天無親佑有德間間厠之間重言圗厥政三本篇二君陳一乃惟爾商後王逸厥逸後王紂逸豫其過逸言縱恣無度圖厥政不蠲烝天惟降時䘮紂謀其政不絜進于善故天惟下是䘮亡謂誅滅蠲吉玄反馬云明也一音圭烝絶句之承反馬云升也惟聖罔念作狂惟狂克念作聖惟聖人無念於善則爲狂人惟狂人能念於善則爲聖人言桀紂非實狂愚以不念善故滅亡天惟五方衆方天下諸侯惟五月丁亥王來自奄至于宗周周公歸政之明年淮夷奄又叛魯征淮夷作費誓王親征奄滅其國五月還至鎬京費音祕鎬胡老反周公曰王若曰猷告爾四國多方周公以王命順大道告四方稱周公以别王自告别彼列反惟爾殷侯尹民我惟大降爾命爾罔不知殷之諸侯正民者我大下汝命謂誅紂也言天下無不知紂暴虐以取亡洪惟圖天之命弗永寅念于祀惟帝降格于夏大惟爲王謀天之命不長敬念于祭祀謂夏桀惟天下至戒於夏以譴告之謂災異譴棄戰反有夏誕厥逸不肯慼言于民有夏桀不畏天戒而大其逸豫不肯憂言於民無憂民之言乃大淫昬不克終日勸于帝之迪言桀乃大爲過昬之行不能終日勸於天之道迪徒歷反馬本作攸云所也行下孟反乃爾攸聞言桀之惡乃汝所聞厥圖帝之命不克開于民之麗桀其謀天之命不能開於民所施政教麗施也言昬昧麗力馳反乃大降罰崇亂有夏因甲于内亂桀乃大下罰於民重亂有夏言殘虐外不憂民内不勤德因甲於二亂之内言昬甚重直用反又直龍反不克靈承于旅罔丕惟進之恭洪舒于民言桀不能善奉於人衆無大惟進恭德而大舒惰於治民亦惟有夏之民叨懫日欽劓割夏邑桀洪舒於民故亦惟有夏之民貪叨忿懫而逆命於是桀日尊敬其能劓割夏邑者謂殘賊臣懫勑二反說文之二反劓魚器反天惟時求民主乃大降顯休命于成湯天惟是桀惡故更求民主以代之大下明美之命於成湯使王天下刑殄有夏惟天不卑純命湯刑絶有夏惟天下與桀亦巳大卑必二反乃惟以爾多方之義民不克永于多享天所以不與桀以其乃惟用汝多方之義民爲臣而不能長乆多享國故惟夏之恭多士大不克明保享于民惟桀之所謂恭人衆士大不能明安享于民言年須暇之子孫誕作民主罔可念聽天以湯故五年須暇湯之子孫冀其改悔而紂大爲民主肆行無道事無可念言無可聽武王服䘮三年還師二年天惟求爾多方大動以威開厥顧天天惟求汝衆方之賢者大動紂以威開其能顧天可以代者惟爾多方罔堪顧之惟我周王靈承于旅惟汝衆方之中無堪顧天之道者惟我周王善奉於衆言以仁政得人心重意惟我周王靈承于旅多上今惟我周王丕靈承帝事克堪用德惟典神天言周文武能堪用德惟可以主神天之祀任天王任音壬天惟式教我用休簡卑殷命尹爾多方天以我用德之故惟用教我用美道代殷大與我殷之王命以正汝衆方之諸侯卑并至反今我曷敢多誥我惟大降爾四國民命今我何敢多誥汝而巳我惟大下汝四國民命謂誅管蔡商奄之君重意我惟大降爾四國民命多士予大降爾四國民命爾曷不忱𥙿之于爾多方汝何不以誠信行寛𥙿之道於汝衆方欲其戒四國崇和恊爾曷不夾介乂我周王享天之命夾近也汝何不近大見治於我周王以享天之命而爲不安乎夾音恊注同重言享天之命二見本篇上文今爾尚宅爾宅畋爾田爾曷不惠王熈天之命今汝殷之諸侯皆尚得居汝常居臣民皆尚得畋汝故田汝何不順從王政廣天之命而自懷疑乎爾乃迪屢不靜爾心未愛汝所蹈行數爲不安汝心未愛我周故數色角反爾乃不大宅天命爾乃屑播天命汝乃不大居安天命是汝乃盡播棄天命爾乃自作不典圖忱于正汝未愛我周播棄天命是汝乃自爲不常謀信于正道我惟時其教告之我惟時其戰要囚之我惟汝如是不謀信于正道故其教告之謂訊以文誥其戰要囚之謂討其倡亂執其朋黨要一遥反訊音信倡音唱至于再至于三再謂三監淮夷叛時三謂成王即政又叛言迪屢不静之事乃有不用我降爾命我乃其大罰殛之我教告戰要囚汝巳至再三汝其有不用我命我乃大下誅汝君乃其大罰誅之殛紀力反本又作極非我有周秉德不康寜乃惟爾自速辜非我有周執德不安寜自誅汝乃惟汝自召罪以取誅王曰嗚呼猷告爾有方多士曁殷多士王歎而以道告汝衆方與殷多士今爾奔走臣我監五祀監謂成周之監此指謂所遷頑民殷衆士今汝奔走來徒臣我我監五年無過則得還本土越惟有胥伯小大多正爾罔不兌臬於惟有相長事小大衆正官之人汝無不能用法欲其皆用法臬魚列反馬本作㓷長丁丈反自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事小大多正自爲不和汝有方多士當和之哉汝親近室家不睦汝亦當和之哉汝邑中能明是汝惟能勤汝職事爾尚不忌于凶德亦則以穆穆在乃位汝庶幾不自忌入于凶德亦則用敬敬常在汝位克閱于乃邑謀介爾乃自時洛邑尚永力畋爾田汝能使我閱具于汝邑而以汝所謀爲大則汝乃用是洛邑庶幾長力畋汝田矣言雖遷徙而以修善得反邑里閱音恱天惟卑矜爾我有周惟其大介賚爾汝能修善天惟與汝憐汝我有周惟其大大賜汝言受多福之祚重言天惟卑矜爾二本篇多士迪簡在王庭尚爾事有服在大僚非但受憐賜又乃蹈大道在王庭庶幾修汝事有所服行在大官重意迪簡在王庭尚爾事有服在大僚多士夏迪簡在王庭有服在百僚王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享王歎而言曰衆士汝不能勸信我命汝亦則惟不能享天祚矣凡民亦惟曰不享於汝祚矣重言凡民惟曰不享二前見洛誥爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土若爾乃爲逸豫頗僻大棄王命則惟汝衆方取天之威我則致行天罰離逺汝七將逺徙之頗破多反探吐南反僻匹亦反重意我則致天之罰多士予亦致天之罰湯誓致天之罰王曰我不惟多誥我惟祗告爾命我不惟多誥汝而巳我惟敬告汝吉凶之命又曰時惟爾𥘉不克敬于和則無我怨又誥汝是惟汝𥘉不能敬于和道故誅汝汝無我怨解所以再三加誅之意立政第二十一周書孔氏傳周公作立政周公旣致政成王恐其怠忽故以君臣立政爲戒立政言用臣當共立政故以名篇周公若曰拜手稽首告嗣天子王矣順古道盡禮致敬告成王言嗣天子今巳爲王矣不可不愼盡津忍反下同重言拜手稽首四召誥二本篇二用咸戒于王曰王左右常伯常任凖人綴衣虎賁周公用王所立政之事皆戒於王曰常所長事常所委任謂三公六卿凖人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣冝得其人任而鴆反凖之允反綴徐丁衛反又丁劣反賁音奔長丁丈反除篇末文主以長音直良反餘並同周公曰嗚呼休兹知恤鮮哉歎此五者立政之本知憂得其人者少鮮息淺反古之人迪惟有夏乃有室大競籲俊尊上帝古之人道惟有夏禹之時乃有卿大夫室家大強猶乃招呼賢俊與共尊事上天籲音喻迪知忱恂于九德之行禹之臣蹈知誠信於九德之行謂賢智大臣九德皐陶所謀忱市林反恂音荀行如字徐下孟反重意迪知忱恂于九德之行皐陶謨亦行有九德乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟后矣知九德之臣乃敢告教其君以立政君矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居内外之官及平法者皆得其人則此惟君矣謀面用丕訓德則乃宅人兹乃三宅無義民謀所面見之事無疑則能用大順德乃能居賢人于衆官若此則乃能三居無義民大罪宥之四裔次九州之外次中國之外桀德惟乃弗作往任是惟暴德罔後桀之爲德惟乃不爲其先王之法往所委任是惟暴德之人故絶丗無後亦越成湯陟丕釐上帝之耿命桀之昬亂亦於成湯之道得升大賜上天之光命王天下釐力之反耿工逈反徐公頴反又公永反下同王往况反下王有同乃用三有宅克即宅曰三有俊克即俊湯乃用三有居惡人之法能使就其居言服罪又曰能用剛柔正直三德之俊能就其俊事言明德嚴惟丕式克用三宅三俊言湯所以能嚴威惟可大法象者以能用三居三德之法其在商邑用恊于厥邑其在四方用丕式見德湯在商邑用三宅三俊之道和其邑其在四方用是大法見其聖德言逺近化見賢遍反下注同嗚呼其在受德暋惟羞刑暴德之人同于厥邦受德紂字帝乙愛焉爲作善字而反大惡自強惟進用刑與暴德之人同于其國並爲威虐受德馬云受所爲德也􅹠眉謹反徐亡巾反一音閔爲作上于僞反下爲之同強其丈反乃惟庶習逸德之人同于厥政乃惟衆習爲過德之人同于其政言不任賢帝欽罰之乃伻我有夏式商受命奄甸萬姓天以紂惡故敬罰之乃使我周家王有華夏得用商所受天命同治萬姓言皇天無親佑有德伻普耕反徐敷耕反又甫耕反重言式商受命二一見仲虺亦越文王武王克知三有宅心灼見三有俊心紂之不善亦於文武之道大行以能知三有居惡人之心灼然見三有賢俊之心以敬事上帝立民長伯言文武知三宅三俊故能以敬事上天立民正長謂郊祀天建諸侯立政任人凖夫牧作三事文武亦法禹湯以立政常任凖人及牧治爲天地人之三事虎賁綴衣趣馬小尹趣馬掌馬之官言此三者雖小官長必慎擇其人趣七口反左右攜僕百司庻府雖左右攜持器物之僕及百官有司主券契藏吏亦皆擇人劵音勸契苦計反藏才浪反大都小伯藝人表臣百司小臣猶皆慎擇其人况大都邑之小長以道藝爲表幹之臣及百官有司之職可以非其任乎太史尹伯庻常吉士太史下大夫掌邦六典之貳尹伯長官大夫及衆掌常事之善士皆得其人司徒司馬司空亞旅此有三卿及次卿衆大夫則是文武未伐紂時舉文武之功以爲法則重言司徒司馬司空亞旅三牧誓本篇梓材亞旅作尹旅夷微盧烝三亳阪尹蠻夷微盧之衆師及亳人之歸文王者三所爲之立監及阪地之尹長皆用賢阪音反文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王惟其能居心逺惡舉善乃能立此常事司牧人用能俊有德者逺于萬反文王罔攸兼于庻言庻獄庻慎惟有司之牧夫文王無所兼知於毀譽衆言及衆刑獄衆當所慎之事及惟慎擇有司牧夫而巳勞于求才逸於任賢譽音餘又如字重言惟有司之牧夫又篇末庻獄庻慎又下文三是訓用違庻獄庻慎文王罔敢知于兹是萬民順法用違法衆獄衆慎之事文王一無敢自知於此委任賢能而巳亦越武王率惟敉功不敢替厥義德亦於武王循惟文王撫安天下之功不敢廢其義德奉遵父道敉亡婢反率惟謀從容德以並受此丕丕基武王循惟謀從文王寛容之德故君臣以並受此大大之基業傳之子孫傳直專反重意以並受此丕丕基大誥弼我丕丕基嗚呼孺子王矣歎稚子今以爲王矣不可不勤法祖考之德重言孺子王矣三下文二繼自今我其立政立事凖人牧夫我其克灼知厥若丕乃俾亂繼自今巳往我其立政大臣立事小臣及凖人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡心力俾必爾反下同重言立政立事二重見下文相我受民和我庶獄庶愼時則勿有間之能治我所受天民和平我衆獄衆愼之事如是則勿有以代之言不可復變相如字馬息亮反下勱相同間間厠之間自一話一言我則末惟成德之彦以乂我受民言政當用一善善在一言而巳欲其口無擇言如此我則終惟有成德之美以治我所受之民話戸怪反嗚呼予旦巳受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣稚直吏反亦作稺繼自今文子文孫其勿誤于庶獄庶愼惟正是乂之文子文孫文王之子孫從今以往惟以正是之道治衆獄衆愼其勿誤自古商人亦越我周文王立政立事牧夫凖人則克宅之克由繹之兹乃俾乂言用古商湯亦於我周文王立政立事用賢人之法能居之於心能用陳之此乃使天下治繹音亦國則罔有立政用憸人不訓于德是罔顯在厥丗商周賢聖之國則無有立政用憸利之人者憸人不順於德是使其君無顯名在其丗憸息廉反徐七漸反本作􅧴同憸利之人馬云憸利佞人也繼自今立政其勿以憸人其惟吉士用勱相我國家立政之臣惟以吉士用勉治我國家勱音邁重言其惟吉士二本篇景命今文子文孫孺子王矣告文王之子孫言稚子以即政爲王矣所以厚戒其勿誤于庶獄惟有司之牧夫獨言衆獄有司欲其重刑愼官人重言惟有司之牧夫二見上文其克詰爾戎兵以陟禹之迹其當能治汝戎服兵器威懷並設以升禹治水之舊迹詰起一反馬云實也方行天下至于海表罔有不服方四方海表蠻夷戎狄無有不服化者以覲文王之耿光以揚武王之大烈能使四夷賔服所以見祖之光明揚父之大業嗚呼繼自今後王立政其惟克用常人其惟能用賢才爲常人不可以天官有所私周公若曰太史順其事并告太史司寇蘇公式敬爾由獄以長我王國忿生爲武王司寇封蘇國能用法敬汝所用之獄以長施行於我王國言主獄當求蘇公之比比必二反又如字兹式有愼以列用中罰此法有所愼行必以其列用中罰不輕不重蘇公所行太史掌六典有廢置官人之制故告之愼行如字監本纂圖重言重意互註尚書卷第十
