body:
  text: 監本纂圖重言重意互注尚書卷第四湯誓第一商書孔氏傳伊尹相湯伐桀升自陑桀都安邑湯升道從陑出其不意陑在河曲之南相息亮反湯如字馬云俗儒以湯為諡或為號號者似非其意言諡近之然不在諡法故無聞焉及禹俗儒以為名帝系禹名文命王侯丗本湯名天乙推此言之禹豈復非諡乎亦不在諡法故疑焉桀其列反夏之末天子升音升陑音而遂與桀戰于鳴條之野地在安邑之西桀逆拒湯重意遂與桀戰于鳴條之野見甘誓牧誓作湯誓湯誓戒誓湯士衆王曰格爾衆庶悉聽朕言契始封商湯遂以為天下號湯稱王則比桀於一夫格庚白反來也重意悉聽朕言盤庚明聽朕言泰誓咸聽朕言吕刑皆聽朕言非台小子敢行稱亂有夏多罪天命殛之稱舉也舉亂以諸侯伐天子非我小子敢行此事桀有昏德天命誅之今順天台以之反下同殛居力反今爾有衆汝曰我后不恤我衆舍我穡事而割正夏汝汝有衆我后桀也正政也言奪民農功而為割剝之政恤荀律反舍音捨廢也豫惟聞汝衆言不憂我衆之言夏氏有罪豫畏上帝不敢不正不敢不正桀罪誅之今汝其曰夏罪其如台今汝其復言桀惡其亦如我所聞之言復扶又反重言其如台四後見盤庚上髙宗肜日西伯戡黎夏王率遏衆力率割夏邑言桀君臣相率為勞役之事以絶衆力謂廢農功相率剝割夏之邑居謂征賦重遏於葛反徐音謁馬云止也有衆率怠弗協曰時日曷喪豫及汝皆亡衆下相率為怠惰不與上和合比桀於日曰是日何時喪我與汝俱亡欲殺身以喪桀喪息浪反惰徒卧反夏德若兹今朕必往凶德如此我必往誅之重言今朕必往重見泰誓爾尚輔豫一人致天之罰豫其大賚汝賚與也汝庶幾輔成我我大與汝爵賞罰音伐賚力代反徐音來重意爾尚輔豫一人泰誓上爾尚弼豫一人致末之罰多方我則致天之罰泰誓上底天之罰爾無不信朕不食言食盡其言僞不實爾不從誓言不用命豫則孥戮汝罔有攸赦古之用刑父子兄弟罪不相及今云孥戮汝無有所赦權以脅之使勿犯重言豫則孥戮汝又甘誓湯既勝夏欲遷其社不可湯承堯舜禪代之後順天應人逆取順守而有慙德故革命創制改正易服變置社稷而後丗無及句龍者故不可而止社常者反后士之神禪時戰反應應對之應創𥘉亮反正音征又音政句音鉤句龍共工之子為后土作夏社疑至臣扈言夏社不可遷之義疑至及臣扈三篇皆亡扈音戶夏師敗績湯遂從之大崩曰敗績從謂遂討之績子寂反從才容反遂伐三朡俘厥寶玉三朡國名桀走保之今定陶也桀自安邑東入山出太行東南涉河湯緩追之不迫遂奔南巢俘取也玉以禮神使無水旱之災故取而寶之朡子公反俘音孚行戶剛反一音如字誼伯仲伯作典寶二臣作典寶一篇言國之常寶也亡誼本或作義仲虺之誥第二商書孔氏傳湯歸自夏至于大坰自三朡而還大坰地名坰故螢反徐欽螢反又古螢反仲虺作誥為湯左相奚仲之後虺許鬼反誥故報反相息亮反仲虺之誥仲虺臣名以諸侯相天子㑹同曰誥成湯放桀于南巢惟有慙德湯伐桀武功成故以為號南巢地名有慙德慙德不及古湯伐桀武功成故號成湯一云成諡也曰豫恐來丗以台為口實恐來丗論道我放天子常不去口仲虺乃作誥陳義告湯可無慙曰嗚呼惟天生民有欲無主乃亂民無君主則恣情欲必致禍亂惟天生聰明時乂言天生聰明是治民亂有夏昏德民墜塗炭夏桀昏亂不恤下民民之危險若陷泥墜火無救之者天乃錫王勇智表正萬邦纘禹舊服言天與王勇智應為民主儀表天下法正萬國繼禹之功統其故服纘子管反應應對之應重意纘禹舊服君牙纘乃舊服兹率厥典奉若天命天意如此但當循其典法奉順天命而巳無所慙重意奉若天命說命奉若天道夏王有罪矯誣上天以布命于下言託天以行虐於民乃桀之大罪矯居表反誣音無帝用不臧式商受命用爽厥師天用桀無道故不善之式用爽明也用商受王命用明其衆言為主也臧作郎反重言式商受命重見立政簡賢附勢實繁有徒簡略也賢而無勢則略之不賢有勢則附之若是者繁多有徒衆無道之丗所常繁音煩肇我邦于有夏若苗之有莠若粟之有秕始我商家國於夏丗欲見翦除若莠生苗若秕在粟恐𬒳鋤治簸揚莠羊九反秕悲里反徐甫里反又必履反鋤仕魚反簸波我反揚音揚小大戰戰罔不懼于非辜矧豫之德言足聽聞言商家小大憂危恐其非罪見滅矧况也况我之道德善言足聽聞乎無道之惡有道自然理惡烏路反惟王不邇聲色不殖貨利邇近也不近聲樂言清簡不近女色言貞固殖生也不生資貨財利言不貪也既有聖德兼有此行近附近之近行下孟反德懋懋官功懋懋賞用人惟己改過不吝勉於德者則勉之以官勉於功者則勉之以賞用人之言若自己出有過則改無所吝惜所以能成王業克寬克仁彰信兆民言湯寬仁之德明信於天下乃葛伯仇餉𥘉征自葛東征西夷怨南征北狄怨葛伯遊行見農民之餉於田者殺其人奪其餉故謂之仇餉仇怨也湯為是以不祀之罪伐之從此後遂征無道西夷北狄舉逺以言則近者著矣仇音求餉式亮反曰奚獨後豫怨者辭也攸徂之民室家相慶曰徯豫后后來其蘇湯所往之民皆喜曰待我君來其可蘇息徯胡啓反蘇字亦作穌重意徯豫后后來其蘇太甲中徯我后后來其無罰民之戴商厥惟舊哉舊謂𥘉征目葛時佑賢輔德顯忠遂良賢則助之德則輔之忠則顯之良則進之明王之道兼弱攻昧取亂侮亡弱則兼之暗則攻之亂則取之有亡形則侮之言正義推亡固存邦乃其昌有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛推土雷反重意邦乃其昌洪範而邦其昌互注左襄十四年晉侯問衛故於中行獻子對曰不如因而定之衛有君矣仲虺有言曰亡者侮之亂者取之推亡固存國之道也又襄三十年亂者取之亡者侮之推亡固存國之利也德日新萬邦惟懷志自滿九族乃離日新不懈怠自滿志盈溢懈工債反重意德日新咸有一德時乃日新王懋昭大德建中于民以義制事以禮制心垂𥙿後昆欲王自勉明大德立大中之道於民率義奉禮垂優足之道示後丗中如字本或作忠非𥙿徐以樹反重意建中于民舜典允執厥中垂𥙿後昆微子之命德垂後裔豫聞曰能自得師者王求賢聖而事之王徐于况反又如字謂人莫已若者亡自多足人莫之益亡之道好問則𥙿自用則小問則有得所以足不問專固所以小好呼報反嗚呼愼厥終惟其始靡不有𥘉鮮克有終故戒愼終如其始鮮息淺反殖有禮覆昏暴有禮者封殖之昏暴者覆亡之覆芳服反暴蒲報反字或作暴欽崇天道永保天命王者如此上事則敬天安命之道重意欽崇天道說命奉若天道湯誥第三商書孔氏傳湯既黜夏命黜退也退其王命復歸于亳作湯誥湯誥以伐桀大義告天下重言復歸于亳三又嗣征太甲王歸自克夏至于亳誕告萬方誕大也以天命大義告萬方之衆人誕音但告工毒反王曰嗟爾萬方有衆明聽豫一人誥天子自稱曰豫一人古今同義惟皇上帝降衷于下民皇天上帝天也衷善也若有恆性克綏厥猷惟后順人有常之性能安立其道教則惟為君之道夏王滅德作威以敷虐于爾萬方百姓夏桀滅道德作威刑以布行虐政於天下百官言殘酷爾萬方百姓罹其凶害弗忍荼毒罹𬒳荼毒苦也不能堪忍虐之甚罹力之反本亦作羅洛何反荼音徒並告無辜于上下神祇言百姓兆民並告無罪稱冤訴天地冤於元反天道福善禍淫降災于夏以彰厥罪政善天福之淫過天禍之故下災異以明桀罪惡譴寤之而桀不改譴遣戰反寤五故反重意天道福善禍淫伊訓作善降之百祥作不善降之百殃肆台小子將天命明威不敢赦行天威謂誅之台音怡敢用玄牡敢昭告于上天神后請罪有夏明告天問桀百姓有何罪而加虐乎牡茂后反重意敢昭告于上天神后武成告于皇天后土聿求元聖與之勠力以與爾有衆請命聿遂也大聖陳力謂伊尹放桀除民之穢是請命聿允橘反述也勠舊音六又力雕反說文力周反史記音力消反穢於廢反上天孚佑下民罪人黜伏孚信也天信佑助下民桀知其罪退伏逺屏天命弗僭賁若草木兆民允殖僭差賁飾也言福善禍淫之道不差天下惡除煥然咸飾若草木同華民信樂生僭子念反忒也劉創林反賁波義反徐扶云反煥呼亂反樂音洛重意天命弗僭大誥天命不朁兆民允殖伊訓兆民允懷俾豫一人輯寧爾邦家言天使我輯安汝國家國諸侯家卿大夫俾必爾反徐甫婢反輯音集又七入反兹朕未知獲戾于上下此伐桀未知得罪於天地謙以求衆心戾力計反栗栗危懼若將隕于深淵栗栗危心若墜深淵危懼之甚栗音栗隕于敏反凡我造邦無從匪彞無即慆淫戒諸侯與之更始彞常慆慢也無從非常無就慢過禁之彞徐音夷慆他刀反各守爾典以承天休守其常法承天美道爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心所以不蔽善人不赦己罪以其簡在天心故也其爾萬方有罪在豫一人自責化不至重意其爾萬方有罪在豫一人泰誓中百姓有過在豫一人豫一人有罪無以爾萬方無用爾萬方言非所及嗚呼尚克時忱乃亦有終忱誠也庶幾能是誠道乃亦有終丗之美忱市林反咎單作明居咎單臣名主土地之官作明居民法一篇亡咎其九反單音善卷末同伊訓第四商書孔氏傳成湯既沒太甲元年太甲太丁子湯孫也太丁未立而卒及湯沒而太甲立稱元年伊尹作伊訓肆命徂后凡三篇其二亡伊訓作訓以教導太甲惟元祀十有二月乙丑伊尹祠于先王此湯崩踰月太甲即位奠殯而告祀年也夏曰歲商曰祀周曰年唐虞曰載祠音辭祭也奉嗣王祗見厥祖居位主喪見賢遍反侯甸羣后咸在在位次甸徒遍反百官總已以聽冡宰伊尹制百官以三公攝冡宰總音揔伊尹乃明言烈祖之成德以訓于王湯有功烈之祖故稱焉曰嗚呼古有夏先后方懋厥德罔有天災先后稱禹以下少康以上賢王言能以德禳災少詩照反上時掌反禳如羊反山川鬼神亦莫不寧莫無也言皆安之暨鳥獸魚鱉咸若雖微物皆順之明其餘無不順暨其器反鱉必滅反重意暨鳥獸魚鱉咸若舜典疇若豫上下草木鳥獸于其子孫弗率皇天降災假手于我有命言桀不循其祖道故天下禍災借手於我有命商主誅討之造攻自鳴條朕哉自亳造哉皆始也始攻桀伐無道由我始修德于亳亳旁各反徐扶各反惟我商王布昭聖武代虐以寬兆民允懷言湯布明武德以寬政代桀虐政兆民以此皆信懷我商王之德重意兆民允懷前篇兆民允殖今王嗣厥德罔不在𥘉言善惡之由無不在𥘉欲其愼始立愛惟親立敬惟長始于家邦終于四海言立愛敬之道始於親長則家國並化終治四海長丁丈反嗚呼先王肇修人紀從諫弗咈先民時若言湯始修為人綱紀有過則改從諌如流必先民之言是順咈扶弗反居上克明言理恕為下克忠事上竭誠與人不求備檢身若不及使人必器之常如不及恐有過重意與人不求備君陳無求備于一人以至于有萬邦兹惟艱哉言湯操心常危懼動而無過以至為天子此自立之難操七曹反又七報反重意兹惟艱哉君牙厥惟艱哉秦誓是惟艱哉敷求哲人俾輔于爾後嗣布求賢智使師輔於爾嗣王言仁及後丗哲本又作哲俾必爾反制官刑警于有位言湯制治官刑法以警戒百官警居領反曰敢有恆舞于宫酣歌于室時謂巫風常舞則荒淫樂酒曰酣酣歌則廢德事鬼神曰巫言無政酣戶甘反巫音無樂音洛敢有殉于貨色恆于遊畋時謂淫風殉求也敢求財貨美色常遊戲畋獵是淫過之風俗殉辭俊反徐辭荀反畋音田敢有侮聖言逆忠直逺耆德比頑童時謂亂風狎侮聖人之言而不行拒逆忠直之規而不納耆年有德踈逺之童稚頑嚚親比之是荒亂之風俗逺于萬反注同耆巨夷反比毗志反徐扶至反稚直利反嚚魚巾反惟兹三風十愆卿士有一于身家必喪有一過則德義廢失位亡家之道愆去乾反喪如字又息浪反邦君有一于身國必亡諸侯犯此國亡之道臣下不匡其刑墨具訓于蒙士邦君卿士則以爭臣自匡正臣不正君服墨刑鑿其額涅以墨蒙士例謂下士士以爭友僕隸自匡正爭諫爭之爭鑿在洛反額魚白反涅乃結反隸郎計反嗚呼嗣王祗厥身念哉言當敬身念祖德重言念哉二本篇益稷聖謨洋洋嘉言孔彰洋洋美善言甚明可法洋音羊徐音翔惟上帝不常作善降之百祥作不善降之百殃祥善也天之禍福惟善惡所在不常在一家重意作善降之百祥作不善降之百殃湯誥天道福善禍淫爾惟德罔小萬邦惟慶修德無小則天下賚慶賚力代反爾惟不德罔大墜厥宗苟為不德無大言惡有類以類相致必墜失宗廟此伊尹至忠之訓肆命陳天命以戒太甲亡徂后陳往古明君以戒亡太甲上第五商書孔氏傳太甲既立不明不用伊尹之訓不明居喪之禮伊尹放諸桐湯葬地也不知朝政故曰放朝直遙反三年復歸于亳思庸念常道重言復歸于亳三前見嗣征湯誥伊尹作太甲三篇太甲戒太甲故以名篇惟嗣王不惠于阿衡阿倚衡平言不順伊尹之訓倚於綺反伊尹作書曰先王顧諟天之明命以承上下神祇顧謂常目在之諟是也言敬奉天命以承順天地顧音故諟音是說文理也祇臣支反社稷宗廟罔不祗肅肅嚴也言能嚴敬鬼神而逺之逺于萬反天監厥德用集大命撫綏萬方監視也天視湯德集王命於其身撫安天下監工暫反重意撫綏萬方泰誓寵綏四方惟尹躬克左右厥辟宅師伊尹言能助其君居業天下之衆辟必亦反徐甫亦反重意惟尹躬克左右厥辟畢命惟周公左右先王肆嗣王丕承基緒肆故也言先祖勤德致有天下故子孫得大承基業冝念祖修德丕普悲反徐甫眉反惟尹躬先見于西邑夏自周有終相亦惟終周忠信也言身先見夏君臣用忠信有終夏都在亳西先見並如字注同相息亮反其後嗣王罔克有終相亦罔終言桀君臣滅先人之道德不能終其業以取亡嗣王戒哉祗爾厥辟辟不辟忝厥祖以不終為戒愼之至敬其君道則能終忝辱也為君不君則辱其祖重意嗣王戒哉大禹謨戒哉嗣征懋戒哉互注記坊記子云父子不同位以厚敬也書云祗爾厥辟不辟忝厥祖注云君父之道冝尊嚴王惟庸罔念聞言太甲守常不改無念聞伊尹之戒伊尹乃言曰先王昧爽丕顯坐以待旦爽顯皆明也言先王昧明思大明其德坐以待旦而行之昧音妹旁求俊彥啓迪後人旁非一方美士曰彥開道後人言訓戒俊本亦作峻迪大歷反重意旁求俊彥說命下旁招俊乂啓迪後人君陳啓佑我後人無越厥命以自覆越墜失也無失亡祖命而不勤德以自顚覆越于月反本又作粵覆芳服反注同愼乃儉德惟懷永圖言當以儉為德思長丗之謀若虞機張往省括于度則釋機弩牙也虞度也度機機有度以凖望言修德夙夜思之明旦行之如射先省矢括于度釋則中省息井反括故活反度如字虞度待洛反中丁仲反互注記緇衣夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不愼也太甲曰母越厥命以自覆也若虞機張往省括于度則釋注云虞人之射禽弩巳張從機間視括與所射參相得乃後釋弦發矢為政亦當以己心參於羣臣及萬民可乃後施也欽厥止率乃祖攸行止謂行所安止君止於仁子止於孝重意欽厥止益稷安汝止率乃祖攸行君牙率乃祖考之攸行惟朕以懌萬丗有辭言能循汝祖所行則我喜恱王亦見歎美無窮懌音亦王未克變未能變不用訓太甲性輕脫伊尹至忠所以不巳輕遣政反伊尹曰兹乃不義習與性成言習行不義將成其性義本亦作誼豫弗狎于弗順營于桐宫密邇先王其訓無俾丗迷狎近也經營桐墓立宫令太甲居之近先王則訓於義無成其過不使丗人迷惑怪之俾必爾反後篇同近附近之近令力呈反王徂桐宫居憂往入桐宫居憂位克終允德言能思念其祖終其信德太甲中第六商書孔氏傳惟三祀十有二月朔湯以元年十一月崩至此二十六月三年服闋闋苦穴反伊尹以冕服奉嗣王歸于亳冕冠也踰月即吉服冕音免作書曰民非后罔克胥匡以生無能相匡故須君以生胥息餘反后非民罔以辟四方須民以君四方重意民非后罔克胥匡以生后非民罔以辟四方見舜典咸有一德皇天眷佑有商俾嗣王克終厥德實萬丗無疆之休言王能終其德乃天之顧佑商家是商家萬丗無窮之美疆居良反重意皇天眷佑有商微子之命皇天眷佑大禹謨皇天眷命實萬世無疆之休召誥君奭受命無疆惟休王拜手稽首曰豫小子不明于德自底不類君而稽首於臣謝前過類善也暗於德故自致不善底之履反重言王拜手稽首二後見洛誥欲敗度縱敗禮以速戾于厥躬速召也言己放縱情欲毀敗禮儀法度以召罪於其身敗必邁反徐甫邁反縱子用反戾郎計反天作孽猶可違自作孽不可逭孽災逭逃也言天災可避自作災不可逃孽魚列反逭胡亂反既往背師保之訓弗克于厥𥘉尚賴匡救之德圖惟厥終言己巳往之前不能修德於其𥘉今庶幾賴教訓之德謀終於善悔過之辭背音佩徐扶代反伊尹拜手稽首拜手首至手曰修厥身允德協于下惟明后言修其身使信德合於羣下惟乃明君先王子惠困窮民服厥命罔有不恱言湯子愛困窮之人使皆得其所故民心服其教令無有不欣喜並其有邦厥鄰乃曰徯我后后來無罰湯俱與鄰並有國鄰國人乃曰待我君來言欣戴君來無罰言仁惠徯胡啓反重意徯我后后來無罰仲虺之誥徯豫后后來其蘇王懋乃德視乃厥祖無時豫怠言當勉修其德法視其祖而行之無為是逸豫怠惰懋音茂奉先思孝接下思恭以念祖德為孝以不驕慢為恭視逺惟明聽德惟聰言當以明視逺以聰聽德重意視逺惟明聽德惟聰舜典明四目逹四聰朕承王之休無斁王所行如此則我承王之美無厭斁音亦厭於豔反太甲下第七商書孔氏傳伊尹申誥于王曰嗚呼惟天無親克敬惟親言天於人無有親疏惟親能敬身者民罔常懷懷于有仁民所歸無常以仁政為常重意皇天無親克敬惟親民罔常懷懷于有仁蔡仲之命皇天無親惟德是輔民心無常惟惠之懷鬼神無常享享于克誠言鬼神不保一人能誠信者則享其祀天位艱哉言居天子之位難以此三者德惟治否德亂為政以德則治不以德則亂治直吏反注及下同與治同道罔不興與亂同事罔不亡言安危在所任治亂在所法重意與治同道罔不興二句詳見蔡仲之命終始愼厥與惟明明后明愼其所與治亂之幾則為明王明君先王惟時懋敬厥德克配上帝言湯惟是終始所與之難勉修其德能配天而行之今王嗣有令緒尚監兹哉令善也繼祖善業當夙夜庶幾視祖此配天之德而法之若升髙必自下若陟遐必自邇言善政有漸如登髙升逺必用下近為始然後終致髙逺無輕民事惟難無輕為力役之事必重難之乃可無安厥位惟危言當常自危懼以保其位愼終于始於始慮終於終思始有言逆于汝心必求諸道人以言咈違汝心必以道義求其意勿拒逆之咈扶弗反有言遜于汝志必求諸非道遜順也言順汝心必以非道察之勿以自臧嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何貞正也言常念慮道德則得道德念為善政則成善政一人天子天子有大善則天下得其正君罔以辨言亂舊政利口覆國家故特愼焉覆芳服反臣罔以寵利居成功成功不退其志無限故為極以安之邦其永孚于休言君臣各以其道則國長信保於美咸有一德第八商書孔氏傳伊尹作咸有一德言君臣皆有純一之德以戒太甲咸有一德即政之後恐其不一故以戒之伊尹既復政厥辟還政太甲將告歸乃陳戒于德告老歸邑陳德以戒曰嗚呼天難諶命靡常以其無常故難信諶徐市林反重言天難諶二後見君奭常厥德保厥位厥德匪常九有以亡人能常其德則安其位九有諸侯桀不能常其德湯伐而兼之夏王弗克庸德慢神虐民言桀不能常其德不敬神明不恤下民皇天弗保監于萬方啓迪有命言天不安桀所為廣視萬方有天命者開道之眷求一德俾作神主天求一德使代桀為天地神祇之主惟尹躬暨湯咸有一德克享天心受天明命享當也所征無敵謂之受天命互注記緇衣子曰為上可望而知也為下可𫐠而志也則君不疑於其臣則臣不惑於其君矣尹告曰惟尹躬及湯咸有一德注二君臣皆有一德不二則無疑惑也以有下篇同相息亮反下同使百工營求諸野得諸傳巖使百官以所夢之形象經營求之於外野得之於傳巖之溪作說命三篇命說為相使攝政說命始求得而命之王宅憂亮隂三祀隂默也居憂信默三年不言亮本又作諒如字又力章反既免喪其惟弗言除喪猶不言政互注記喪服四制書曰髙宗諒䦣三年不言善之也王者莫不行此禮何以獨善之也曰髙宗者武丁武丁者殷之賢王也繼丗即位而慈良於喪當此之時殷衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗三年之喪君不言書云髙宗諒暗三年不言此之謂也羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則知事則為明智明智則能制作法則哲本又作哲天子惟君萬邦百官承式天下待令百官仰法重意天子惟君萬邦五子之歌萬邦之君王言惟作命不言臣下罔攸禀令禀受令亦命也王庸作書以誥曰以台正于四方台恐德弗類兹故弗言因臣下怪之故作誥類善也我正四方恐德不善此故不言誥故報反台音怡恭默思道夢帝賚豫良弼其代豫言夢天與我輔弼良佐將代我言政教賚力代反徐音來乃審厥象俾以形旁求于天下審所夢之人刻其形象以四方旁求之於民間俾必爾反說築傳巖之野惟肖傳氏之巖在虞􅉑之界通道所經有澗水壞道常使胥靡刑人築護此道說賢而隱代胥靡築之以供食肖似似所夢之形肖音笑􅉑寡白反壞音怪供音恭爰立作相王置諸其左右於是禮命立以為相使在左右命之曰朝夕納誨以輔台德言當納諌誨直辭以輔我德朝張遙反重意朝夕納誨舜典夙夜出納朕命若金用汝作礪鐵須礪以成利器礪力丗反若濟巨川用汝作舟楫渡大水待舟楫楫音接徐音集若歲大旱用汝作霖雨霖三日雨霖以救旱啓乃心沃朕心若藥弗瞑功上有狹人之心則下無所自盡矣言先盡其心然後乃能盡其力人君所以成功狹戶夾反盡徐子忍反注同沃丁既葬伊尹于亳沃丁太甲子伊尹既致仕老終以三公禮葬沃烏毒反徐於毒反咎單遂訓伊尹事訓暢其所行功德之事作沃丁咎單忠臣名作此篇以戒也亡伊陟相太戊伊陟伊尹子太戊沃丁弟之子陟張力反相息亮反太戊馬云太甲子亳有祥桑榖共生于朝祥妖怪二木台生七日大拱不恭之罰桑蘇臧反榖工木反楮也朝直遙反伊陟贊于巫咸作咸乂四篇贊告也巫咸臣名皆亡巫咸馬云巫男巫也名咸殷之巫也太戊贊于伊陟告以改過自新作伊陟原命原臣名原命伊陟二篇皆亡仲丁遷于嚻太戊子去亳嚻地名嚻五羔反作仲丁陳遷都之義亡河亶甲居相仲丁弟相地名在河北亶丁但反相息亮反今魏郡有相縣作河亶甲亡祖乙圯于耿亶甲子圯於相遷於耿河水所毀曰圯圯備美反徐扶鄙反馬云毀也作祖乙亡
