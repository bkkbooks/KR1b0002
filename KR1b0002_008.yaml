body:
  text: 監本纂圖重言重意互注尚書卷第八康誥第十一周書孔氏傳成王既伐管叔蔡叔滅三監以殷餘民封康叔以三監之民國康叔為衛侯周公懲其數叛故使賢母弟主之數叛上所角反下亦作畔作康誥酒誥梓材康誥命康叔之誥康圻內國名叔封字梓音子圻具依反惟三月哉生魄周公攝政七年三月始生魄月十六日明消而魄生魄字又作魄普白反馬云魄朏也謂月三日始生兆朏名曰魄重意惟三月哉生魄武成厥四月哉生明顧命惟四月哉生魄周公𥘉基作新大邑于東國洛四方民大和會𥘉造基建作王城大都邑於東國洛汭居天下土中四方之民大和恱而集㑹汭如鋭反侯甸男邦采衛百工播民和見士于周此五服諸侯服五百里侯服去王城千里甸服千五百里男服去王城二千里采服二千五百里衛服三千里與禹貢異制五服之百官播率其民和恱並見即事于周見賢遍反重意侯甸邦男采衛酒誥侯甸男衛康王之誥庶邦侯甸男衛周公咸勤乃洪大誥治周公皆勞勉五服之人遂乃因大封命大誥以治道陸云乃洪大誥治直吏反注及下其治民安治用安治同一本作周公乃洪大誥治勞力報反王若曰孟侯朕其弟小子封周公稱成王命順康叔之德命為孟侯孟長也五侯之長謂方伯使康叔為之言王使我命其弟封封康叔名稱小子明當受教誨長丁丈反下同惟乃丕顯考文王克明德愼罰惟汝大明父文王能顯用俊德愼去刑罰以為教首去羌吕反下欲去去疾同互注左成二年周書曰明德愼罰文王所以造周也明德務崇之之謂也愼罰務去之之謂也不敢侮鰥寡庸庸祗祗威威顯民惠恤窮民不慢鰥夫寡婦用可用敬可敬刑可刑明此道以示民重言不敢侮鰥寡二本篇無逸互注左宣十五年晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職說是賞也曰周書所謂庸庸祗祗者謂此物也夫用肇造我區夏越我一二邦以修用此明德愼罰之道始為政於我區域諸夏故於我一二邦皆以修治我西土惟時怙冒聞于上帝帝休我西土𡵨周惟是怙恃文王之道故其政教冒𬒳四表上聞于天天美其治怙音戶冒莫報反覆也聞如字徐又音問重言聞于上帝二重見君奭天乃大命文王殪戎殷誕受厥命天美文王乃大命之殺兵殷大受其王命謂三分天下有其二以授武王殪於計反重言誕受厥命二一見微子互注左宣六年赤狄伐晉圍懷及邢丘晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也越厥邦厥民惟時叙於其國於其民惟是次叙皆文王教乃寡兄勗肆汝小子封在兹東土汝寡有之兄武王勉行文王之道故汝小子封得在此東土為諸侯勗許玉反王曰嗚呼封汝念哉念我所以告汝之言重言汝念哉見篇末今民將在祗遹乃文考紹聞衣德言今治民將在敬循汝文德之父繼其所聞服行其德言以為政教遹音聿又音述馬云述也衣如字徐於既反往敷求于殷先哲王用保乂民汝往之國當布求殷先智王之道用安治民汝丕逺惟商耇成人宅心知訓汝當大逺求商家耇老成人之道常以居心則知訓民耇音苟别求聞由古先哲王用康保民又當别求所聞父兄用古先智王之道用其安者以安民弘于天若德𥙿乃身不廢在王命大于天為順德則不見廢常在王命王曰嗚呼小子封恫􅘃乃身敬哉恫痛􅘃病治民務除惡政當如痛病在汝身欲去之敬行我言恫音通又勑動反􅘃古頑反重言敬哉五本篇二洛誥蔡仲之命君奭各一天畏棐忱民情大可見小人難保天德可畏以其輔誠人情大可見以小人難安棐音匪又芳鬼反忱市林反重意天畏棐忱大誥越天棐忱君奭若天棐忱往盡乃心無康好逸豫乃其乂民往當盡汝心為政無自安好逸豫寬身其乃治民盡徐子忍反好呼報反我聞曰怨不在大亦不在小惠不惠懋不懋不在大起於小不在小小至於大言怨不可為故當使不順者順不勉者勉懋音茂互注左昭八年周書曰惠不惠茂不茂康叔所以服弘大也巳汝惟小子乃服惟弘王應保殷民巳乎汝惟小子乃當服行德政惟弘大王道上以應天下以安我所受殷之民衆應應對之應注同徐於甑反重言巳汝惟小子二並本篇大誥巳豫惟小子二洛誥巳汝惟冲子亦惟助王宅天命作新民弘王道安殷民亦所以惟助王者居順天命為民日新之教互注記大學康誥曰作新民詩曰周雖舊邦其命惟新是故君子無所不用其極王曰嗚呼封敬明乃罰歎而勑之凡行刑罰汝必敬明之欲其重愼人有小罪非眚乃惟終自作不典式爾小罪非過失乃惟終自行之自為不常用犯汝眚所領反本亦作省有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺汝盡聽訟之理以極其罪是人所犯亦不可殺當以罰宥論之宥于救反王曰嗚呼封有叙時乃大明服歎政教有次叙是乃治理大明則民服惟民其勑懋和民既服化乃其自勑正勉為和若有疾惟民其畢棄咎化惡為善如欲去疾治之以理則惟民其盡棄惡修善咎其久反重言若有疾二前見大誥若保赤子惟民其康乂愛養人如安孩兒赤子不失其欲惟民其皆安治孩亥才反互注記大學慈者所以使衆也康誥日如保赤子心誠求之雖不中不逺矣非汝封刑人殺人言得刑殺罪人無或刑人殺人無以得刑殺人而有妄刑殺非辜者非汝封又曰劓刵人劓截鼻刵截耳刑之輕者亦言所得行劓魚器反刵如志反無或劓刵人所以舉輕以戒為人輕行之王曰外事汝陳時臬司師兹殷罰有倫言外土諸侯奉王事汝當布陳是法司牧其衆及此殷家刑罰有倫理者兼用之臬魚列反又曰要囚服念五六日至于旬時丕蔽要囚要用謂察其要辭以斷獄既得其辭服膺思念五六日至於十日至于三月乃大斷之言必反覆思念重刑之至也要於霄反蔽必丗反斷丁亂反下及篇末同覆芳服反王曰汝陳時臬事罰蔽殷彞陳是法事其刑罰斷獄用殷家常法謂典刑故事彞以支反用其義刑義殺勿庸以次汝封義冝也用舊法典刑冝於時丗者以刑殺勿用以就汝封之心所安乃汝盡遜曰時叙惟曰未有遜事乃使汝所行盡順曰是有次序惟當自謂未有順事君子將興自以為不足巳汝惟小子未其有若汝封之心朕心朕德惟乃知巳乎他人未其有若汝封之心言汝心最善我心我德惟汝所知欲其明成王所以命已之欵心欵苦管反重言汝惟小子二又大誥汝作豫凡民自得罪寇攘姦宄殺越人于貨凡民用得罪為寇盜攘竊姦宄殺人顚越人於是以取貨利攘如羊反宄音軌重言寇攘姦宄舜典寇賊姦宄暋不畏死罔弗憝暋強也自強為惡而不畏死人無不惡之者言當消絶之暋音敏憝徒對反徐徒猥反強其丈反無不惡烏路反下所大惡疾惡亦惡音同王曰封元惡大憝矧惟不孝不友大惡之人猶為人所大惡况不善父母不友兄弟者乎言人之罪惡莫大於不孝不友子弗祗服厥父事大傷厥考心為人子不能敬身服行父道而怠忽其業大傷其父心是不孝于父不能字厥子乃疾厥子於為人父不能字愛其子乃疾惡其子是不慈于弟弗念天顯乃弗克恭厥兄於為人弟不念天之明道乃不能恭事其兄是不恭兄亦不念鞠子哀大不友于弟為人兄亦不念稚子之可哀大不篤友于弟是不友鞠居六反互注左僖三十三年𥘉臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰請用之公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不恭不相及也惟弔兹不于我政人得罪惟人至此不孝不慈不友不恭不於我執政之人得罪乎道教不至所致弔音的天惟與我民彞大泯亂天與我民五常使父義母慈兄友弟恭子孝而廢棄不行是以滅亂天道泯武軫反曰乃其速由文王作罰刑兹無赦言當速用文王所作違教之罰刑此亂五常者無得赦不率大戞矧惟外庶子訓人戞常也凡民不循大常之教猶刑之無赦况在外掌衆子之官主訓民者而親犯乎戞簡八反惟厥正人越小臣諸節惟其正官之人於小臣諸有符節之吏及外庶子其有不循大常者則亦在無赦之利重意惟厥正人洪範凡厥正人乃别播敷造民大譽弗念弗庸􅘃厥君時乃引惡惟朕憝汝今往之國當分别播布德教以立民大善之譽若不念我言不用我法者病其君道是汝長惡惟我亦惡汝别彼列反注同汝長丁丈反下同巳汝乃其速由兹義率殺亦惟君惟長汝乃其速用此典刑宜於時丗者循理以刑殺則亦惟君長之正道不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂為人君長而不能治其家人之道則於其小臣外正官之吏並為威虐大放棄王命乃由非德用治之故汝亦罔不克敬典乃由𥙿民惟文王之敬忌常事人之所輕故戒以無不能敬常汝用寬民之道當惟念文王之所敬忌而法之忌其記反乃𥙿民曰我惟有及則豫一人以懌汝行寬民之政曰我惟有及於民則我一人以此恱懌汝德懌音亦王曰封爽惟民迪吉康明惟治民之道而善安之我時其惟殷先哲王德用康乂民作求我是其惟殷先智王之德用安治民為求等為于僞反矧今民罔迪不適不迪則罔政在厥邦治民乃欲求等殷先智王况今民無道不之言從教也不以道訓之則無善政在其國王曰封豫惟不可不監告汝德之說于罰之行我惟不可不監視古義告汝施德之說於罰之所行欲其勤德愼刑說如字徐始鋭反今惟民不靜未戾厥心迪屢未同假令今天下民不安未定其心於周教道屢數而未和同設事之言令力呈反數所角反爽惟天其罰殛我我其不怨明惟天其以民不安罰誅我我其不恐天汝不治我罰汝汝亦不可怨我殛紀力反惟厥罪無在大亦無在多矧曰其尚顯聞于天民之不安雖小邑小民猶有誅罰不在多大况曰不愼罰明聞于天者乎言罪大王曰嗚呼封敬哉無作怨勿用非謀非彞言當修已以敬無為可怨之事勿用非善謀非常法重言欽哉五本篇二洛誥蔡仲之命君陳各一蔽時忱丕則敏德斷行是誠道大法敏德信則人任焉敏則有功用康乃心顧乃德逺乃猷用是誠道安汝心顧省汝德無令有非逺汝謀思為長久𥙿乃以民寧不汝瑕殄行寬政乃以民安則我不汝罪過不絶亡汝王曰嗚呼肆汝小子封惟命不于常以民安則不絶亡汝故當念天命之不于常汝行善則得之行惡則失之互注記大學康誥曰惟命不于常道善則得之不善則失之矣汝念哉無我殄無絶棄我言而不念重言汝念哉本篇二享明乃服命享有國土當明汝所服行之命令使可則髙乃聽用康乂民髙汝聽聽先王道德之言以安治民重言用康乂民三上文一王若曰往哉封勿替敬典汝往之國勿廢所冝敬之常法重言往哉七舜典二盤庚微子之命本篇畢命文侯之命各一聽朕告汝乃以殷民丗享順從我所告之言即汝乃以殷民丗丗享國福流後丗酒誥第十二周書孔氏傳酒誥康叔監殷民殷民化紂嗜酒故以戒酒誥嗜市志反王若曰明大命于妹邦周公以成王命誥康叔順其事而言之欲令明施大教命於妹國妹地名紂所都朝歌以北是王若馬本作成王若曰注云言成王者未聞也俗儒以為成王骨節始成故曰成王或曰以成王為少成二聖之功生號曰成王沒因為諡衛賈以為戒成康叔以愼酒成就人之道也故曰成此三者吾無取焉吾以為後録書者加之未敢專從故曰未聞也妹邦馬云妹邦即收養之地欲令力呈反下始令勿令同乃穆考文王肇國在西土父昭子穆文王弟稱穆將言始國在西土西土岐周之政文王弟稱穆周自后稷而封為始祖后稷生不窋為昭鞠陶為穆公劉為昭慶節為穆黃僕為昭羌弗為穆毀揄為昭公非為穆髙圉為昭亞圉為穆諸盩為昭大王為穆王季為昭文王為穆故左傳宫之竒云大伯虞仲大王之昭也虢仲虢叔王季之穆也又冨辰云管蔡巳下十六國文之昭也昭一音韶窋音竹律反揄音以盩音張流反大並音泰厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒文王其所告愼衆國衆士於少正官御治事吏朝夕勑之惟祭祀而用此酒不常飲毖音祕少時照反惟天降命肇我民惟元祀惟天下教命始令我民知作酒者惟為祭祀為于僞反又下同天降威我民用大亂喪德亦罔非酒惟行天下威罰使民亂德亦無非以酒為行者言酒本為祭祀亦為亂行惟行下孟反注及下注之行同重言天降威二本篇大誥越小大邦用喪亦罔非酒惟辜於小大之國所用喪亡亦無不以酒為罪也文王誥教小子有正有事無彞酒小子民之子孫也正官治事謂下羣吏教之皆無常飲酒越庶國飲惟祀德將無醉於所治衆國飲酒惟當因祭祀以德自將無令至醉惟曰我民迪小子惟土物愛厥心臧文王化我民教道子孫惟土地所生之物皆愛惜之則其心善聰聽祖考之彞訓越小大德小子惟一言子孫皆聰聽父祖之常教於小大之人皆念德則子孫惟專一妹土嗣爾股肱純其藝黍稷奔走事厥考厥長今往當使妹土之人繼汝股肱之教為純一之行其當勤種黍稷奔走事其父兄長音丁丈反下注長官諸侯之長同肇牽車牛逺服賈用孝養厥父母農功既畢始牽車牛載其所有求易所無逺行賈賣用其所得珍異孝養其父母賈音古養羊亮反厥父母慶自洗腆致用酒其父母善子之行子乃自潔厚致用酒養也洗先典反馬云盡也腆他典反庶士有正越庶伯君子其爾典聽朕教衆伯君子長官大夫統衆士有正者其汝常聽我教勿違犯爾大克羞耇惟君爾乃飲食醉飽汝人能進老成人之道則為君矣如此汝乃飲食醉飽之道先戒羣吏以聽教次戒康叔以君義丕惟曰爾克永觀省作稽中德我大惟教汝曰汝能長觀省古道為考中正之德則君道成矣省息井反爾尚克羞饋祀爾乃自介用逸能考中德則汝庶幾能進饋祀於祖考矣能進饋祀則汝乃能自大用逸之道饋其位反兹乃允惟王正事之臣汝能以進老成人為醉飽考中德為用逸則此乃信任王者正事之大臣任音壬兹亦惟天若元德永不忘在王家言此非但正事之臣亦惟天順其大德而佑之長不見忘在王家王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒我文王在西土輔訓往日國君及御洽事者下民子孫皆庶幾能用上教不厚於酒言不常飲故我至于今克受殷之命以不厚於酒故我周家至于今能受殷王之命王曰封我聞惟曰在昔殷先哲王迪畏天顯小民聞之於古殷先智王謂湯蹈道畏天明著小民經德秉哲自成湯咸至于帝乙成王畏相能常德持智從湯至帝乙中間之王猶保成其王道畏敬輔相之臣不敢為非相息亮反注同惟御事厥棐有恭不敢自暇自逸惟殷御治事之臣其輔佐畏相之君有恭敬之德不敢自寬暇自逸䂊暇遐稼反矧曰其敢崇飲崇聚也自暇自逸猶不敢况敢聚㑹飲酒乎明無也越在外服侯甸男衛邦伯於在外國侯服甸服男服衛服國伯諸侯之長言皆化湯畏相之德越在內服百僚庶尹惟亞惟服宗工於在內服治事百官衆正及次大夫服事尊官亦不自逸越百姓里居於百官族姓及卿大夫致仕居田里者罔敢湎于酒不惟不敢亦不暇自外服至里居皆無敢沈湎于酒非徒不敢志在助君敬法亦不暇飲酒湎面善反惟助成王德顯越尹人祗辟所以不暇飲酒惟助其君成王道明其德於正人之道必正身敬法其身正不令而行辟扶亦反我聞亦惟曰在今後嗣王酣身嗣王紂也酣樂其身不憂政事酣戶甘反樂音洛厥命罔顯于民祗保越怨不易言紂暴虐施其政令於民無顯明之德所敬所安皆在於怨不可變易易如字馬以豉反誕惟厥縱淫泆于非彞用燕喪威儀民罔不䀌傷心紂大惟其縱淫泆于非常用燕安喪其威儀民無不䀌然痛傷其心縱子用反注同泆音溢又作逸亦作佚衋許力反惟荒腆于酒不惟自息乃逸言紂大厚於酒晝夜不念自息乃過差差𥘉佳反又𥘉賣反厥心疾很不克畏死紂疾很其心不能畏死言無忌憚很胡懇反辜在商邑越殷國滅無罹紂聚罪人在都邑而任之於殷國滅亡無憂懼弗惟德馨香祀登聞于天誕惟民怨紂不念發聞其德使祀見享升聞於天大行淫虐惟為民所怨咨重意弗惟德馨香祀登聞于天君陳至治馨香感于神明吕刑罔有馨香德刑發聞惟腥庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸紂衆羣臣用酒沈荒腥穢聞在上天故天下喪亡於殷無愛於殷惟以紂奢逸故聞音問天非虐惟民自速辜言凡為天所亡天非虐民惟民行惡自召罪王曰封豫不惟若兹多誥我不惟若此多誥汝我親行之古人有言曰人無於水監當於民監古聖賢有言人無於水監當於民監視水見己形視民行事見吉凶監工陷反下及注同重言古人有言曰四本篇泰誓牧誓秦誓今惟殷墜厥命我其可不大監撫于時今惟殷紂無道墜失天命我其可不大視此為戒撫安天下於是豫惟曰汝劼毖殷獻臣劼固也我惟告汝曰汝當固愼殷之善臣信用之劼苦八反侯甸男衛矧太史友內史友侯甸男衛之國當愼接之况太史內史掌國典法所賔友乎重言侯甸男衛三本篇二康王之誥一又康誥侯甸男邦采衛越獻臣百宗工矧惟爾事服休服采於善臣百尊官不可不愼况汝身事服行美道服事治民乎矧惟若疇圻父薄違農父圻父司馬農父司徒身事且冝敬愼况所順疇咨之司馬乎况能迫回萬民之司徒乎言任大圻巨依反父音甫薄蒲各反徐又扶各反違如字徐音回馬云違行也若保宏父定辟矧汝剛制于酒宏大也宏父司空當順安之司馬司徒司空列國諸侯三卿愼擇其人而任之則君道定况汝剛斷於酒乎辟必亦反斷丁亂反厥或誥曰羣飲汝勿佚其有誥汝曰民羣聚飲酒不用上命則汝收捕之勿令失也佚音逸盡執拘以歸于周豫其殺盡執拘羣飲酒者以歸於京師我其擇罪重者而殺之盡子忍反又惟殷之迪諸臣惟工乃湎于酒勿庸殺之又惟殷家蹈惡俗諸臣惟衆官化紂日久乃沈湎於酒勿用法殺之惡烏各反姑惟教之有斯明享以其漸染惡俗故必三由法令且惟教之則汝有此明訓以享國三息暫反又如字乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺汝若忽怠不用我教辭惟我一人不憂汝乃不潔汝政事是汝同於見殺之罪王曰封汝典聽朕毖汝當常聽念我所愼而篤行之勿辨乃司民湎于酒辨使也勿使汝主民之吏湎于酒言當正身以帥民梓材第十三周書孔氏傳梓材告康叔以為政之道亦如梓人治材梓音子本亦作杍馬云古作梓字治木器曰梓治土器曰陶治金器曰冶王曰封以厥庶民暨厥臣逹大家言當用其衆人之賢者與其小臣之良者以通逹卿大夫及都家之政於國暨其器反以厥臣逹王惟邦君汝當信用其臣以通王教於民言通民事於國通王教於民惟乃國君之道汝若恆越曰我有師師汝為君道使順常於是曰我有典常之師可師法司徒司馬司空尹旅曰豫罔厲殺人言國之三卿正官衆大夫皆順典常而曰我無厲虐殺人之事如此則善矣重言司徒至尹旅立政牧誓作亞旅亦厥君先敬勞肆徂厥敬勞亦其為君之道當先敬勞民故汝往治民必敬勞來之勞力報反下同來力代反肆往姦宄殺人歷人宥以民當敬勞之故汝往之國又當詳察姦宄之人及殺人賊所過歷之人有所寬宥亦所以敬勞之宄音軌肆亦見厥君事戕敗人宥聽訟折獄當務從寬恕故往治民亦當見其為君之事察民以過誤殘敗人者當寬宥之見如字徐賢遍反戕徐在羊反又七良反馬云殘也折之舌反王啓監厥亂為民言王者開置監官其治為民不可不勉監工暫反劉工銜反下同為于僞反注同治直吏反曰無胥戕無胥虐至于敬寡至于屬婦合由以容當教民無得相殘傷相虐殺至於敬養寡弱至於存恤妾婦和合其教用大道以容之無令見冤枉屬婦上音蜀妾之事妻也令力呈反篇末同冤紆元反一本作以冤王其效邦君越御事厥命曷以王者其效實國君及於御治事者知其教命所施何用不可不勤重言越御事二後見洛誥引養引恬自古王若兹監罔攸辟能長養民長安民用古王道如此監無所復罪當矜之恬田廉反辟扶亦反惟曰若稽田既勤敷菑惟其陳修為厥疆畎言為君監民惟若農夫之考田巳勞力布發之惟其陳列修治為其疆畔畎壟然後功成以喻教化菑側其反畎工犬反若作室家既勤垣墉惟其塗墍茨如人為室家巳勤正垣墻惟其當塗墍茨蓋之垣音袁墉音庸馬云卑曰垣髙曰墉墍徐許既反說文云仰塗廣雅云塗也馬云堊色一音故愛反茨徐在私反若作梓材既勤朴斫惟其塗丹雘為政之術如梓人治材為器巳勞力朴治斫削惟其當塗以漆丹以朱而後成以言教化亦須禮義然後治朴普角反馬云未成器也斫丁角反雘枉略反徐烏郭反馬云善丹也說文云讀與靃同也又一郭反字林音同今王惟曰先王既勤用明德懷為夾言文武巳勤用明德懷逺為近汝治國當法之夾音協近也庶邦享作兄弟方來亦既用明德衆國朝享於王又親仁善鄰為兄弟之國萬万皆來賔服亦巳奉用先王之明德朝直遙反后式典集庶邦不享君天下能用常法則和集衆國大來朝享皇天既付中國民越厥疆土于先王肆大天巳付周家治中國民矣能逺拓其界壤則於先王之道遂大付如字馬本作附拓音託王惟德用和懌先後迷民用懌先王受命今王惟用德和恱先後天下迷愚之民先後謂教訓所以恱先王受命之義懌音亦字又作斁下同先悉薦反注同巳若兹監惟曰欲至于萬年惟王為監所行巳如此所陳法則我周家惟欲使至於萬年承奉王室監古陷反為于威反子子孫孫永保民又欲令其子孫纍丗長居國以安民召誥第十四周書孔氏傳成王在豐欲宅洛邑成王克商遷九鼎於洛邑欲以為都故成王居焉使召公先相宅相所居而卜之遂以陳戒召時照反相息亮反下注同作召誥召誥召公以成王新即政因相宅以作誥惟二月既望周公攝政七年二月十五日日月相望因紀之越六日乙未王朝步自周則至于豐於巳望後六日二十一日成王朝行從鎬京則至于豐以遷都之事告文王廟告文王則武王可知以祖見考鎬胡老反見腎遍反下不見同重言王朝步自周則至於豐三武成本篇畢命二篇無則字惟太保先周公相宅太保三公官名召公也召公於周公前相視洛居周公後往先悉薦反又如字越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅朏明也月三日明生之名於順來三月丙午朏於朏三日三月五日召公早朝至于洛邑相卜所居朏芳尾反又普沒反徐又芳憤反重意三月惟丙午朏畢命六月庚午朏太保朝至于洛洛誥朝至于洛師厥既得卜則經營其巳得吉卜則經營規度城郭郊廟朝市之位處度待洛反朝直遙反處昌慮反越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成於戊申三日庚戌以衆殷之民治都邑之位於洛水北今河南城也於庚戌五日所治之位皆成言衆殷本其所自來汭如鋭反若翼日乙卯周公朝至于洛周公順位成之明日而朝至于洛汭則逹觀于新邑營周公通逹觀新邑所營言周遍越三日丁巳用牲于郊牛二於乙卯三日用牲告立郊位於天以后稷配故二牛后稷貶於天有羊豕羊豕不見可知越翼日戊午乃社于新邑牛一羊一豕一告立社稷之位用太牢也共工氏子曰句龍能平水土祀以為社周祖后稷能殖百穀祀以為稷社稷共牢共音恭句故侯反越七日甲子周公乃朝用書命庶殷侯甸男邦伯於戊午七日甲子是時諸侯皆㑹故周公乃昧爽以賦功屬役書命衆殷侯甸男服之邦伯使就功邦伯方伯即州牧也屬音燭厥既命殷庶庶殷丕作其巳命殷衆衆殷之民大作言勸事太保乃以庶邦冡君出取幣乃復入諸侯公卿並覲於王王與周公俱至文不見王無事召公與諸侯出取幣欲因大㑹顯周公復扶又反錫周公曰拜手稽首旅王若公召公以幣入稱成王命賜周公曰敢拜手稽首陳王所冝順周公之事重言拜手稽首四本篇二立政篇二誥告庶殷越自乃御事召公指戒成王而以衆殷諸侯於自乃御治事為辭謙也諸侯在故託焉嗚呼皇天上帝改厥元子兹大國殷之命歎皇天改其太子此大國殷之命言紂雖為天所太子無道猶改之言不可不愼惟王受命無疆惟休亦無疆惟恤所以戒成王天改殷命惟王受之乃無窮惟美亦無窮惟當憂之重意受命無疆惟休君奭我受命無疆惟休太甲實萬丗無疆之休嗚呼曷其奈何弗敬何其奈何不憂敬之欲其行敬重言曷其奈何弗敬二前見五子之歌無曷其二字天既遐終大邦殷之命兹殷多先哲王在天言天巳逺終殷命此殷多先智王精神在天不能救者以紂不行敬故越厥後王後民兹服厥命於其後王後民謂先智王之後繼丗君臣比服其命言不恭厥終智藏􅘃在其終後王之終謂紂也賢智隱藏􅘃病者在位言無良臣瘝工顔反夫知保抱攜持厥婦子以哀籲天徂厥亡出執言困於虐政夫知保抱其子攜持其妻以哀號呼天告冤無辜往其逃亡出見執殺無地自容所以窮夫知並如字注同籲音喻呼也號戶髙反嗚呼天亦哀于四方民其眷命用懋民哀呼天天亦哀之其顧視天下有德者命用勉敬者為民主王其疾敬德相古先民有夏言王當疾行敬德視古先民有夏之王以為法戒之天迪從子保面稽天若今時既墜厥命夏禹能敬德天道從而子安之禹亦面考天心而順之今是桀棄禹之道天巳墜其王命重言面稽天若今時既墜厥命二見下文今相有殷次復觀有殷天迪格保面稽天若言天道所以至於保安湯者亦如禹今時既墜厥命墜其王命今冲子嗣則無遺壽耇童子言成王少嗣位治政無遺棄老成人之言欲其法之少詩照反曰其稽我古人之德矧曰其有能稽謀自天冲子成王其考行古人之德則善矣况曰其有能考謀從天道乎言至善嗚呼有王雖小元子哉其丕能諴于小民今休召公歎曰有成王雖少而人為天所子其大能和於小民成今之美勉之諴音咸王不敢後用顧畏于民碞王為政當不敢後能用之士必任之為先碞僭也又當顧畏於下民僭差禮義能此二者則德化立而美道成碞五咸反徐又音吟王來紹上帝自服于土中言王今來居洛邑繼天為治躬自服行教化於地勢正中治直吏反下為治致治皆同旦曰其作大邑其自時配皇天稱周公言其為大邑於土中其用是大邑配上天而為治毖祀于上下其自時中乂為治當愼祀于天地則其用是土中大致治重言其自時中乂二見洛誥王厥有成命治民今休用是土中致治則王其有天之成命治民今獲太平之美王先服殷御事比介于我有周御事召公既述周公所言又自陳巳意以終其戒言當先服治殷家御事之臣使比近於我有周治事之臣必和協乃可一比毗志反徐扶志反近附近之近節性惟日其邁和比殷周之臣時節其性令不失中則道化惟日其行令力呈反王敬作所不可不敬德敬為所不可不敬之德則下敬奉其命矣我不可不監于有夏亦不可不監于有殷言王當視夏殷法其歷年戒其不長我不敢知曰有夏服天命惟有歷年以能敬德故多歷年數我不敢獨知亦王所知重言我不敢知六本篇四君奭二惟有歷年二見下文我不敢知曰不其延惟不敬厥德乃早墜厥命言桀不謀長久惟以不敬其德故乃早墜失其王命亦王所知我不敢知曰有殷受天命惟有歷年夏言服殷言受明受而服行之互相兼也殷之賢王猶夏之賢王所以歷年亦王所知我不敢知曰不其延惟不敬厥德乃早墜厥命紂早墜其命猶桀不敬其德亦王所知今王嗣受厥命我亦惟兹二國命嗣若功其夏殷也繼受其王命亦惟當以此夏殷長短之命為監戒繼順其功德者而法則之王乃𥘉服嗚呼若生子罔不在厥𥘉生自貽哲命言王新即政始服行教化當如子之𥘉生習為善則善矣自遺智命無不在其𥘉生為政之道亦猶是也遺唯季反今天其命哲命吉凶命歷年今天制此三命惟人所修修敬德則有智則常吉則歷年為不敬德則愚凶不長雖說之其實在人知今我𥘉服宅新邑肆惟王其疾敬德天巳知我王今𥘉服政居新邑洛都故惟王其當疾行敬德王其德之用祈天永命言王當其德之用求天長命以歷年重言祈天永命又見本篇末其惟王勿以小民淫用非彞勿用小民過用非常欲其重民秉常亦敢殄戮用乂民亦當果敢絶刑戮之道用治民戒以愼罰若有功其惟王位在德元順行禹湯所有成功則其惟王居位在德之首小民乃惟刑用于天下越王顯主在德元則小民乃惟用法於天下言治政於王亦有光明上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年言當君臣勤憂敬德曰我受天命大順有夏之多歷年勿用廢有殷歷年庶幾兼之欲王以小民受天永命我欲王用小民受天長命言常有民拜手稽首曰豫小臣敢以王之讎民百君子拜手首至手稽首首至地盡禮致敬以入其言言我小臣謙辭敢以王之匹民百君子治民者非一人言民在下自上匹之讎字或作酬重言拜手稽首四本篇二立政二越友民保受王威命明德言與匹民百君子於友愛民者共安受王之威命明德奉行之王末有成命王亦顯臣下安受王命則王終有天成命於王亦昭著我非敢勤惟恭奉幣用供王能祈天永命言我非敢獨勤而巳惟恭敬奉其幣帛用供待王能求天長命將以慶王多福必上下勤恤乃與小民受天永命奉如字又芳孔反供音恭徐紀用反注供待同重言祈天永命重見上文監本纂圖重言重意互注尚書卷第八
