body:
  text: 監本纂圖重言重意互註尚書卷第十三文侯之命第三十周書孔氏傳平王錫晉文侯秬鬯圭瓉以圭爲杓柄謂之圭瓉平王馬本無平字錫星歴反馬本作賜秬音巨鬯勑亮反瓉才但反杓上灼反柄彼病反作文侯之命所以名篇幽王爲犬戎所殺平王立而東遷洛邑晉文侯迎送安定之故錫命焉文侯之命平王命爲侯伯王若曰父義和順其功而命之文侯同姓故稱曰父義和字也稱父者非一人故以字别之義本亦作誼和馬云能以義和諸侯別彼列反重言父義和三連見下文丕顯文武克愼明德大明乎文王武王之道能詳愼顯用有德昭升于上敷聞在下惟時上帝集厥命于文王更述文王所以王也言文王聖德明升于天而布聞在下民惟以是故上天集成其王命德流子孫聞音問以王于況反亦惟先正克左右昭事厥辟言君旣聖明亦惟先正官賢臣能左右明事其君所以然辟必亦反重意克左右昭事厥辟大甲上克左右厥辟越小大謀猷罔不率從肆先祖懷在位文王君聖臣良於小大所謀道德天下無不循從其化故我後丗先祖歸在王位嗚呼閔予小子嗣造天丕愆歎而自痛傷也言我小子而遭天大罪過父死國敗祖業隤隕予如字又音與愆去䖍反隤杜回反隕于敏反重意閔予小子泰誓君牙惟予小子泰誓肆矛小子大誥越予小子康誥汝惟小子洛誥以予小子周官今予小子殄資澤于下民侵戎我國家純言周邦喪亂絶其資用惠澤于下民侵兵傷我國及卿大夫之家禍甚大殄大見反即我御事罔或耆壽俊在厥服予則罔克所以遇禍即我治事之臣無有耆宿壽考俊徳在其服位我則林劣無能之致曰惟祖惟父其伊恤朕躬嗚呼有績予一人永綏在位王曰同姓諸侯在我惟祖惟父列者其惟當憂念我身嗚呼能有成功則我一人長安在王位言恃諸侯重意永綏在位微子之命永綏厥位父義和汝克昭乃顯祖重稱字親之不稱名尊之言汝能明汝顯祖唐叔之道奬之重直用反重言父義和三並本篇汝肇刑文武用㑹紹乃辟追孝于前文人言汝今始法文武之道矣當用是道合㑹繼汝君以善使追孝於前文德之人汝君平王自謂也繼先祖之志爲孝辟扶亦反汝多修扞我于艱若汝予嘉戰功曰多言汝之功多甚修矣乃扞我於艱難謂救周誅犬戎汝功我所善之托下旦反住同王曰父義和其歸視爾師寜爾邦遣令還晉國其歸視汝衆安汝國内上下令力呈反用賚爾秬鬯一卣黒黍曰秬釀以鬯草不言圭瓉可知卣中罇也當以錫命告其始祖故賜鬯賚力代反卣音酉又音由釀女亮反彤弓一彤矢百盧弓一盧矢百彤赤盧黒也諸侯有大功賜弓矢然後專征伐彤弓以講德習射藏示子孫彤徒冬反馬四匹馬供武用四匹曰乗侯伯之賜無常以功大小爲度供音恭父往哉柔逺能邇惠康小民無荒寜父往歸國哉懷柔逺人必以文德能柔逺者必能柔近然後國安安小人之道必以順無荒廢人事而自安重言往哉十舜典三盤庚微子之命康誥畢命本篇各一柔逺能邇三舜典顧命本篇重意惠康小民無逸懷保小民又蔡仲之命康濟小民簡恤爾都用成爾顯德當簡核汝所任憂治汝都鄙之人人和政治則汝顯用有德之功成矣不言鄙由近以及逺核戸革反治直吏反費誓第三十一周書孔氏傳魯侯伯禽宅曲阜始封之國居曲阜伯禽魯侯名徐戎並興東郊不開徐戎淮夷並起爲冦於魯故東郊不開開舊讀皆作開馬本作闢作費誓魯侯征之於費地而誓衆也諸侯之事而連帝王孔子序書以魯有治戎征討之備秦有悔過自誓之戒足爲丗法故録以備王事猶詩録商魯之頌費音秘費誓費魯東郊之地名公曰嗟人無譁聽命伯禽爲方伯監七百里内之諸侯帥之以征歎而勑之使無諠譁欲其静聽誓命譁戸瓜反監工銜反重意嗟人無譁聽命詳見秦誓篇徂兹淮夷徐戎並興今往征此淮浦之夷徐州之戎並起爲寇此戎夷帝王所羈縻統緒故錯居九州之内秦始皇逐出之善􅰴乃甲胄敿乃干無敢不弔言當善簡汝甲鎧胄兠鍪施汝楯紛無敢不令至攻堅使可用􅰴了彫反敿居表反弔音的鎧苦代反兠丁侯反鍪音矛楯常凖反又音允紛芳云反備乃弓矢鍜乃戈矛礪乃鋒刃無敢不善備汝弓矢弓調矢利鍜鍊戈矛磨礪鋒刃皆使無敢不功善鍜丁亂反礪力丗反鍊來見反今惟淫舎牿牛馬今軍人惟大放舎牿牢之牛馬言軍所在必放牧也牿工毒反杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑擭捕獸機檻當杜塞之穽穿地䧟獸當以工窒敜之無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘人畜之常刑杜本又作􅖏穫華化反徐戸覆反敜徐乃協反又乃結反穽在性反檻戸减反窒珍栗反畜許六反又丑六反重言汝則有常刑三下文二又嗣征篇邦有常刑馬牛其風臣妾逋逃勿敢越逐馬牛其有風佚臣妾逋亡勿敢棄越壘伍而求逐之役人賤者男曰臣女曰妾逋布呉反佚音逸祗復之我商賚汝衆人其有得佚馬牛逃臣妾皆敬還復之我則商度汝功賜與汝商如字徐音章賚力代反又音來度待洛反乃越逐不復汝則有常刑越逐爲失伍不還爲攘盗汝則有此常刑無敢寇攘踰垣牆軍人無敢暴刧人踰越人垣牆物有自來者無敢取之攘如羊反垣音袁重意無敢寇攘康誥寇攘姦宄竊馬牛誘臣妾汝則有常刑軍人盗竊馬牛誘偷奴婢汝則有犯軍令之常刑甲戌我惟征徐戎誓後甲戌之日我惟征之峙乃糗糧無敢不逮汝則有大刑皆當儲峙汝糗糒之糧使足食無敢不相逮及汝則有乏軍興之死刑峙直里反爾雅云具也糗去九反一音昌紹反糧音良糒音備重言汝則有大刑二並見本篇魯人三郊三遂峙乃楨榦甲戌我惟築揔諸國之兵而但稱魯人峙具楨榦道近也題曰楨旁曰榦言三郊三遂明東郊距守不峙甲戌日當築攻敵壘距堙之屬楨音貞榦工翰反築陟六反守手又反堙音因重言魯人三郊三遂二見下文無敢不供汝則有無餘刑非殺峙具楨榦無敢不供不供汝則有無餘之刑刑者非一也然亦非殺汝供音恭魯人三郊三遂峙乃芻茭無敢不多汝則有大刑郊遂多積芻茭供軍牛馬不多汝則亦有乏軍興之大刑芻𥘉俱反茭音交重言汝則有大刑見上文秦誓第三十二周書孔氏傳秦穆公伐鄭遣三帥帥師往伐之陸云事見魯僖公三十三年三帥色類反下注同謂孟明視西乞術白乙丙晉襄公帥師敗諸崤崤晉要塞也以其不假道伐而敗之囚其三帥崤戸交反塞悉代反假工下反還歸作秦誓晉舎三帥還歸秦穆公悔過作誓秦誓貪鄭取敗悔而自誓公曰嗟我士聽無譁誓其羣臣通稱士也重意嗟我士聽無譁費誓嗟人無譁聽命予誓告汝羣言之首衆言之本要古人有言曰民訖自若是多盤言民之行巳盡用順道是多樂稱古人言悔前不順忠臣樂音洛重言古人有言曰四秦誓酒誥牧誓本篇責人斯無難惟受責俾如流是惟艱哉人之有非以義責之此無難也若巳有非惟受人責即改之如水流下是惟難哉俾必爾反下同重意是惟艱哉伊訓兹惟艱哉君牙厥惟艱哉我心之憂日月逾邁若弗云來言我心之憂欲改過自新如日月並行過如不復云來雖欲改悔恐死及之無所益復扶又反惟古之謀人則曰未就予忌惟爲我執古義之謀人謂忠賢蹇叔等也則曰未成我所欲反忌之耳爲于僞反下爲我謀同惟今之謀人姑將以爲親惟指今事爲我所謀之人我且將以爲親而用之悔前違古從今以取破敗雖則云然尚猷詢兹黃髮則罔所愆言前雖則有云然之過今我庶幾以道謀此黄髮賢老則行事無所過矣畨畨良士旅力旣愆我尚有之勇武畨畨之良士雖衆力巳過老我今庶幾欲得此人而用之畨音波仡仡勇夫射御不違我尚不欲仡仡壯勇之夫雖射御不違我庻幾不欲用自悔之至仡許訖反又魚乞反馬本作訖訖無所省録之貌徐云強狀射神夜反惟截截善諞言俾君子易辭我皇多有之昧昧我思之惟察察便巧善爲辨侫之言使君子回心易辭我前多有之以我昧昧思之不明故也截才節反馬云辭語截剥省要也諞音辨徐扶連反又甫淺反馬本作偏云少也辭約損明大辨佞之人易羊石反昧音妹如有一介臣斷斷猗無他技其心休休焉其如有容如有束脩一介臣斷斷猗然專一之臣雖無他技藝其心休休然樂善其如是則能有所容言將任之介音界馬本作介云一介耿介一心端慤者字又作个音工佐反斷丁亂反又音短猗於綺反又於冝反技其綺反本亦作伎他本亦作它吐何反樂音洛人之有技若已有之人之彦聖其心好之不啻如自其口出是能容之人之有技若已有之樂善之至也人之美聖其心好之不啻如自其口出心好之至也是人必能容之好呼報反啻失䜴反重言人之有技二下文一人之彦聖二下文一以保我子孫黎民亦職有利哉用此好技聖之人安我子孫衆人亦主有利哉言能興國人之有技冒疾以惡之人之彦聖而違之俾不逹見人之有技藝蔽冐疾害以惡之人之美聖而違背壅塞之使不得上通冐莫報反惡烏路反背音佩壅於勇反塞先得反是不能容以不能保我子孫黎民亦曰殆哉冐疾之人是不能容人用之不能安我子孫衆人亦曰危殆哉殆唐在反邦之杌􅥳曰由一人杌陧不安言危也一人所任用國之傾危曰由所任不用賢杌五骨反隉五結反徐語折反邦之榮懷亦尚一人之慶國之光榮爲民所歸亦庻幾其所任用賢之善也穆公陳戒背賢則危用賢則榮自誓改前過之意重意亦尚一人之慶吕刑一人有慶監本纂圖重言重意互註尚書卷十三
