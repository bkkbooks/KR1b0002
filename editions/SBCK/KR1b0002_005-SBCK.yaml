body:
  text: 監本纂圖重言重意互註尚書卷第五盤庚上第九商書孔氏傳盤庚五遷將治亳殷自湯至盤庚凡五遷都盤庚治亳殷盤本又作般歩干反治直吏反民咨胥怨胥相也民不欲徙乃咨嗟憂愁相與怨上胥徐思餘反怨紆萬反作盤庚三篇盤庚盤庚殷王名殷質以名篇馬云祖乙曾孫祖丁之子不言盤庚誥何非但録其誥也取其徙而立功故以盤庚名篇盤庚遷于殷亳之别名民不適有居適之也不欲之殷有邑居率􅈼衆慼岀矢言􅈼和也率和衆憂之人出正直之言􅈼音喻慼千歷反曰我王來旣爰宅于兹我王祖乙居耿爰於也言祖乙巳居於此重我民無盡劉劉殺也所以遷此重我民無欲盡殺故盡子忍反不能胥匡以生卜稽曰其如台言民不能相匡以生則當卜考于􅀛以徙曰其如我所行稽工􅀆反台音怡重言其如台二本篇髙宗肜日重意卜稽曰其如台湯誓夏罪其如台髙宗肜日乃曰其如台西伯戡􅀺今王其如台先王有服恪謹天命兹猶不常寜先王有所服行敬謹天命如此尚不常安有可遷輒遷恪苦各反不常厥邑于今五􅀖湯遷亳仲丁遷嚻河亶甲居相祖乙居耿我往居亳凡五徙國都馬云五􅀖謂商丘亳嚻相耿也今不承于古罔知天之斷命今不承古而徙是無知天將斷絶汝命斷又音短矧曰其克從先王之烈天將絶命尚無知之兄能從先王之業乎從才容反􅀂顚木之有由蘗言今往遷都更求昌盛如顚仆之木有用生蘖哉蘖五逹反本又作枿馬云顚木而肄生曰枿仆音赴又步北反天其永我命于兹新邑言天其長我命於此新邑不可不徙紹復先王之大業底綏四方言我徙欲如此厎之履反重意厎綏四方泰誓寵綏四方盤庚斆于民由乃在位以常舊服正法度斆教也教人使用汝在位之命用常故事正其法度斆戸教反下如字度如字曰無或敢伏小人之攸箴言無有敢伏絶小人之所欲箴規上者戒朝臣箴音之林反馬云諫也朝直遥反王命衆悉至于庭衆羣臣以下王􅀂曰格汝衆予告汝訓告汝以法教汝猷黜乃心無傲從康謀退汝違上之心無傲慢從心所安傲鄭五報反古我先王亦惟圖任舊人共政先王謀任乆老成人共治其政任而鴆反重言古我先王三本篇二盤庚下篇一重意亦惟圖任舊人共政大誥爾惟舊人王播告之修不匿厥指王布告人以所修之政不匿其指播波餓反匿女力反王用丕欽罔有逸言民用丕變王用大敬其政教無有逸豫之言民用大變從化今汝聒聒起信險膚子弗知乃所訟聒聒無知之貌起信險僞膚受之言我不知汝所訟言何謂聒故活反馬及􅀃文皆云拒善自用之意非予自荒兹德惟汝含德不惕予一人予􅀂觀火我之欲徙非廢此德汝不從我命所含惡德但不畏懼我耳我視汝情如視火惕他歷反予亦拙謀作乃逸逸過也我不威脅汝徙是我拙謀成汝過拙之劣反􅀂網在綱有條而不紊􅀂農服田力穡乃亦有秋紊亂也穡耕稼也下之順上當如網在綱各有條理而不亂也農勤穡則有秋下承上則有福紊音問徐音文汝克黜乃心施實德于民至于㛰友丕乃敢大言汝有積德汝羣臣能退汝違上之心施實德於民至于㛰姻僚友則我大乃敢言汝有積德之臣乃不畏戎毒于逺邇惰農自安不昬作勞不服田畒越其罔有􅁰稷戎大昬強越於也言不欲徙則是不畏大毒於逺近如怠惰之農苟自安逸不強作勞於田畒則􅁰稷無所有昬馬同本或作暋音敏爾雅昬暋皆訓強故兩存越本又作粤音曰于也強其丈反汝不和吉言于百姓惟汝自生毒責公卿不能和喻百官是自生毒害乃敗禍姦宄以自災于厥身予有咎我刑戮汝非我咎也靖謀也是汝自爲非謀所致馬云靖安也遲任有言曰人惟求舊器非求舊惟新遲任古賢言人貴舊器貴新汝不徙是不貴舊遟直疑反徐待夷反任而今反馬云古老成人古我先王曁乃祖乃父胥及逸勤予敢動用非罰言古之君臣相與同勞逸子孫所冝法之我豈敢動用非常之罰脅汝乎重言古我先王三本篇二盤庚下一丗選爾勞予不掩爾善選數也言我丗丗數汝功勤丕掩蔽汝善是我忠於汝選息轉反又思管反掩本又作弇數色主反兹予大享于先王爾祖其從與享之古者天子録功臣配食於廟大享烝甞也所以不掩汝善與音預烝之承反作福作災予亦不敢動用非德善自作福惡自作災我不敢動用非罰加汝非德賞汝乎從汝善惡而報之予告汝于難􅀂射之有志告汝行事之難當如射之有所凖志必中所志乃善射食夜反凖音准中丁仲反汝無侮老成人無弱􅀌有㓜不用老成人之言是侮老之不徙則􅀌㓜受害是弱易之侮亡甫反易以䜴反各長于厥居勉出乃力聽予一人之作猷盤庚勑臣下各思長於其居勉盡心出力聽從遷徙之謀長丁丈反無有逺邇用罪伐厥死用德彰厥善言逺近待之如一罪以懲之使勿犯伐去其死道德以明之使勸慕競爲善去起吕反重言無有逺邇二本篇旅􅋙􅀖之臧惟汝衆有善則衆臣之功臧徐子郎反􅀖之不臧惟予一人有佚罰佚失也是己失政之罰罪已之義佚音逸凡爾衆其惟致告致我誠告汝衆自今至于後日各恭爾事齊乃位度乃口奉其職事正齊其位以法度居汝口勿浮言度徐如字亦作渡罰及爾身弗可悔不從我謀罰及汝身雖悔可及乎盤庚中第十商書孔氏傳盤庚作惟渉河以民遷爲此南渡河之法用民徙乃話民之弗率誕告用亶其有衆話善言民不循教發善言大告用誠於衆話胡快反馬云告也言也誕徐音但亶丁但反馬本作單音同誠也咸造勿䙝在王庭造至也衆皆至王庭無䙝慢造十報反注同馬在早反云爲也䙝息列反盤庚乃登進厥民升進命使前曰明聽朕言無荒失朕命荒廢重意明聽朕言湯誓悉聽朕言泰誓咸聽朕言吕刑皆聽朕言嗚呼古我前后罔不惟民之承言我先丗賢君無不承安民而恤之重意古我前后本篇古我先后上篇下篇古我先王保后胥慼鮮以不浮于天時民亦安君之政相與憂行君令浮行也少以不行於天時者言皆行天時鮮息淺反殷降大虐先王不懷我殷家於天降大災則先王不思故居而行徙厥攸作視民利用遷其所爲視民有利則用徙汝曷弗念我古后之聞古后先王之聞謂遷事曷何末反下同承汝俾汝惟喜康共非汝有咎比于罰今我法先王惟民之承故承汝使汝徙惟與汝其喜安非謂汝有惡徙汝令比近於殃罰俾必爾反咎其九反比毗志反徐扶志反注及下同共羣用反令力呈反近附近之近予􅀂􅈼懷兹新邑亦惟汝故以丕從厥志言我順和懷此新邑欲利汝衆故大從其志而徙之􅈼羊戍反今予將試以汝遷安定厥􅀖試用重言今予將試以汝遷二並本篇汝不憂朕心之攸困所困不順上命乃咸大不宣乃心欽念以忱動予一人汝皆大不布腹心敬念以誠感動我是汝不盡忠忱市林反爾惟自鞠自苦鞠窮也言汝爲臣不忠自取窮苦鞠居六反􅀂乗舟汝弗濟臭厥載言不徙之害如舟在水中流不渡臭敗其所載物臭徐尺售反載如字又在代反爾忱不屬惟胥以沈不其或稽自怒曷瘳汝忠誠不屬逮古苟不欲徙相與沈溺不考之先王禍至自怒何瘳瘥乎屬音燭注同馬云獨也沈直林反瘳勑留反汝不謀長以思乃災汝誕勸憂汝不謀長乆之計思汝不徙之災苟不欲徙是大勸憂之道今其有今罔後汝何生在上言不徙無後計汝何得乆生在人上禍將及汝今予命汝一無起穢以自臭我一心命汝汝違我是自臭敗穢於廢反恐人􅀝乃身迂乃心言汝旣不欲徙又爲他人所誤􅀝曲迂僻􅀝於綺反徐於竒反迂音于僻匹亦反予迓續乃命于天予豈汝威用奉畜汝衆迓迎也言我徙欲迎續汝命于天豈以威脅汝乎用奉畜養汝衆迓五駕反畜許竹反下同脅虚業反予念我先神后之勞爾先予丕克羞爾用懷爾然言我亦法湯大能進勞汝以義懷汝心而汝違我是汝反先人勞力報反又如字注同失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民崇重也今旣失政而陳乆於此而不徙湯必大重下罪疾於我曰何爲虐我民而不徙乎重直勇反又直恭反汝萬民乃不生生曁予一人猷同心不進進謀同心徙先后丕降與汝罪疾曰曷不曁朕㓜孫有比言非但罪我亦將罪汝㓜孫盤庚自謂比同心故有爽德自上其罰汝汝罔能迪湯有明德在天見汝情下罰汝汝無能道言無辭古我先后旣勞乃祖乃父勞之共治人重意古我先后篇首古我前后汝共作我畜民汝有戕則在乃心戕殘也汝共我治民有殘人之心而不欲徙是反父祖之行戕在良反又七良反行下孟反我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死言我先王安汝父祖之忠今汝不忠汝父祖必斷絶棄汝命不救汝死斷丁緩反重意乃祖乃父君牙惟乃祖乃父兹予有亂政同位具乃貝玉亂治也此我有治政之臣同位於父祖不念盡忠但念貝玉而巳言其貪洽直吏反盡子忍反乃祖乃父丕乃告我髙后曰作丕刑于朕孫言汝父祖見汝貪而不忠必大乃告湯曰作大刑於我子孫求討不忠之罪乃告工號反我髙后本又作乃祖乃父迪髙后丕乃崇降弗祥言汝父祖開道湯大重下不善以罰汝陳忠孝之義以督之嗚呼今予告汝不易凡所言皆不易之事易以䜴反注同永敬大恤無胥絶逺長敬我言大憂行之無相與絶逺棄廢之逺干萬反又如字注同汝分猷念以相從各設中于乃心羣臣當分明相與謀念和以相從各設中正於汝心汝分扶問反又如字注同乃有不吉不迪不善不道謂凶人顚越不恭暫遇姦宄顚隕越墜也不恭不奉上命暫遇人而刼奪之爲姦於外爲宄於内隕于敏反我乃劓殄滅之無遺育無俾易種于兹新邑劓割育長也言不吉之人當割絶滅之無遺長其􅀋無使易種於此新邑劓魚器反徐吾氣反殄徒典反易如字又以䜴反注同長丁丈反下遺長同互註左哀十一年呉將伐齊越子率其衆以朝焉子胥諌曰越在我心腹之疾也壤地同而有欲於我夫其柔服求儕其欲也不如早從事焉得志於齊猶獲石田也無所用之越不爲沼呉其泯矣使醫除疾而曰不遺􅀋焉者未之有也盤庚之誥曰其有顚越不共則劓殄無遺育無俾易種于兹新邑是商所以興也今君易之將以求大不亦難乎弗聽往哉生生今予將試以汝遷永建乃家自今巳往進進於善我用以汝徙長立汝家卿大夫稱家重言往哉七舜典二本篇微子之命康誥畢命文侯之命各一今予將試以汝遷二並本篇盤庚下第十一商書孔氏傳盤庚旣遷奠厥攸居乃正厥位定其所居正郊廟朝社之位奠田薦反朝直遥反綏爰有衆曰無戲怠懋建大命安於有衆戒無戲怠勉立大教今予其敷心腹腎腸歷告爾百姓于朕志布心腹言輸誠於百官以告志腎時忍反腸徐持良反罔罪爾衆爾無共怒恊比讒言予一人羣臣前有此過故禁其後今我不罪汝汝勿共怒我合比凶人而妄言比毗志反讒仕咸反古我先王將多于前功言以遷徙多大前人之功美重意古我先王上篇古我前后又古我先后適于山用降我凶德嘉績于朕􅀖徙必依山之險無城郭之勞下去凶惡之德立善功於我國降工巷反徐下江反去羌吕反今我民用蕩析離居罔有定極水泉沈溺故蕩析離居無安定之極徙以爲之極析先歷反注同重言今我民又西伯戡􅀺爾謂朕曷震動萬民以遷言皆不眀巳本心肆上帝將復我髙祖之德亂越我家以徙故天將復湯德治理於我家治直吏反朕及篤敬恭承民命用永地于新邑言我當與厚敬之臣奉承民命用長居新邑肆予冲人非廢厥謀弔由靈冲童童人謙也弔至靈善也非廢謂動謀於衆至用其善弔音的或如字重言肆予冲人重見大誥各非敢違卜用宏兹賁宏賁皆大也君臣用謀不敢違卜用大此遷都大業賁扶云反嗚呼􅀖伯師長百執事之人尚皆隱哉國伯二伯及州牧也衆長公卿也言當庶幾相隱括共爲善政長丁丈反注同予其懋簡相爾念敬我衆簡大相助也勉大助汝念敬我衆民相息亮反朕不肩好貨敢恭生生鞠人謀人之保居叙欽肩任也我不任貪貨之人敢奉用進進於善者人之窮困能謀安其居者則我式叙而敬之好呼報反任而林反今我旣羞告爾于朕志􅀂否罔有弗欽巳進告汝之後順於汝心與否當以情告我無敢有不敬告故報反重意罔有弗欽冏命罔有不欽無緫于貨寳生生自庸無緫貨寳以求位當進進皆自用功德式敷民德永肩一心用布示民必以德義長任一心以事君􅀃命上第十二商書孔氏傳髙宗夢得􅀃盤庚弟小乙子名武丁德髙可尊故號髙宗夢得賢相其名曰􅀃􅀃本又作兊音恱注及九有之師爰革夏正爰於也於得九有之衆遂伐夏勝之改其正非天私我有商惟天佑于一德非天私商而王之佑助一德所以王而王于况反下同或如字非商求于下民惟民歸于一德非商以力求民民自歸于一德德惟一動罔不吉德二三動罔不凶二三言不一惟吉凶不僭在人惟天降災祥在德行善則吉行惡則凶是不差德一天降之善不一天降之災是在德􅆫子念反今嗣王新服厥命惟新厥德其命王命新其德戒勿怠終始惟一時乃日新言德行終始不衰殺是乃日新之義行下孟反殺色界反衰微也殺害也言小小害也重意時乃日新仲虺之誥德日新任官惟賢材左右惟其人官賢材而任之非賢材不可任選左右必忠良不忠良非其人重意任官惟賢材武成建官惟賢左右惟其人周官官不必備惟其人臣爲上爲德爲下爲民言臣奉上布德順下訓民不可官所私任非其人爲上于僞反下爲民同爲德如字下爲下同徐皆于僞反其難其愼惟和惟一其難無以爲易其愼無以輕之羣臣當和一心以事君政乃善易以䜴反重意惟和惟一禹謨惟精惟一德無常師主善爲師德非一方以善爲主乃可師善無常主協于克一言以合於能一爲常德俾萬姓咸曰大哉王言一德之言故曰大又曰一哉王心能一德則一心克綏先王之禄永底烝民之生言爲王而令萬姓如此則能保安先王之寵禄長致衆民所以自生之道是明王之事烝之承反嗚呼七丗之廟可以觀德天子立七廟有德之王則爲祖宗其廟不毀故可觀德萬夫之長可以觀政能整齊萬夫其政可知長丁丈反后非民罔使民非后罔事君以使民自尊民以事君自生重意后非民罔使民非后罔事見大禹謨太甲無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥眩厥疾弗瘳開汝心以沃我心如服藥必瞑眩極其病乃除欲其出切言以自警瞑莫遍反眩玄遍反徐又呼縣反瞑眩困極也廖勑留反警音景􅀂跣弗視地厥足用傷跣必視地足乃無害言欲使爲己視聽跣先典反徐七顯反爲于僞反惟曁乃僚罔不同心以匡乃辟與汝並官皆當倡率無不同心以匡正汝君辟必亦反俾率先王迪我髙后以康兆民言匡正汝君使循先王之道蹈成湯之蹤以安天下重意以康兆民武成以濟兆民嗚呼欽予時命其惟有終敬我是命修其職使有終􅀃復于王曰惟木從繩則正后從諫則聖言木以繩直君以諌明后克聖臣不命其承君能受諌則臣不待命其承意而諌之疇敢不祗􅀂王之休命言王如此誰敢不敬順王之美命而諌者乎重意疇敢不祗􅀂王之休命下篇對揚天子之休命􅀃命中第十三商書孔氏傳惟􅀃命緫百官在􅃁宰之任緫音揔重意緫百官周官統百官乃進于王曰嗚呼明王奉􅀂天道建􅀖設都天有日月北斗五星二十八􅀫皆有尊卑相正之法言明王奉順此道以立國設都􅀫音秀重意奉􅀂天道仲虺之誥奉􅀂天命建􅀖設都武成建􅀖啓土樹后王君公承以大夫師長言立君臣上下將陳爲治之本故先舉其始王于方反長丁丈反治直史反下同不惟逸豫惟以亂民不使有位者逸豫民上言立之主使治民豫羊慮反惟天聦明惟聖時憲惟臣欽􅀂惟民從乂憲法也言聖王法天以立教臣敬順而奉之民以從上爲治從才容反重意惟天聦明惟聖時憲仲虺之誥惟天生聦明時乂惟口起羞惟甲冑起戎甲鎧胄兠鍪也言不可輕教令易用兵冑直又反鎧苦代反兠丁侯反鍪莫侯反易以䜴反惟衣裳在笥惟干戈省厥躬言服不可加非其人兵不可任非其才笥息嗣反省息井反一本作眚互註記緇衣兊命曰惟口起羞惟甲冑起兵惟衣裳在笥惟干戈省厥躬注云惟口起辱當愼言語也惟甲冑起兵當愼軍旅之事也惟衣裳在笥當服以爲禮也惟干戈省厥躬當恕己不尚害人也王惟戒兹允兹克明乃罔不休言王戒愼此四惟之事信能明政乃無不美惟治亂在庶官言所官得人則治失人則亂官不及私昵惟其能不加私昵惟能是官昵女乙反爵罔及惡德惟其賢言非賢不爵慮善以動動惟厥時非善非時不可動有其善䘮厥善矜其能䘮厥功雖天子亦必讓以得之䘮息浪反惟事事乃其有備有備無患事事非一事無啓寵納侮開寵非其人則納侮之道無恥過作非恥過誤而丈之遂成大非惟厥攸居政事惟醇其所居行皆如所言則王之政事醇粹醇音純粹雖遂反黷于􅀕祀時謂弗欽禮煩則亂事神則難􅀕不欲數數則黷黷則不敬事神禮煩則亂而難行髙宗之祀特豐數近廟故􅀃因以戒之黷徒木反數色角反王曰旨哉􅀃乃言惟服旨美也美其所言皆可服行乃不良于言予罔聞于行汝􅀂不善於所言則我無聞於所行之事􅀃拜稽首曰非知之艱行之惟艱言知之易行之難以勉髙宗重言􅀃拜稽首二又見下篇王忱不艱允恊于先王成德王心誠不以行之爲難則信合於先王成德忱市林反惟􅀃不言有厥咎王能行善而􅀃不言則有其咎罪􅀃命下第十四商書孔氏傳王曰來汝􅀃台小子舊學于甘盤學先王之道甘盤殷賢臣有道德者台音怡旣乃遯于荒野入宅于河旣學而中廢業遯居田野河洲也其父欲使髙宗知民之艱苦故使居民間遯徒頓反自河徂亳曁厥終罔顯自河往居亳與今其終故遂無顯明之德爾惟訓于朕志言汝當教訓於我使我志通逹􅀂作酒醴爾惟麴糵酒醴須麴糵以成亦言我須汝以成麴起六反糵魚列反􅀂作和羹爾惟鹽梅鹽鹹梅醋羹須鹹醋以和之羹音庚一音衡鹽余廉反梅亦作禖醋七故反和如字又胡卧反爾交修予罔予棄予惟克邁乃訓交非一之義邁行也言我能行汝教􅀃曰王人求多聞時惟建事學于古訓乃有獲王者求多聞以立事學於古訓乃有所得事不師古以克永丗匪􅀃攸聞事不法古訓而以能長丗非􅀃所聞言無是道惟學遜志務時敏厥修乃來學以順志務是敏疾其德之修乃來互註記學記夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也兊命曰敬孫務時敏厥修乃來其此之謂乎允懷于兹道積于厥躬信懷此學志則道積於其身惟斆學半念終始典于學厥德修罔覺斆教也教然後知所困是學之半終始常念學則其德之修無能自覺斆戸教反互註記檀弓古之君子舉大事必愼其終始而衆安得不喻焉兊命曰念終始典于學又學記古之王者建國君民教學爲先兊命曰念终始典于學其此之謂乎又學然後知不足教然後知困知不足然後能自反也知困然後能自強也故曰教學相長也兊命曰學學半其此之謂乎監于先王成憲其永無愆愆過也視先王成法其長無過其惟學乎愆起䖍反惟􅀃式克欽承旁招俊乂列于庶位言王能志學􅀃亦用能敬承王志廣招俊乂使列衆官俊本又作畯重意旁招俊乂太甲上旁求俊彦王曰嗚呼􅀃四海之内咸仰朕德時乃風風教也使天下皆仰我德是汝教仰如字徐五亮反股肱惟人良臣惟聖手足具乃成人有良臣乃成聖昔先正保衡作我先王保衡伊尹也作起正長也言先丗長官之臣長丁丈反下同乃曰予弗克俾厥后惟堯舜其心愧恥􅀂撻于市言伊尹不能使其君如堯舜則恥之􅀂見撻于市故成其能俾必爾反撻他逹反一夫不獲則曰時予之辜伊尹見一夫不得其所則以爲己罪佑我烈祖格于皇天言以此道左右成湯功至于天無能及者重言格于皇天二本篇君奭爾尚明保予罔俾阿衡專美有商汝庶幾明安我事則與伊尹同美阿烏何反惟后非賢不乂惟賢非后不食言君須賢治賢須君食治直吏反重意惟后非賢不乂惟賢非后不食太甲中民非后罔克胥匡以生后非民罔以辟四方其爾克紹乃辟于先王永綏民能繼汝君於先王長安民則汝亦有保衡之功辟必亦反􅀃拜稽首曰敢對􅀭天子之休命對荅也荅受美命而稱揚之重言􅀃拜稽首二前篇本篇重意敢對揚天子之休命上篇敢不祗􅀂王之休命髙宗肜日第十五商書孔氏傳髙宗􅀕成湯有飛雉升鼎耳而雊耳不聦之異雊鳴雊工豆反祖已訓諸王賢臣也以訓道諫王已音紀作髙宗肜日髙宗之訓所以訓也亡肜音融髙宗肜日􅀕之明日又祭殷曰肜周曰繹繹音亦字書作爾雅云又􅀕也周曰繹商曰肜夏曰復胙髙宗肜日越有雊雉於肜日有雉異祖已曰惟先格王正厥事言至道之王遭變異正其事而異自消乃訓于王曰惟天監下民典厥義祖已旣言遂以道訓諫王言天視下民以義爲常降年有永有不永非天夭民民中絶命言天之下年與民有義者長無義者不長非天欲夭民民自不修義以致絶命中丁仲反又如字民有不􅀂德不聽罪天旣孚命正厥德不順德言無義不服罪不改修天已信命正其德謂有永有不永乃曰其如台祖巳恐王未受其言故乃復曰天道其如我所言台音怡復扶又反重言其如台四湯誓盤庚本篇西伯戡黎嗚呼王司敬民罔非天㣧典祀無豐于昵㣧嗣昵近也歎以感王入其言王者主民當敬民事民事無非天所嗣常也􅀕祀有常不當特豐於近廟欲王因異服罪改修之豐芳弓反昵女乙反尸子云不避逺昵昵近也又乃禮反馬云昵考也謂禰廟也西伯戡􅀺第十六商書孔氏傳殷始咎周咎惡咎其九反馬云咎周者爲周所咎周人乗􅀺乗勝也所以見惡􅀺力􅀆反國名尚書大傳作􅂄祖伊恐祖已後賢臣奔告于受受紂也告相亂帝乙之子嗣立暴虐無道受如字傳云受紂也又馬本云受當讀曰紂或曰受婦人之言故號曰受也作西伯戡􅀺戡亦勝也伯亦作柏戡音堪􅀃文作云殺也以此戡訓刺音竹甚反勝詩證反西伯戡􅀺西伯旣戡􅀺近王圻之諸侯在上黨東北近附近之近圻巨依反祖伊恐奔告于王曰天子天旣訖我殷命文王率諸侯以事紂貌雖事紂内秉王心布德行威有將王之意紂不能制日益強大今又克有􅀺國迫近王圻似有天助之力故知天已畢訖殷之王命言殷祚至此而畢將欲化爲周王心于况反下注冝王者同格人元􅀛罔敢知吉至人以人事觀殷大􅀛以神靈考之皆無知吉非先王不相我後人惟王淫戲用自絶非先祖不助子孫以王淫過戲怠用自絶於先王相息亮反故天棄我不有康食不虞天性不迪率典以紂自絶於先王故天亦棄之宗廟不有安食於天下而王不度知天性命所在而所行不蹈循常法言多罪度待洛反今我民罔弗欲䘮曰天曷不降威大命不摯今王其如台摯至也民無不欲王之亡言天何不下罪誅之有大命冝王者何以不至王之凶害其如我所言摯音至本又作贄重言今我民二盤庚下本篇其如台二盤庚上髙宗肜日王曰嗚呼我生不有命在天言我生有壽命在天民之所言豈能害我遂惡之辭祖伊反曰嗚呼乃罪多參在上乃能責命于天反報紂也言汝罪惡衆多參列於上天天誅罰汝汝能責命于天拒天誅乎參七南反馬云參字累在上殷之即䘮指乃功不無戮于爾􅀖言殷之就亡指汝功事所致汝不得無死戮於殷國必將滅亡立可待重意不無戮于爾􅀖牧誓其于爾躬有戮微子第十七商書孔氏傳殷旣錯天命錯亂也錯七各反馬云廢也微子作誥父師少師告二師而去紂少詩照反微子微圻内國名子爵爲紂卿士去無道微子􅀂曰父師少師父師太師三公箕子也少師􅀌卿比干微子以紂距諫知其必亡順其事而言之殷其弗或亂正四方或有也言殷其不有治正四方之事將必亡治直吏反我祖底遂陳于上言湯致遂其功陳列於上丗我用沈酗于酒用亂敗厥德于下我紂也沈湎酗醟敗亂湯德於後丗沈徐直金反没也酗况具反以酒爲凶曰酗􅀃文作䣱云酒醟湎面善反醟音詠􅀃文于命反䣱酒也重意沈酗于酒二並本篇無逸酗于酒德哉殷罔不小大好草竊姦宄草野竊盗又爲姦宄於内外好呼報反宄音􅁤重意好草􅀼姦宄舜典宼賊姦宄卿士師師非度凡有辜罪乃罔􅁪獲六卿典士相師效爲非法度皆有辜罪無秉常得中者度如字小民方興相爲敵讎卿士旣亂而小人各起一方共爲敵讎言不和同讎市周反今殷其淪䘮􅀂渉大水其無津涯淪没也言殷將没亡如渉大水無涯際無所依就淪音倫徐力允反䘮息浪反涯五佳反又宜佳反重意􅀂渉大水大誥􅀂渉淵水君奭􅀂渉大川殷遂䘮越至于今言遂䘮亡於是至於今到不待乆曰父師少師我其發出狂吾家耄遜于荒我念殷亡發疾生狂在家耄亂故欲遯出於荒野言愁悶出尺遂反耄一又作旄莫報反注同遯徒悶反徐徒頓反一音都困反今爾無指告予顛隮􅀂之何其汝無指意告我殷􅀖顛隕隮墜如之何其救之隮子細反玉篇子􅀆反切韻祖稽反隕于敏反父師􅀂曰王子比干不見明心同省文微子帝乙元子故曰王子見賢遍反省所景反天毒降災荒殷􅀖方興沈酗于酒天生紂爲亂是天毒下災四方化紂沈􅊺不可如何乃罔畏畏咈其耇長舊有位人言起沈􅊺上不畏天災下不畏賢人違戾耇老之長致仕之賢不用其教法紂故咈扶勿反耇工口反長丁丈反注同今殷民乃攘竊神祇之犧牷牲用以容將食無災自來而取曰攘色純曰犧體完曰牷牛羊豕曰牲器實曰用盗天地宗廟牲用相容行食之無災罪之者言政亂攘如羊反因來而取曰攘􅀼馬云往盗曰􅀼神祇天曰神地曰祇犧許冝反牷音全降監殷民用乂讎歛召敵讎不怠下視殷民所用治者皆重賦傷民歛聚怨讎之道而又亟行􅁀虐自召敵讎不懈怠讎如字下同徐云鄭音疇馬本作稠云數也歛力檢反馬鄭力􅃩反謂賦歛也徐云鄭力劒反治直吏反亟欺忌反數也又紀力反本又作極如字至也懈佳賣反罪合于一多瘠罔詔言殷民上下有罪皆合於一法紂故使民多瘠病而無詔救之者瘠在益反商今其有災我興受其敗災滅在近我起受其敗言宗室大臣義不忍去商其淪䘮我罔爲臣僕詔王子出迪商其没亡我二人無所爲臣僕欲以死諫紂我教王子出合於道臣僕一本無臣字我舊云刻子王子弗出我乃顛隮刻病也我乆知子賢言於帝乙欲立子帝乙不肯病子不得立則冝爲殷後者子今􅀂不出逃難我殷家宗廟乃隕墜無主舊云馬云言也刻音克馬云侵刻也難乃旦反自靖人自獻于先王各自謀行其志人人自獻逹干先王以不失道靖馬本作清謂潔也我不顧行遯言將與紂俱死所執各異皆歸於仁明君子之道出處語黙非一途顧音故徐音鼓監本纂圖重言重意互註尚書卷第五
