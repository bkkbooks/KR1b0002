body:
  text: 監本纂圖重言重意互註尚書卷第六泰誓上第一周書孔氏傳惟十有一年武王伐殷周自虞芮質厥成諸侯並附以爲受命之年至九年而文王卒武王三年服畢觀兵孟津以卜諸侯伐紂之心諸侯僉同乃退以示弱芮如銳反虞芮二國名僉七廉反一月戊午師渡孟津十三年正月二十八日更與諸侯期而共伐紂孟津地名也作泰誓三篇渡津乃作泰誓大㑹以誓衆惟十有三年春大㑹于孟津三分二諸侯及諸戎狄此周之孟春惟十有三年春或作十有一年後人妄看序文輒改之王曰嗟我友􅀖􅃁君越我御事庶士明聽誓􅃁大御治也友諸侯親之稱大君尊之下及我治事衆士大小無不皆明聽誓重言嗟我友􅀖􅃁君二本篇牧誓惟天地萬物父母惟人萬物之靈生之謂父母靈神也天地所生惟人爲貴亶聦明作元后元后作民父母人誠聦明則爲大君而爲衆民父母亶丁但反重意元后作民父母供範天子作民父母今商王受弗敬上天降災下民沈湎冐色敢行暴虐沈湎嗜酒冒亂女色敢行酷暴虐殺無辜􅊺面善反冒莫報反注同嗜市志反切韻常利反酷苦毒反重言今商王受五本篇中篇下篇牧誓武成罪人以族官人以丗一人有罪刑及父母兄弟妻子言淫濫官人不以賢才而以父兄所以政亂惟宫室臺榭陂池侈服以殘害于爾萬姓土髙曰臺有木曰榭澤障曰陂停水曰池侈謂服飾過制言匱民財力爲奢麗榭爾雅云有木曰榭本又作謝陂彼皮反障之亮反匱其媿反焚炙忠良刳剔孕婦忠良無罪焚炙之懷子之婦刳剔視之言暴虐刳口胡反剔他歷反孕以證反徐養證反皇天震怒命我文考肅將天威大勲未集言天怒紂之惡命文王敬行天罰功業未成而崩重意皇天震怒洪範帝乃震怒肅將天威君奭誕將天威肆予小子發以爾友􅀖􅃁君觀政于商父業未就之故故我與諸侯觀紂政之善惡謂十一年自孟津還時重言肆予小子發下篇肆予小子惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀悛改也言紂縱惡無改心平居無故廢天地百神宗廟之祀慢之甚悛七全反犧牲粢盛旣于凶盗凶人盡盗食之而紂不罪粢音咨􅁰稷曰粢盛音成在器曰盛乃曰吾有民有命罔懲其侮紂言吾所以有兆民有天命故羣臣畏罪不爭無能止其慢心懲直承反爭爭􅃲之爭天佑下民作之君作之師言天佑助下民爲立君以政之爲立師以教之爲于僞反惟其克相上帝寵綏四方當能助天寵安天下相息亮反重意寵綏四方盤庚厎綏四方有罪無罪予曷敢有越厥志越逺也言己志欲爲民除惡是與否不敢逺其志否方有反同力度德同德度義力鈞則有德者勝德鈞則秉義者強揆度優劣勝􅀒可見度徒洛反下注同受有臣億萬惟億萬心人執異心不和諧億十萬曰億予有臣三千惟一心三千一心言同欲商罪貫盈天命誅之予弗順天厥罪惟鈞紂之爲惡一以貫之惡貫巳滿天畢其命今不誅紂則爲逆天與紂同罪貫古亂反予小子夙夜祗懼受命文考􅀋于上帝冝于􅃁土以爾有衆厎天之罰􅀕社曰冝􅃁土社也言我畏天之威告文王廟以事􅀋告天􅀕社用汝衆致天罰於紂􅀋師􅀕也􅃁中勇反厎之履反重言􅀋于上帝二本篇舜典重意以爾有衆底天之罰㣧征今予以爾有衆奉將天罰湯誓爾尚輔予一人致天之罰下篇奉予一人恭行天罰天矜于民民之所欲天必從之矜憐也言天除惡樹善與民同從才容反爾尚弼予一人永清四海穢惡除則四海長清重意爾尚弼予一人湯誓爾尚輔予一人微子之命毗予一人周官弼予一人時哉弗可失言今我伐紂正是天人合同之時不可違失泰誓中第二周書孔氏傳惟戊午王次于河朔次止也戊午渡河而誓旣誓而止於河之北羣后以師畢會諸侯盡會次也王乃徇師而誓曰嗚呼西土有衆咸聽朕言徇循也武王在西故稱西土徇似俊反字詁云徇廵也重意咸聽朕言大禹謨咸聽朕命湯誓悉聽朕言盤庚明聽朕言吕刑皆聽朕言我聞吉人爲善惟日不足凶人爲不善亦惟日不足言吉人渴日以爲善凶人亦渴日以行惡湯苦曷反又苦蓋反今商王受力行無度行無法度渴日不足故曰力行重言今商王受五上篇本篇下篇牧誓武成播棄犂老昵比罪人鮐背之耇稱犂老布棄不禮敬昵近罪人謂天下逋逃之小人犂力私反又力􅀆反昵女乙反比毗志反鮐他來反又音怡魚名逋布呉反淫酗肆虐臣下化之過酗縱虐以酒成惡臣下化之言罪同酗况付反朋家作仇脅權相滅無辜􅈼天穢德彰聞臣下朋黨自爲仇怨脅上權命以相誅滅􅈼呼也民皆呼天告􅁈無辜紂之􅁾德彰聞天地言罪惡深脅虚業反􅈼音喻穢於廢反惟天惠民惟辟奉天言君天下者當奉天以愛民辟必亦反有夏桀弗克􅀂天流毒下國桀不能順天流毒虐於下國萬民言凶害天乃佑命成湯降黜夏命言天助湯命使下退桀命惟受罪浮于桀浮過剥䘮元良賊虐諫輔剥傷害也賊殺也元善之長良善以諫輔紂紂反殺之䘮息浪反長丁丈反謂已有天命謂敬不足行謂􅀕無益謂暴無傷言紂所以罪過於桀已音紀厥監惟不逺在彼夏王其視紂罪與桀同辜言必誅之天其以予乂民用我治民當除惡朕夢協朕卜襲于休祥戎商必克言我夢與卜俱合於美善以兵誅紂必克之占受有億兆夷人離心離德夷平凡人也雖多而執心用德不同予有亂臣十人同心同德我治理之臣雖少而心德同十人周公旦召公奭太公望畢公榮公太顚閎夭散冝生南宫适及文田治直吏反互註左成二年君子曰衆之不可以巳也大夫爲政猶以衆克况明君而善用其衆乎泰誓所謂商兆民離周十人同者衆也又昭二十四年召簡公南宫嚚以甘桓公見王子朝劉子謂萇弘曰甘氏又往矣對曰何害同德度義泰誓曰紂有億兆夷人亦有離德余有亂臣十人同心同德此周所以興也君其務德無患無人雖有周親不如仁人周至也言紂至親雖多不如周家之少仁人天視自我民視天聽自我民聽言天因民以視聽民所惡者天誅之惡烏路反一音如字重意天視自我民視天聽自我民聽皐陶謨天聦明自我民聦明百姓有過在予一人己能無惡于民民之有過在我教不至重意百姓有過在予一人湯誥萬方有罪在予一人今朕必往我武惟􅀭侵于之疆揚舉也言我舉武事侵入紂郊疆伐之疆居良反重言今朕必往二湯誓一取彼凶殘我伐用張于湯有光桀流毒天下湯黜其命紂行凶殘之德我以兵取之伐惡之道張設比於湯又有光明勗哉夫子罔或無畏寜執非敵勗勉也夫子謂將士無敢有無畏之心寜執非敵之志伐之則克矣勗許玉反下同將子匠反下篇註同重言勗哉夫子三本篇一牧誓二百姓懔懔􅀂崩厥角言民畏紂之虐危懼不安􅀂崩摧其角無所容頭懔力甚反嗚呼乃一德一心立定厥功惟克永丗汝同心立功則能長丗以安民重言惟克永丗􅀃命以克永丗泰誓下第三周書孔氏傳時厥明王乃大廵六師明誓衆士是其戊午明日師出以律三申令之重難之義衆士百夫長巳上令力政反重直用反長丁丈反巳上已音以上時掌反王曰嗚呼我西土君子天有顯道厥􅀋惟彰言天有明道其義􅀋惟明言王所冝法則今商王受狎侮五常荒怠弗敬輕狎五常之教侮慢不行大爲怠惰不敬天地神明惰徒卧反重言今商王受五上篇中篇本篇牧誓武成自絶于天結怨于民不敬天自絶之酷虐民結怨之斮朝渉之脛剖賢人之心冬月見朝渉水者謂其脛耐寒斬而視之比干忠諌謂其心異於人剖而觀之酷虐之甚斮側略反又士略反朝陟遥反脛戸定反剖普口反耐乃代反作威殺戮毒痡四海痡病也言害所及逺痡徐音敷又普胡反崇信姦回放黜師保回邪也姦邪之人反尊信之可法以安者反放退之邪似嗟反屏棄典刑囚奴正士屏棄常法而不顧箕子正諌而以爲囚奴郊社不修宗廟不享作竒技淫巧以恱婦人言紂廢至尊之敬營卑䙝惡事作過制技巧以恣耳目之欲技其􅀝反䙝息列反上帝弗順祝降時䘮祝斷也天惡紂逆道斷絶其命故下是䘮亡之誅䘮蘇浪反斷丁管反惡烏路反爾其孜孜奉予一人恭行天罰孜孜勸勉不怠孜音兹重意奉予一人恭行天罰見上篇古人有言曰撫我則后虐我則讎武王述古言以明義言非惟今惡紂重言古人有言曰四本篇牧誓酒誥秦誓獨夫受洪惟作威乃汝丗讎言獨夫失君道也大作威殺無辜乃是汝累丗之讎明不可不誅樹德務滋除惡務本立德務茲長去惡務除本言紂爲天下惡本肆予小子誕以爾衆士殄殱乃讎言欲行除惡之義絶盡紂殄徒典反殱子廉反重言肆予小子二又上篇爾衆士其尚迪果毅以登乃辟迪進也殺敵爲果致果爲毅登成也成汝君之功毅牛旣反重言爾衆士三㣧征二本篇一功多有厚賞不迪有顯戮賞以勸之戮以威之重意詳見甘誓嗚呼惟我文考􅀂日月之照臨光于四方顯于西土稱父以感衆也言其明德充塞四方明著岐周重意光于四方吕刑灼于四方惟我有周誕受多方言文王德大故受衆方之國三分天下而有其二予克受非予武惟朕文考無罪推功於父言文王無罪於天下故天佑之人盡其用受克予非朕文考有罪惟予小子無良􅀂紂克我非我父罪我之無善之致互註記坊記善則稱親過則稱己則民作孝太誓曰予克紂非予武惟朕文考無罪紂克予非朕文考有罪惟予小子無良牧誓第四商書孔氏傳武王戎車三百兩兵車百夫長所載車稱兩一車歩卒七十二人凡二萬一千人舉全數車音居釋名云古者聲如居所以居人也今曰車聲近舎車舎也韋昭辯釋名云古皆尺遮反後漢始有音居長丁丈反卒子忽反虎賁三百人勇士稱也􅀂虎賁獸言其猛也皆百夫長賁音奔稱尺證反與受戰于牧野作牧誓牧誓至牧地而誓衆牧如字徐一音茂􅀃文作坶云地名在朝歌南七十里字林音母重意與受戰于牧野前見甘誓湯誓時甲子昧爽是克紂之月甲子之日二月四日昧􅁳爽明早旦昧音妹爽明也馬云謂早旦也昧未旦也重言甲子昧爽二本篇武成王朝至于商郊牧野乃誓紂近郊三十里地名牧癸亥夜陳甲子朝誓將與紂戰陳直刃反王左杖黃鉞右秉白旄以麾曰逖矣西土之人􅃏以黄金飾斧左手杖􅃏示無事於誅右手把旄示有事於教逖逺也逺矣西土之人勞苦之杖徐直亮反􅃏音越本又作戊旄音毛馬云白旄旄牛尾麾許危反逖他歷反王曰嗟我友􅀖􅃁君同志爲友言志同滅紂重言嗟我友􅀖􅃁君二泰誓上本篇御事司徒司馬司空治事三卿司徒主民司馬主兵司空主土指誓戰者亞旅師氏亞次旅衆也衆大夫其位次卿師氏大夫官以兵守門者重言司徒司馬司空亞旅三本篇立政梓材千夫長百夫長師帥卒帥帥色􅀋反下同及庸蜀羌髳微盧彭濮人八國皆蠻夷戎狄屬文王者國名羌在西蜀叟髳微在巴蜀盧彭在西北庸濮在江漢之南羌徐起良反􅀃文云西戎牧羊人髳茂侯反濮音卜叟所求反又蘇走反稱爾戈比爾干立爾矛予其誓稱舉也戈㦸干楯也比徐扶志毗志二反楯食凖反又音允王曰古人有言曰牝雞無晨言無晨鳴之道牝頻引反徐扶忍反重言古人有言曰西泰誓下本篇遒誥秦誓牝雞之晨惟家之索索盡也喻婦人知外事雌代雄鳴則家盡婦奪夫政則國亡索西各反今商王受惟婦言是用妲己惑紂紂信用之妲丹逹反已音紀紂妻也重言今商王受五泰誓三篇本篇武成昬棄厥肆祀弗荅昬亂肆陳荅當也亂棄其所陳􅀕祀不復當享􅀑神復扶又反昬棄厥遺王父母弟不迪王父母之昆弟母弟同母弟言棄其骨肉不接之以道乃惟四方之多罪逋逃是崇是長言紂棄其賢臣而尊長逃亡罪人信用之是信是使是以爲大夫卿士士事也用爲卿大夫典政事俾暴虐于百姓以姦宄于商邑使四方罪人暴虐姦宄於都邑俾必爾反使也徐甫婢反下同宄音􅁤今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉今日戰事就敵不過或作嘼許救反識其政事記識殷家政教善事以爲法作武成武功成文事修武成文王受命有此武功成於克商惟一月壬辰旁死魄此本􅀃始伐紂時一月周之正月旁近也月二日近死魄旁歩光反魄普白反􅀃文作覇匹革反云月始生魄然貌近附近之近越翼日癸巳王朝歩自周于征伐商翼明歩行也武王以正月三日行自用往征伐商二十八日渡孟津重言王朝歩自周三本篇召誥畢命多宗字朱氏云此叚當在第厥四月哉生明王來自商至于豐其四月哉始也始生明月三日與死魄互言哉徐音載豐芳弓反文王所都也重意厥四月哉生明康誥惟三月哉生魄顧命惟四月哉生魄重言至于豐三本篇召誥畢命乃偃武修文倒載干戈包以虎皮示不用行禮射設庠序修文教歸馬于華山之陽放牛于桃林之野示天下弗服山南曰陽桃林在華山東皆非長養牛馬之地欲使自生自死示天下不復乗用華胡化胡􅀲二反華山在􅁊農長丁丈反復扶又反互註記樂記且能厚先人之業至于大王肇基王迹王季其勤王家大王修德以翦齊商人始王業之肇迹王季纉統其業乃勤立王家大音泰肇音兆王迹上于况反又如字注王業王功同我文考文王克成厥勲誕膺天命以撫方夏言我文德之父能成其王功大當天命以撫綏四方中夏大􅀖畏其力小􅀖懷其德言天下諸侯大者畏威小者懷德是文王威德之大惟九年大統未集言諸侯歸之九年而卒故大業未就予小子其承厥志言承文王本意朱氏云此叚當在第五厎商之罪告于皇天后土所過名山大川致商之罪謂伐紂時后土社也名山華岳大川河厎之履反重意告于皇天后土前見湯誓曰惟有道曾孫周王發將有大正于商告天地山川之辭大正以兵征之今商王受無道無道德重言今商王受五連見前四篇􅁀殄天物害虐烝民􅁀絶天物言逆天也逆天害民所以爲無道烝之承反爲天下逋逃主萃淵藪逋亡也天下罪人逃亡者而紂爲魁主窟聚淵府藪澤言大姦萃在醉反藪素口反魁苦回反窟口忽反互註左昭七年昔武王數紂之罪以告諸侯曰紂爲天下逋逃主萃淵藪故夫致死焉予小子旣獲仁人敢祗承上帝以遏亂畧仁人謂太公周召之徒略路也言誅紂敬承天意以絶亂路遏烏末反召上照反本又作邵華夏蠻貊罔不率俾朱氏云此叚當在第二恭天承命冕服采章曰華大國曰夏及四夷皆相率而使奉天成命貊亡伯反俾必爾反重言罔不率俾二本篇君奭肆予東征綏厥士女此謂十一年㑹孟津還時惟其士女篚厥􅀇黄昭我周王言東國士女筐篚盛其絲帛奉迎道次明我周王爲之除害篚音匪爲于僞反天休震動用附我大邑周天之美應震動民心故用依附我應應對之應朱氏曰此叚當在第六惟爾有神尚克相予以濟兆民無作神羞神庻幾助我渡民危害無爲神羞辱相息亮反重意以濟兆民􅀃命以康兆民旣戊午師逾孟津癸亥陳于商郊俟天休命自河至朝歌出四百里五日而至赴敵冝速待天休命謂夜雨止畢陳逾亦作踰陳直刃反注同徐音塵甲子昧爽受率其旅􅀂林會于牧野旅衆也如林言盛多會逆距戰重言甲子昧爽三牧誓本篇罔有敵于我師前徒倒戈攻于後以北血流漂杵紂衆服周仁政無有戰心前徒倒戈自攻其後以北走血流漂舂杵甚之言倒丁老反漂匹妙反徐敷妙反又匹消反杵昌吕反一戎衣天下大定衣服也一著戎服而滅紂言與衆同心動有成功著張略反乃反商政政由舊反紂惡政用商先王善政釋箕子囚封比干墓式商容閭皆武王反紂政囚奴徒􅀠封益其土商容賢人紂所貶退式其閭巷以禮賢互註見篇首散鹿臺之財發鉅橋之粟紂所積之府倉皆散發以賑貧民散西旦反大賚于四海而萬姓恱服施舎已債救乏賙無所謂周有大賚天下皆恱仁服德賚力代反徐音來巳音以債側界反睭音周本亦作周朱氏云此叚當在第三列爵惟五即所識政事而法之爵五等公侯伯子男分土惟三列地封國公侯方百里伯七十里子男五十里爲三品建官惟賢立官以官賢才重意建官惟賢咸有一德任官惟賢材位事惟能居位治事必任能士重民五教所重在民及五常之教惟食䘮􅀕民以食爲命䘮禮篤親愛􅀕祀崇孝養皆聖王所重養羊亮反惇信明義使天下厚行信顯忠義崇德報功有德尊以爵有功報以禄重意崇德報功微子之命崇德象賢垂拱而天下治言武王所修皆是所任得人故垂拱而天下治任而鴆反治直吏反重意垂拱而天下治畢命垂拱仰成監本纂圖重言重意互註尚書卷第六
