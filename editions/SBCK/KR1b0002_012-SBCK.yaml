body:
  text: 監本纂圖重言重意互註尚書卷第十二畢命第二十六周書孔氏傳康王命作􅁽畢命爲􅁽書以命畢公分居里成周郊分別民之居里異其善惡成定東周郊境使有保護別彼列反作畢命畢命言畢公見命之書惟十有二年六月庚午朏康王即位十二年六月三日庚午朏普忽反徐芳尾反又芳憒反重意六月庚午朏召誥篇三月惟丙午朏越三日壬申王朝歩自宗周至于豐於朏三日壬申王朝行自宗周至于豐宗周鎬京豐文王所都朝陟遥反鎬戸老反重言王朝歩自宗周至于豐三武成召誥本篇他篇無宗字以成周之衆命畢公保􅁵東郊用成周之民衆命畢公使安理治正成周東郊令得所􅁵力之反治正上直吏反一本作治政則依字讀令力呈反王􅀂曰嗚呼父師惟文王武王敷大德于天下用克受殷命王順其事歎告畢公代周公爲大師爲東伯命之代君陳言文武布大德於天下故天佑之用能受殷之王命大師音泰惟周公左右先王綏定厥家言周公助先王安定其家毖殷頑民遷于洛邑密邇王室式化厥訓毖殷頑民恐其叛亂故徙於洛邑密近王室用化其教毖音袐近如字又附近之近旣歷三紀丗變風移四方無虞予一人以寜言殷民遷周巳經三紀丗代民易頑者漸化四方無可度之事我天子用安矣十二年曰紀父子曰丗度待洛反舊作待路反重意予一人以寜康誥則予一人以懌道有升降政由俗革不臧厥臧民罔攸觀天道有上下交接之義政教有用俗改更之理民之俗善以善養之俗有不善以法御之􅀂乃不善其善則民無所勸慕上時掌反更古行反惟公懋德克勤小物弼亮四丗正色率下罔不祗師言言公勉行德能勤小物輔佐文武成康四丗爲公卿正色率下下人無不敬仰師法懋音茂嘉績多于先王予小子垂拱仰成公之善功多大先人之美我小子爲王垂拱仰公成理言其上顯父兄下施子孫拱九勇反仰如字徐五亮反重言予小子六泰誓武成金縢洛誥君陳本篇重意垂拱仰成武成垂拱而天下治王曰嗚呼父師今予祗命公以周公之事往哉今我敬命公以周公所爲之事往爲之哉言非周公所爲不敢枉公往治治直吏反旌别淑慝表厥宅里彰善癉惡樹之風聲言當識别頑民之善惡表異其居里明其爲善病其爲惡立其善風揚其善聲别彼列反癉丁但反弗率訓典殊厥井疆俾克畏慕其不循教道之常則殊其井居田界使能畏爲惡之禍慕爲善之福所以沮勸俾必爾反沮辭汝反又慈吕反申畫郊圻愼固封守以康四海郊圻雖舊所規畫當重分明之又當謹愼堅固封疆之守備以安四海京圻安則四海安矣守徐始救反重直用反政貴有􅁪辭尚體要不惟好異政以仁義爲常辭以理實爲要故貴尚之􅀂異於先王君子所不好好呼報反商俗靡靡利口惟賢餘風未殄公其念哉紂以靡靡利口惟賢覆亡國家今殷民利口餘風未絶公其念絶之覆芳服反重意公其念哉益稷帝其念哉大禹謨帝念哉益稷伊訓念哉我聞曰丗禄之家鮮克由禮以蕩陵德實悖天道特言我聞自古有之丗有禄位而無禮教少不以放蕩陵邈有德者如此實亂天道鮮息淺反悖布内反重言我聞曰六無逸二康誥多士君陳本篇各一敝化奢麗萬丗同流言敝俗相化車服奢麗雖相去萬丗􅀂同一流敝歩寐反兹殷庶士席寵惟舊怙侈滅義服美于人此殷衆士居寵日乆怙恃奢侈以滅德義服飾過制美於其民言僭上怙音戸驕淫矜侉將由惡終雖收放心閑之惟艱言殷衆士驕恣過制矜其所能以自侉大如此不變將用惡自終雖今順從周制心未壓服以禮閑禦其心惟艱侉苦􅀲反壓於葉反又於甲反又於豔反資冨能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓以冨資而能順義則惟可以長年命矣惟有德義是乃大順􅀂不用古訓典籍於何其能順乎王曰嗚呼父師􅀖之安危惟兹殷士不剛不柔厥德允修言􅀖國所以安危惟在和此殷士而巳治之不剛不柔寛猛相濟則其德政信修立惟周公克愼厥始惟君陳克和厥中惟公克成厥終周公遷殷頑民以消亂階能愼其始君陳弘周公之訓能和其中畢公闡二公之烈能成其終三后協心同厎于道道洽政治澤潤生民三君合心爲一終始相成同致于道道至普洽政化治理其德澤惠施乃浸潤生民言三君之功不可不尚政治直吏反施始豉反浸子鴆反重意道洽政治澤潤生民舜典好生之德洽于民心四夷左衽罔不咸頼予小子永膺多福言東夷西戎南蠻北狄􅀍髪左祍之人無不皆恃頼三君之德我小子亦長受其多福祍而甚反又而鴆反重言予小子六泰誓武成金縢洛誥君陳本篇重意予小子永膺多福君陳惟予一人膺受多福公其惟時成周建無窮之基亦有無窮之聞公其惟以是成周之治爲周家立無窮之基業於公亦有無窮之名聞於後丗爲于僞反子孫訓其成式惟乂言後丗子孫順公之成法惟以治嗚呼罔曰弗克惟旣厥心人之爲政無曰不能惟在盡其心而巳罔曰民寡惟愼厥事無曰人少不足治也惟在愼其政事無敢輕之少詩照反欽􅀂先王成烈以休于前政敬順文武成業以美於前人之政所以勉畢公君牙第二十七周書孔氏傳穆王命君牙爲周大司徒穆王康王孫昭王子穆王名滿君牙或作君雅作君牙君牙臣名君牙命以其名遂以名篇王􅀂曰嗚呼君牙順其事而歎稱其名而命之惟乃祖乃父丗篤忠貞服勞王家厥有成績紀于太常言汝父祖丗厚忠貞服事勤勞王家其有成功見紀録書於王之太常以表顯之王之旌旗畫日月曰太常畫胡卦反重言乃祖乃父五餘見盤庚惟予小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方惟我小子繼守先王遺業亦惟父祖之臣能佐助我治四方言己無所能重言惟予小子二又見泰誓重意嗣守文武成康遺緒顧命嗣守文武大訓心之憂危􅀂蹈虎尾渉于春冰言祖宗之大已才之弱故心懷危懼虎尾畏噬春冰畏䧟危懼之甚蹈徒報反噬市制反䧟䧟没之䧟今命爾予翼作股肱心膂今命汝爲我輔翼股肱心膂之臣言委任膂音旅重意作股肱心膂益稷臣作朕股肱耳目纉乃舊服無忝祖考弘敷五典式和民則繼汝先祖故所服忠勤無辱累祖考之道大布五常之教用和民令有法則累劣僞反令力呈反重意纉乃舊服仲虺之誥纉禹舊服弘敷五典周官敷五典舜典謹徽五典爾身克正罔敢弗正民心罔中惟爾之中言汝身能正則下無敢不正民心無中從汝取中必當正身示民以中正夏暑雨小民惟曰怨咨夏月暑雨天之常道小人惟曰怨歎咨嗟言心無中也冬祁寒小民亦惟曰怨咨冬大寒亦天之常道民猶怨嗟互註記緇衣君雅曰夏日暑雨小民惟曰怨資冬祁寒小民亦惟曰怨注云資當爲至齊魯之語聲之誤也祁之言是也齊西偏之語也厥惟艱哉思其艱以圖其易民乃寜天不可怨民猶怨嗟治民其惟艱哉當思慮其難以謀其易民乃安易以豉反重意厥惟艱哉伊訓兹惟艱哉泰誓是惟艱哉嗚呼丕顯哉文王謨歎文王所謀大顯明丕承哉武王烈言武王業美大可承奉啓佑我後人咸以正罔缺文武之謀業大明可承奉開助我後嗣皆以正道無邪缺缺苦穴反重意啓佑我後人太甲啓迪後人爾惟敬明乃訓用奉􅀂于先王汝惟當敬明汝五教用奉順于先王之道對􅀭文武之光命追配于前人言當荅揚文武光明之命君臣各追配於前令名之人重意對􅀭文武之光命顧命用荅揚文武之光訓王􅀂曰君牙乃惟由先正舊典時式民之治亂在兹汝惟當奉用先正之臣所行故事舊典文籍是法民之治亂在此而巳用之則民治廢之則民亂治直吏反下注同率乃祖考之攸行昭乃辟之有乂言當循汝父祖之所行明汝君之有治功辟必亦反重言率乃祖考之攸行太甲率乃祖之攸行冏命第二十八周書孔氏傳穆王命伯冏爲周太僕正伯冏臣名也太僕長太御中大夫冏九永反亦作煛長誅丈反作冏命冏命以冏見命名篇王􅀂曰伯冏惟予弗克于德嗣先人宅丕后順其事以命伯冏言我不能於道德繼先人居大君之位人輕任重怵惕惟厲中夜以興思免厥愆言常悚懼惟危夜半以起思所以免其過悔􅇶勑律反惕他歷反昔在文武聦明齊聖小大之臣咸懷忠良聦明視聽逺齊通無滯礙臣雖官有尊卑無不忠良礙五代反重意昔在文武康王之誥昔君文武聦明齊聖堯典聦明文思微子之命齊聖廣淵其侍御僕從罔匪正人雖給侍進御僕役從官官雖微無不用中正之人御如字一音禦從才用反注及下注侍從同以旦夕承弼厥辟出入起居罔有不欽小臣皆良僕役皆正以旦夕承輔其君故君出入起居無有不敬重意罔有不欽盤庚下罔有弗欽下文罔有不藏發號施令罔有不臧下民祗􅀂萬􅀖咸休言文武發號施令無有不善下民敬順其命萬國皆美其化重言萬􅀖咸休二本篇洛誥大禹謨萬􅀖咸寜惟予一人無良實頼左右前後有位之士匡其不及惟我一人無善實恃左右前後有職位之士匡正其不及言此責羣臣正己重意惟予一人無良泰誓惟予小子無良君陳康王之誥惟予一人繩愆糾謬格其非心俾克紹先烈言侍左右之臣彈正過誤檢其非妄之心使能繼先王之功業繩市陵反俾必爾反今予命汝作大正正于羣僕侍御之臣欲其教正羣僕無敢佞僞懋乃后德交修不逮言侍御之臣無小大親踈皆當勉汝君爲德更代修進其所不及更古衡反愼簡乃僚無以巧言令色便辟側媚其惟吉士當謹愼簡選汝僚屬侍臣無得用巧言無實令色無質便辟足恭側媚謟䛕之人其惟皆吉良正士便婢綿反辟匹亦反徐扶亦反足將住反䛕徐以朱反重意無以巧言令色皐陶謨何畏乎巧言令色重言其惟吉士二立政本篇僕臣正厥后克正僕臣䛕厥后自聖言僕臣皆正則其君乃能正僕臣謟䛕則其君乃自謂聖重意僕臣䛕厥后自聖􅀃命良臣惟聖后德惟臣不德惟臣君之有德惟臣成之君之無德惟臣誤之言君所行善惡專在左右爾無昵于憸人充耳目之官迪上以非先王之典汝無親近於憸利小子之人充備侍從在視聽之官道君上以非先王之法昵女乙反憸息廉反徐七漸反利口也本亦作􅧴近附近之近道音導非人其吉惟貨其吉􅀂非人其實吉良惟以貨財配其吉良以求入于僕侍之臣汝當清審􅀂時􅘃厥官􅀂用是行貨之人則病其官職􅘃改頑反惟爾大弗克祗厥辟惟予汝辜用行貨之人則惟汝大不能敬其君惟我則亦以此罪汝言不忠也王曰嗚呼欽哉永弼乃后于彞憲歎而勑之使敬用所言當長輔汝君於常法此穆王庶幾欲蹈行常法重言欽哉八堯典大禹謨微子之命本篇各一舜典益稷各二吕刑第二十九周書孔氏傳吕命吕侯見命爲天子司寇穆王訓夏贖刑吕侯以穆王命作書訓暢夏禹贖刑之法更從輕以布告天下贖音蜀注下同作吕刑吕刑後爲甫侯故或稱甫刑惟吕命王享國百年耄荒言吕侯見命爲卿時穆王以享國百年耄亂荒忽穆王即位過四十矣言百年大期雖老而能用賢以揚名耄本亦作毛報反切韻莫報反度作刑以詰四方度時丗所冝訓作贖刑以治天下四方之民度待洛反注同馬如字云法度也詰起一反王曰􅀂古有訓􅃖尤惟始作亂延及于平民順古有遺訓言􅃖尤造始作亂惡化相易延及於平善之人九黎之君號曰􅃖尤􅃖尺之反尤有牛反馬云少昊之末九黎君名罔不寇賊鴟義姦宄奪攘矯䖍平民化之無不相寇賊爲鴟䲷之義以相奪讓矯稱上命􅀂固有之亂之甚鴟尺之反鴟梟惡鳥馬云鴟輕也義本亦作􅁩攘如羊反矯居表反䖍其然反苗民弗用靈制以刑惟作五虐之刑曰法三苗之君習􅃖尤之惡不用善化民而制以重刑惟爲五虐之刑自謂得法􅃖尤黄帝所滅三苗帝堯所誅言異丗而同惡互註記緇衣君民者子以愛之則民親之信以法之則民不倍恭以涖之則民有孫心甫刑曰苗民匪用命制以刑惟作五虐之刑曰法是以民有惡德而遂絶其丗也殺戮無辜爰始淫爲劓刵椓黥三苗之主頑凶若民敢行虐刑以殺戮無罪於是始大爲截人耳鼻㭬隂黥面以加無辜故曰五虐劓魚器反刵徐如志反椓丁角反黥其京反越兹麗刑并制罔差有辭苗民於此施刑并制無罪無差有直辭者言淫濫麗力馳反并必政反民興胥漸泯泯棼棼罔中于信以覆詛盟三苗之民瀆於亂政起相漸化泯泯爲亂棼棼同惡皆無中于信義以反背詛盟之約泯靣忍反徐音民棼扶云反徐扶文反覆芳服反徐敷目反詛側助反背音佩約如字又於妙反虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥三苗虐政作威衆􅀍戮者方方各告無罪於天天視苗民無有馨香之行其所以爲德刑發聞惟乃腥臭聞音問又如字注同腥音星行下孟反重意罔有馨香德刑發聞惟腥酒誥弗惟德馨香祀登聞于天君陳至治馨香感于神明皇帝哀矜庶戮之不辜報虐以威遏絶苗民無丗在下皇帝帝堯也哀矜衆􅀍戮者之不辜乃報爲虐者以威誅遏絶苗民使無丗位在下國也君帝君冝作皇字帝堯也遏於葛反乃命重黎絶地天通罔有降格重即羲黎即和堯命羲和丗掌天地四時之言使人神不擾各得其序是謂絶地天通言天神無有降地地祇不至於天明不相干重直龍反注同黎力􅀆反羣后之逮在下明明棐常鰥寡無蓋羣后諸侯之逮在下國皆以明明大道輔行常法故使鰥寡得所無有掩蓋裴音匪又芳􅀑反鰥居頑反皇帝清問下民鰥寡有辭于苗帝堯詳問民患皆有辭怨於苗民清問馬云清訊也德威惟畏德明惟明言堯監苗民之見怨則又増修其德行威則民畏服明賢則德明人所以無能名焉互註記表記後丗雖有作者虞舜弗可及也巳矣君天下生無私死不厚其子子民如父母有憯怛之愛有忠利之教親而尊安而敬威而愛冨而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而静寛而有辨甫刑曰德威惟威德明惟明非虞帝其孰能如此乎乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖伯夷卜典禮教民而斷以法禹治洪水山川無名者主名之后稷下教民播種農畒生善榖所謂堯命三君憂功於民折之設反下同馬鄭王皆音悊馬云智也種章用反殖承力反斷丁亂反重意禹平水土舜典咨禹汝平水土稷降播種農殖嘉榖舜典汝后稷播時百榖三后成功惟殷于民各成其功惟所以殷盛於民言禮教備衣食足士制百姓于刑之中以教祗德言伯夷道民典禮斷之以法皐陶作土制百官於刑之中助成道化以教民爲敬德祇止而反重意士制百姓于刑之中大禹謨民恊于中君陳惟厥中下文故乃明于刑之中穆穆在上明明在下灼于四方罔不惟德之勤堯躬行敬敬在上三后之徒秉明德明君道於下灼然彰著四方故天下之士無不惟德之勤重意灼于四方堯典光􅀍四表泰誓光于四方故乃明于刑之中率乂于民棐彞天下皆勤立德故乃能明於用刑之中正循道以冶於民輔成常教治直吏反典獄非訖于威惟訖于冨言堯時主獄有威有德有恕非絶於威惟絶於富丗治貨賂不行賂來故反敬忌罔有擇言在身堯時典獄皆能敬其職忌其過故無有可擇之言在其身互註記表記子曰君子不失口於人是故君子言足信也甫刑曰敬忌而罔有擇言在躬惟克天德自作元命配享在下凡明於刑之中無擇言在身必是惟能天德自爲大命配享天意在於天下王曰嗟四方司政典獄非爾惟作天牧主政典獄謂諸侯也非汝惟爲天牧民乎言任重是汝爲于僞反任重上而鴆反下輕重之重今爾何監非時伯夷播刑之迪言當視是伯夷布刑之道而法之其今爾何懲惟時苗民匪察于獄之麗其今汝何懲戒乎所懲戒惟是苗民非察於獄之施刑以取滅亡麗力馳反罔擇吉人觀于五刑之中惟時庶威奪貨言苗民無肯選擇善人使觀視五刑之中正惟是衆爲威虐者任之以奪取人貨所以爲亂斷制五刑以亂無辜上帝不蠲降咎于苗苗民任奪貨姦人斷制五刑以亂加無罪天不㓗其所爲故下咎罪謂誅之蠲吉縁反咎其九反苗民無辭于罰乃絶厥丗言罪重無以辭於天罰故堯絶其丗申言之爲至戒王曰嗚呼念之哉念以伯夷爲法苗民爲戒重意念之哉益稷伊訓念哉伯父伯兄仲叔季弟㓜子童孫皆聽朕言庶有格命皆王同姓有父兄弟子孫列者伯仲叔季順少長也舉同姓包異姓言不殊也聽從我言庶幾有至命聽如字又他經反少詩照反長丁丈反重意皆聽朕言湯誥悉聽朕言盤庚明聽朕言泰誓咸聽朕言舜典咸聽朕命今爾罔不由慰日勤爾罔或戒不勤今汝無不用安自居日當勤之汝無有徒念戒而不勤日勤上人實反一音曰天齊于民俾我一日非終惟終在人天整齊於下民使我爲之一日所行非爲天所終惟爲天所終在人所行天齊于民絶句馬云齊中也俾我絶句上必爾反馬本作矜矜哀也爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休汝當庶幾敬逆天命以奉我一人之戒行事雖見畏勿自謂可敬畏雖見美勿自謂有德羙重意以奉我一人泰誓奉予一人惟敬五刑以成三德一人有慶兆民頼之其寜惟永先戒以勞謙之德次教以惟敬五刑所以成剛柔正直之三德也天予有善則兆民頼之其乃安寜長乆之道重意一人有慶㤗誓亦尚一人之慶互註左襄十三年譲禮之主也范宣子讓其下皆讓欒黶爲汰弗敢違也􅀳國以乎數丗頼之刑善也夫一人刑善百姓休和可不務乎書曰一人有慶兆民頼之其寜惟永其是之謂乎王曰吁來有􅀖有土告爾祥刑吁歎也有國土諸侯告汝以善用刑之道吁况于反馬作于于於也在今爾安百姓何擇非人何敬非刑何度非及在今爾安百姓兆民之道當何所擇非惟吉人乎當何所敬非惟五刑乎當何所度非惟及丗輕重所冝乎度待洛反注同馬云謀造也兩造具備師聽五辭兩謂囚證造至也兩至具備則衆獄官共聽其入五刑之辭造七報反注同五辭簡孚正于五刑五辭簡核信有罪驗則正之於五刑五刑不簡正于五罰不簡核謂不應五刑當正五罰出金贖罪核幸格反五罰不服正于五過不服不應罰也正於五過從赦免應應對之應下同五過之疵惟官惟反惟内惟貨惟來五過之所病或甞同官位或詐反囚辭或内親用事或行貨枉法或舊相往來皆病所在疵才斯反來馬本作求云有求請賕也其罪惟鈞其審克之以病所在出入人罪使在五過罪與犯法者同其當清察能使之不行重言其克審之四下文三五刑之疑有赦五罰之疑有赦其審克之刑疑赦從罰罰疑赦從免其當清察能得其理重意五罰之疑有赦大禹罪疑惟輕簡孚有衆惟貌有稽簡核誠信有合衆心惟察其貌有所考合重刑之至無簡不聽具嚴天威無簡核誠信不聽理其獄皆當嚴敬天威無輕用刑墨辟疑赦其罰百鍰閱實其罪刻其顙而􅄺之曰墨刑疑則赦從罰六兩曰鍰鍰黄鐵也閱實其罪使與罰各相當辟婢亦反鍰徐戸􅀜反六兩也鄭及爾雅同􅀃文云六鋝也鋝十一銖二十五分銖之十三也馬同又云賈逵􅀃俗儒以鋝重六兩周官劒重九鋝俗儒近是閱音恱顙素黨反􅄺乃結反重言閱實其罪五連見下文四劓辟疑赦其罰惟倍閱實其罪截鼻曰劓刑倍百爲二百鍰剕辟疑赦其罰倍差閱實其罪刖足曰剕倍差謂倍之又半爲五百鍰剕扶謂反倍差測加反傳云五百鍰也馬云倍二百爲四百差者又加四百之三分之一凡五百三十三鍰三分鍰之一也刖音月又五罰反絶也宫辟疑赦其罰六百鍰閱實其罪宫淫刑也男子割􅀔婦人幽閉次死之刑序五刑先輕轉至重者事之冝大辟疑赦其罰千鍰閱實其罪死刑也五刑疑各入罰不降相因古之制也墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千别言罰屬合言刑屬明刑罰同屬互見其義以相備見賢遍反上下比罪無􅆫亂辭勿用不行上下比方其罪無聽􅆫亂之辭以自疑勿用折獄不可行僭子念反惟察惟法其審克之惟當清察罪人之辭刑以法理其當詳審能之上刑適輕下服重刑有可以虧减則之輕服下罪下刑適重上服輕重諸罰有權一人有二罪則之重而輕并數輕重諸刑罰各有權冝并必政反數色住反刑罰丗輕丗重惟齊非齊有倫有要言刑罰隨丗輕重也刑新國用輕典刑亂國用重典刑平國用中典凡刑所以齊非齊各有倫理有要義罰懲非死人極于病刑罰所以懲過非殺人欲使惡人極於病苦莫敢犯者非佞折獄惟良折獄罔非在中非口才可以斷獄惟平良可以斷獄無不在中正重意罔非在中君陳爾惟勿宥惟厥中察辭于差非從惟從察囚辭其難在於差錯非從其爲辭惟從其本情哀敬折獄明啓刑書胥占咸庶中正當憐下人之犯法敬斷獄之害人明開刑書相與占之使刑當其罪皆庶幾必得中正之道當丁浪反其刑其罰其審克之其所刑其所罰其當詳審能行之無失中正重言其審克之四上文二獄成而孚輸而孚斷獄成辭而信當輸汝信於王謂上其鞠劾文辭上時掌反下注同鞠九六反劾亥代反玉篇胡得反其刑上備有并兩刑其斷刑文書上王府皆當備具有并兩刑亦具上之王曰嗚呼敬之哉官伯族姓朕言多懼敬之哉告使敬刑官長諸侯族同族姓異姓也我言多可戒懼以儆之儆音景重言敬之哉二前見康王之誥朕敬于刑有德惟刑我敬於刑當使有德者惟典刑今天相民作配在下明清于單辭今天治民人君爲配天在下當承天意聽訟當清審單辭單辭特難聽故言之相如字馬悉亮反􅂇也治直吏反民之亂罔不中聽獄之兩辭民之所以治由典獄之無不以中正聽獄之兩辭兩辭棄虚從實刑獄清則民治無或私家于獄之兩辭典獄無敢有受貨聽詐成私家於獄之兩辭獄貨非寳惟府辜功報以庶尤受獄貨非家寳也惟聚罪之事其報則以衆人見罪永畏惟罰非天不中惟人在命當長畏懼惟爲天所罰非天道不中惟人在教命使不中不中則天罰之天罰不極庶民罔有令政在于天下天道罰不中令衆民無有善政在於天下由人主不中將亦罰之令力呈反王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉嗣孫諸侯嗣丗子孫非一丗自今巳往當何監視非當立德於民爲之中正乎庶幾明聽我言而行之哉哲人惟刑無疆之辭屬于五極咸中有慶言智人惟用刑乃有無窮之善辭名聞於後丗以其折獄屬五常之中正皆中有善所以然也屬音燭受王嘉師監于兹祥刑有􅀖有土受王之善衆而治之者視於此善刑欲其勤而法之爲無疆之辭監本纂圖重言重意互註尚書卷第十二
