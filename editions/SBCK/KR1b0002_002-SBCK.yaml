body:
  text: 監本纂圖重言重意互註􅀧校尚書卷第二大禹謨第三虞書孔氏傳皐陶矢厥謨矢陳也皐音髙陶音遥禹成厥功陳其成功帝舜申之申重也重美二子之言重直用反作大禹皐陶謨大禹謀九功皐陶謀九德益稷凢三篇大禹謨禹稱大大其功謨謀也曰􅀂稽古大禹順考古道而言之重言􅀂稽古四本篇堯典舜典皐陶謨曰文命敷于四海祗承于帝言其外布文德教命内則敬承堯舜文命孔云文德教命也先儒云文命禹名曰后克艱厥后臣克艱厥臣政乃乂􅀺民敏德敏疾也能知爲君難爲臣不易則其政治而衆民皆疾修德易以䜴反治直吏反帝曰俞允􅀂兹嘉言罔攸伏野無遺賢萬􅀖咸寜攸所也善言無所伏言必用如此則賢才在位天下安俞羊朱反攸音由徐以帚反重言帝曰俞十二詳附堯典下重意萬􅀖咸寜周官萬國咸寜洛誥景命萬􅀖咸休稽于衆舎已從人不虐無告不廢困窮惟帝時克帝謂堯也舜因嘉言無所伏遂稱堯德以成其義考衆從人矜􅀌愍窮凡人所輕聖人所重舎音捨告故毒反矜居陵反重意惟帝時克益稷惟帝時舉益曰都帝德廣運乃聖乃神乃武乃文益因舜言又美堯也廣謂所覆者大運謂所及者逺聖無所不通神妙無方文經天地武定禍亂重意帝德廣運下文帝德罔愆皇天眷命奄有四海爲天下君眷視奄同也言堯有此德故爲天所命所以勉舜也眷居倦反奄於檢反重意皇天眷命太甲微子之命皇天眷佑爲天下君洪範爲天下王禹曰惠迪吉從逆凶惟影響迪道也順道吉從逆凶吉凶之報如影之隨形響之應聲言不虚迪徒歷反響許丈反益曰吁戒哉儆戒無虞罔失法度先吁後戒欲使聽者精其言虞度也無億度謂無形戒於無形備愼􅀷秉法守度言有􅁪吁况俱反度徒布反虞度徒洛反重意戒哉㣧征懋戒哉太甲嗣王戒哉罔遊于逸罔淫于樂淫過也遊逸過樂敗德之原富貴所忽故持以爲戒樂音洛任賢勿貳去邪勿疑疑謀勿成百志惟熈一意任賢果於去邪疑則勿行道義所存於心日以廣矣去起吕反熈火其反罔違道以干百姓之譽干求也失道求名古人賤之罔咈百姓以從已之欲咈戾也專欲難成犯衆興禍故戒之咈扶弗反戾連弟反無怠無荒四夷來王言天子常戒愼無怠惰荒廢則四夷歸往之怠音待惰徒卧反禹曰於音烏帝念哉德惟善政政在養民歎而言念重其言爲政以德則民懷之重言帝念哉二下文一又益稷帝其念哉水火金木土榖惟修言養民之本在先修六府正德利用厚生惟和正德以率下利用以阜財厚生以養民三者和所謂善政九功惟叙九叙惟歌言六府三事之功有次叙皆可歌樂乃德政之致樂音洛戒之乃降黎民懷之邁行種布降下懐歸也言己無德民所不能依皐陶布行其德下治於民民歸服之種章用反降工巷反重言黎民懷之二本篇一皐陶謨一帝念哉念兹在兹釋兹在兹兹此釋廢也念此人在此功廢此人在此罪言不可誣重言帝念哉二見上文互註左襄二十三年仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也夏書曰念兹在兹順事恕施也名言兹在兹允出兹在兹惟帝念功名言此事必在此義信出此心亦在此義言皐陶之德以義爲主所冝念之互註左襄二十一年夏書曰念兹在兹名言兹在兹允出兹在兹惟帝念功將謂由己壹也信由己壹而後功可念也住云言非但意念而己蓋須信己誠至帝曰皐陶惟兹臣庶罔或干予正或有也無有干我正言順命汝作士明于五刑以弼五教期于予治弼輔期當也歎其能以刑輔教當於治體當丁浪反又如字重言汝作士二前見舜典刑期于無刑民恊于中時乃功懋哉雖或行刑以殺止殺終無犯者刑期於無所刑民皆合於大中之道是汝之功勉之懋音茂重意民協于中吕刑士制百姓于刑之中重言時乃功三本篇二益稷一懋哉四舜典二本篇二皐陶曰帝德罔愆臨下以簡御衆以寛愆過也善則稱君人臣之義愆起䖍反罰弗及嗣賞延于丗嗣亦丗俱謂子延及也父子罪不相及而及其賞道德之政宥過無大刑故無小過誤所犯雖大必宥不忌故犯雖小必刑宥音又罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚之至與其殺不辜寜失不經好生之德洽于民心兹用不犯于有司辜罪經常司主也皐陶因帝勉已遂稱帝之德所以明民不犯上也寜失不常之罪不枉不辜之善仁愛之道辜音􅀌好呼報反重意好生之德洽于民心畢命道洽政治澤潤生民互註左襄二十六年善爲國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人􅀂不幸而過寜僣無濫與其失善寜其利淫無善人則國從之故夏書曰與其殺不辜寜失不經懼失善也詩曰人之云亡􅀖國殄瘁無善人之謂也帝曰俾予從欲以治四方風動惟乃之休使我從心所欲而政以治民動順上命􅀂草應風是汝能明刑之美也帝曰來禹降水儆予成允成功惟汝賢水性流下故曰下水儆戒也能成聲教之信成治水之功言禹最賢重美之儆居領反重直用反重言帝曰來禹二又益稷克勤于􅀖克儉于家不自滿假惟汝賢滿謂盈實假大也言禹惡衣薄食卑其宫室而盡力爲民執心謙冲不自盈大假工雅反盡津忍反爲于僞反汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功自賢曰矜自功曰伐言禹推善讓人而不失其能不有其勞而不失其功所以能絶衆人予懋乃德嘉乃丕績天之曆數在汝躬汝終陟元后丕大也曆數謂天道元大也大君天子舜善禹有治水之大功言天道在汝身汝終當升爲天子丕普悲反人心惟危道心惟微惟精惟一允執厥中危則難安微則難明故戒以精一信執其中重意惟精惟一咸有一德惟和惟一允執厥中仲虺建中于民無稽之言勿聽弗詢之謀勿庸無考無信驗不詢專獨終必無成故戒勿聽用聽徐天定反可愛非君可畏非民衆非元后何戴后非衆罔與守􅀖民以君爲命故可愛君失道民叛之故可畏言衆戴君以自存君恃衆以守國相須而立重意衆非元后何戴后非衆罔與守􅀖太甲民非后罔克胥匡以生后非民罔以辟四方咸有一德后非民罔使民非后罔事欽哉愼乃有位敬修其可願四海困窮天禄永終有位天子位可願謂道德之美困窮謂天民之無告者言爲天子勤此三者則天之禄籍長終汝身重言欽哉九本篇二餘附堯典重意愼乃有位益稷愼乃在位惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主慮而宣之成於一也出如字徐尺遂反好如字徐許到反禹曰枚􅁲功臣惟吉之從枚謂歷卜之而從其􅁻此禹讓之志枚音梅帝曰禹官占惟先蔽志昆命于元􅀛帝王立卜占之官故曰官占蔽斷昆後也官占之法先斷人志後命於元􅀛言志定然後􅁲蔽必丗反徐甫丗反斷丁亂反朕志先定詢謀僉同􅀑神其依􅀛筮協從卜不習吉習因也言巳謀之於心謀及􅁲筮四者合從􅁲不因􅁻無所枚卜僉七潜反重意卜不習吉金縢三􅀛一習吉禹拜稽首固辭再辭曰固帝曰母惟汝諧言母所以禁其辭禹有大功德故能諧和元后之任禁今鴆反又音金正月朔旦受命于神宗受舜終事之命神宗文祖之宗廟言神尊之正音政又音征重意正月朔旦受命于神宗舜典正月上日受終于文祖又月正元日舜格于文祖率百官􅀂帝之􅀄順舜􅀄攝帝位故事奉行之帝曰咨禹惟時有苗弗率汝徂征三苗之民數干王誅率循徂往也不循帝道言亂逆命禹討之數音朔重言咨禹二前見舜典禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命㑹諸侯共伐有苗軍旅曰誓濟濟衆盛之貌濟濟子禮反重意濟濟有衆咸聽朕命泰誓西土有衆咸聽朕言蠢兹有苗昬迷不恭蠢動昬闇也言其所以宜討之蠢春允反侮慢自賢反道敗德狎侮先王輕慢典教反正道敗德義侮亡甫反慢亡諌反君子在野小人在位廢仁賢任姦佞民棄不保天降之咎言民叛天災之咎其九反肆予以爾衆士奉辭罰罪肆故也辭謂不恭罪謂侮慢以下事爾尚一乃心力其克有勲尚庶幾一汝心力以從我命三旬苗民逆命旬十日也以師臨之一月不服責舜不先有又誥之命威讓之辭而便憚之以威脅之以兵所以生辭誥古報反憚徒旦反一音丹末反脅許業反益賛于禹曰惟德動天無逺弗届賛佐届至也益以此義佐禹欲其修德致逺届音戒滿招損謙受益時乃天道自滿者人損之自謙者人益之是天之常道帝􅀄于歷山往于田日號泣于旻天皐陶謨第四虞書孔氏傳皐陶謨謨謀也皐陶爲帝舜謀爲于僞反曰􅀂稽古皐陶亦順考古道以言之夫典謨聖帝所以立治之本也皆師法古道以成不易之則夫音扶治直吏反下同重言􅀂稽古四又堯典舜典大禹謨曰允迪厥德謨明弼諧迪蹈厥其也其古人也言人君當信蹈行古人之德謀廣聦明以輔諧其政蹈徒報反禹曰俞如何然其言問所以行重言禹曰俞三篇末一益稷一又禹曰俞哉如何三又見堯典益稷皐陶曰都愼厥身修絶句思永歎美之重也愼修其身思爲長乆之道悙敘九族庶明勵翼邇可逺在兹言愼修其身厚次叙九族則衆庶皆明其教而自勉勵翼戴上命近可推而逺者在此道悙切韻都昆反重意悙叙九族堯典以親九族仲虺九族乃離禹拜昌言曰俞以皐陶言爲當故拜受而然之當丁浪反下同重言禹拜昌言曰俞二前見大禹謨皐陶曰都在知人在安民歎修身親親之道在知人所信任在能安民禹曰吁咸􅀂時惟帝其難之言帝堯亦以知人安民爲難故曰吁重言咸􅀂時二後見君陳知人則哲能官人安民則惠􅀺民懷之哲智也無所不知故能官人惠愛也愛則民歸之重言黎民懷之二又前見大禹謨能哲而惠何憂乎驩兠佞人亂真堯憂其敗政故流放之何遷乎有苗何畏乎巧言令色孔壬孔甚也巧言靜言庸違令色象恭滔天禹言有苗驩兠之徒甚佞如此堯畏其亂政故遷放之重意景命無以巧言令色便辟側媚皐陶曰都亦行有九德言人性行有九德以考察眞僞則可知行下孟反注性行行正直之行同重意亦行有九德立政迪知忱恂于九德之行亦言其人有德乃言曰載采采載行采事也稱其人有德必言其所行某事以爲驗禹曰何問九德品例皐陶曰寛而栗性寛弘而能莊栗重言寛而栗二前見舜典柔而立和柔而能立事愿而恭慤愿而恭恪愿音願慤切韻苦角反恪苦各反亂而敬亂治也有治而能謹敬擾而毅擾順也致果爲毅擾而小反徐音饒毅五旣反直而温行正直而氣温和重言直而温二前見舜典簡而廉性簡大而有廉隅剛而塞剛斷而實塞斷丁亂反重意簡而廉剛而塞舜典剛而無虐簡而無傲彊而義無所屈撓動必合義撓女孝反彰厥有常吉哉彰明吉善也明九德之常擇人而官之則政之善日宣三德夙夜浚明有家三德九德之中有其三宣布夙早浚須也卿大天稱家言能日日布行三德早夜思之須明行之可以爲卿大夫浚息俊反馬云大也日嚴祗敬六德亮采有􅀖有國諸侯日日嚴敬其身敬行六德以信治政事則可以爲諸侯嚴如字馬徐魚檢反翕受敷施九德咸事俊乂在官翕合也能合受三六之德而用之以布施政教使九德之人皆用事謂天子如此則俊德能治之士並在官翕許及反俊乂馬云千人曰俊百人曰乂百僚師師百工惟時僚工皆官也師師相師法百官皆是言政無非僚本又作寮撫于五辰庶績其凝凝成也言百官皆撫順五行之時衆功皆成撫方武反凝魚陵反馬云定也重意庶績其凝堯典舜典庶績咸熈無教逸欲有􅀖不爲逸豫貪欲之教是有國者之常兢兢業業一日二日萬幾兢兢戒愼業業危懼幾微也言當戒懼萬事之微兢居凌反業如字徐五荅反幾徐音機無曠庶官天工人其代之曠空也位非其人爲空官言人代天理官不可以天官私非其才天叙有典勑我五典五悙哉天次叙人之常性各有分義當勑正我五常之教使合于五厚厚天下有典馬本作五典分扶問反重意勑我五典五悙哉舜典愼徽五典五典克從天秩有禮自我五禮有庸哉庸常自用也天次秩有禮當用我公侯伯子男五等之禮以接之使有常有庸馬本作五庸同寅協恭和􅂨哉􅂨善也以五禮正諸侯使同敬合恭而和善􅇆音中天命有德五服五章哉五服天子諸侯卿大夫士之服也尊卑采章各異所以命有德天討有罪五刑五用哉言天以五刑討有罪用五刑宜必當政事懋哉懋哉言叙典秩禮命德討罪無非天意者故人君居天官聽政治事不可以不自勉重言懋哉四舜典二禹謨本篇各一天聦明自我民聦明言天因民而降之福民所歸者天命之天視聽人君之行用民爲聦明重意天聦明自我民聦明㤗誓天視自我民視天聽自我民聽天明畏自我民明威天明可畏亦用民成其威民所叛者天討之是天明可畏之効畏如字徐音威馬本作威重言天明畏三本篇大誥多方逹于上下敬哉有土言天所賞罰惟善惡所在不避貴賤有土之君不可不敬懼重意逹于上下堯典格于上下皐陶曰朕言惠可厎行其所陳九德以下之言順於古道可致行禹曰俞乃言厎可績然其所陳從而美之曰用汝言致可以立功重言禹曰俞三本篇二益稷一又禹曰俞哉乃言厎可績二又見舜典皐陶曰予未有知思曰贊贊襄哉言我未有所知未能思致於善徒亦贊奏上古行事而言之因禹美之氶以謙辭言之序知如字徐音智思如字徐息吏反襄息羊反上也馬云因也案爾雅作儴因也如羊反益稷第五虞書孔氏傳益稷禹稱其人因以名篇帝曰來禹汝亦昌言因皐陶謀九德故呼禹使亦陳當言當丁浪反本亦作讜當湯反李登聲􅀋云讜言善言也重言帝曰來禹二前見大禹謨重意汝亦昌言又師汝昌言又禹謨皐謨禹拜昌言禹拜曰都帝予何言予思日孜孜拜而歎辭不言欲使帝重皐陶所陳言已思日孜孜不怠奉承臣功而已思徐如字又息吏反孜音兹重意予思日孜孜君陳惟日孜孜皐陶曰吁如何問所以孜孜之事重言如何三堯典皐陶謨本篇禹曰洪水滔天浩浩懷山襄陵下民昬墊言天下昬瞀墊溺皆困水災浩户老反墊丁念反瞀音務一音茂本或作務溺乃歷反重意洪水滔天浩浩懷山襄陵下民昬墊堯典湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨予乗四載隨山刋术所載者四謂水乗舟陸乗車泥乗輴山乗樏隨行九州之山林刋槎其木開通道路以治水也乗音繩刋苦安反輴丑倫反漢書作橇如淳音蕝以板置泥上服䖍云木橇形如木箕擿行泥上尸子云澤行乗蕝蕝子絶反摞力追反史記作橋徐音丘遥反漢書作梮九足反行下孟反槎士雅反下同􅀃文云衺斫又莊下反重言隨山刋木二又禹貢曁益奏庶鮮食奏謂進於民鳥獸新殺曰鮮與益槎木獲鳥獸民以進食曁其器反鮮徐音仙馬云鮮生也予決九川距四海濬畎澮距川距至也決九州名川通之至於海一畒之間廣尺深尺曰畎方百里之間廣二尋深二仞曰澮澮畎深之至川亦入海畎工犬反澮故外反廣光浪反深尸鴆反曁稷播奏庶艱食鮮食艱難也衆難得食處則與稷教民播種之決川有魚鼈使民鮮食之艱工閑反馬本作根云根生之食謂百榖處昌慮反鼈必㓕反懋遷有無化居化易也居謂所宜居積者勉勸天下徙有之無魚鹽徙山林木徙川澤交易其所居積懋音茂鹽余廉反烝民乃粒萬􅀖作乂米食曰粒言天下由此爲冶本烝之承反粒音立治直吏反下同皐陶曰俞師汝昌言言禹功甚當可師法當丁浪反重意師汝昌言見本篇首禹曰都帝愼乃在位帝曰俞然禹言受其戒重言謹乃在位大禹謨謹乃有位重意帝曰俞十二本篇一餘附堯典禹曰安汝止惟幾惟康其弼直言愼在位當先安好惡所止念慮幾微以保其安其輔臣必用直人好惡上呼報反下烏路反又並如字重意惟幾惟康本篇末惟時惟幾惟動丕應徯志徯待也帝先定所止動則天下大應之順命以待帝志應應對之應徯胡啓反以昭受上帝天其申命用休昭明也非但人應之又乃明受天之報施天又重命用美施始豉反重直用反帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞鄰近也言君臣道近相須而成重言帝曰吁四堯典三禹曰俞三皐陶謨二又下文禹曰俞哉帝曰臣作朕股肱耳目言大體􅀂身股音古肱古弘反重意臣作朕肱肱耳目君牙作股肱心膂予欲左右有民汝翼左右助也助我所有之民富而教之汝翼成我予欲宣力四方汝爲布力立治之功汝羣臣當爲之予欲觀古人之象欲觀示法象之服制觀舊音官又官喚反日月星辰山龍華蟲日月星爲三辰華象草華蟲雉也畫三辰山龍華蟲於衣服旌旗蟲直弓反作㑹宗彞㑹五采也以五采成此畫焉宗廟彞樽亦以山龍華蟲爲飾㑹胡對反馬鄭作繪彞音夷馬同又鄭云宗彞虎也藻火粉米黼黻絺繡藻水草有文者火爲火字粉􅀂粟冰米􅀂聚米黼􅀂斧形黻爲兩己相背葛之精者曰絺五色備曰繡藻音早本又作薻粉米􅀃文作黺徐本作䋛音米黼音甫白與黒謂之黼黻音弗黒與青謂之黻絺徐勑私反又勑其反馬同鄭陟里反刺也繡音秀背音佩以五采彰施于五色作服汝明天子服日月而下諸侯自龍衮而下至黼黻士服藻火大夫加粉米上得兼下下不得僣上以五采明施于五色作尊卑之服汝明制之衮工本反僣子念反予欲聞六律五聲八音在治忽以出納五言汝聽言欲以六律和聲音在察天下治理及忽怠者又以出納仁義禮智信五德之言施于民以成化汝當聽審之出如字又尺遂反注同納如字又音内重意以出納五言舜典命汝作納言又下文工以納言予違汝弼汝無面從退有後言我違道汝當以義輔正我無得靣從我違而退後有言我不可弼欽四鄰庶頑讒􅀃􅀂不在時四近前後左右之臣勑使敬其職衆頑愚讒􅀃之人􅀂所行不在於是而爲非者當察之侯以明之撻以記之當行射侯之禮以明善惡之教答撻不是者使記識其過撻他末反又他逹反笞勑疑反書用識哉欲並生哉書識其非欲使改海與共並生工以納言時而颺之工樂官掌誦詩以納諌當是正其義使颺道之颺音􅀭重意工以納言上文以出納五言舜典命汝作納言格則承之庸之否則威之天下人能至于道則承用之任以官不從教則以刑威之否方有反徐音鄙任汝鴆反禹曰俞哉帝光天之下至于海隅蒼生光天之下至于海隅蒼蒼然生草木言所及廣逺重意禹曰俞哉上文及前篇禹曰俞帝光天之下堯典光宅天下萬􅀖黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸獻賢也萬國衆賢共爲帝臣帝舉是而用之使陳布其言明之皆以功大小爲差以車服旌其能用之重意惟帝時舉大禹謨惟帝時克重言敷納以言明庶以功車服以庸二前見舜典納作奏庶作試互註左僖二十七年謀元帥趙衰曰郤榖可臣亟聞其言矣􅀃禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸君其試之誰敢不讓敢不敬應上惟賢是用則下皆敬應上命而讓善應應對之應帝不時敷同日奏罔功帝用臣不是則逺近布同而日進於無功以賢愚並位優劣共流故無􅀂丹朱傲惟慢遊是好丹朱堯子舉以戒之傲五報反字又作奡好呼報反敖虐是作罔晝夜􅋕􅋕敖戲而爲䖒無晝夜常􅋕􅋕肆惡無休息敖五羔反徐五報反注同頟五客反罔水行舟朋淫于家用殄厥丗朋羣也丹朱習於無水陸地行舟言無度羣淫於家妻妾亂用是絶其丗不得嗣殄徒現反予創􅀂時娶于塗山辛壬癸甲創懲也塗山國名懲丹朱之惡辛日娶妻至于甲日復往治水不以私害公娶促住反復扶又反啓􅈱􅈱而泣予弗子惟荒度土功啓禹子也禹治水過門不入聞啓泣聲不暇子名之以大治度水土之功故􅈱音􅀌子如字鄭將吏反度徒洛反弼成五服至于五千州十有二師五服侯甸綏要荒服也服五百里四方相距爲方五千里治洪水輔成之一州用三萬人功九州二十七萬庸也至于五千馬云面五千里爲方萬里鄭云五服已五千又弼成爲萬里州十有二師二千五百人爲師鄭云師長也要一遥反外薄四海咸建五長薄迫也言至海諸侯五國立賢者一人爲方伯謂之五長以相統治以􅅄帝室薄蒲各反徐扶各反長丁丈反五長衆官之長各迪有功苗頑弗即工帝其念哉九州五長各蹈爲有功唯三苗頑凶不得就官善惡分别别彼列反重意帝其念哉畢命公其念哉大禹謨帝念哉帝曰迪朕德時乃功惟叙言天下蹈行我德是汝治水之功有次叙敢不念乎重言時乃功三大禹謨二皐陶方祗厥叙方施象刑惟明方四方禹五服旣成故皐陶敬行其九德考績之次序於四方又施其法刑皆明白史因禹功重美之重直用反夔曰戞擊鳴球搏拊琴瑟以詠祖考來格戞擊柷敔所以作止樂搏拊以韋爲之實之以糠所以節樂球玉磬此舜廟堂之樂民恱其化神歆其祀禮備樂和故以祖考來至明之夔求􅀛反戞居八反徐古八反馬云櫟也球音求搏音博拊音撫柷尺叔反所以作樂敔魚吕反所以止樂糠音康歆許今反虞賔在位羣后德讓丹朱爲王者後故稱賔言與諸侯助􅀕班爵同推先有德下管鼗鼔合止柷敔堂下樂也上下合止樂各有柷敔明球弦鍾籥各自互見鼗音桃合如字徐音閤籥余􅀂反互音􅬰見賢遍反下見細器同笙鏞以間鳥獸蹌蹌鏞大鍾間迭也吹笙擊鍾鳥獸化德相率而舞蹌蹌然鏞音庸間間厠之間鳥獸孔以爲自舞也馬云鳥獸筍簴也蹌七羊反舞貌􅀃文作搶鳥獸求食聲迭直結反簫韶九成鳯凰來儀韶舜樂名言簫見細器之備雄曰鳯雌曰凰靈鳥也儀有容儀備樂九奏而致鳯凰則餘鳥獸不侍九而率舞韶時昭反夔曰於予擊石拊石百獸率舞庶尹允諧尹正也衆正官之長信皆和諧言神人治始於任賢立政以禮治神以樂所以太平於予並如字重言於予擊石拊石百獸率舞二前見舜典帝庸作歌曰勑天之命惟時惟幾用庶尹允諧之政故作歌以戒安不忘危勑正也奉正天命以臨民惟在順時惟在愼微重意惟時惟幾上文惟幾惟康乃歌曰股肱喜哉元首起哉百工熈哉元首君也股肱之臣喜樂盡忠君之治功乃起百官之業乃廣樂音洛盡津忍反皐陶拜手稽首颺言曰念哉大言而疾曰颺承歌以戒帝颺音揚重言念哉二後見伊訓又吕刑念之哉率作興事愼乃憲欽哉憲法也天子率臣下爲起治之事當慎汝法度敬其職重言欽哉九本篇二餘附堯典屢省乃成欽哉屢數也當數顧省汝成功敬終以善無懈怠屢力具反省悉井反數色角反􅈈佳賣反乃賡載歌曰元首明哉股肱良哉庶事康哉􅆳續載成也帝歌歸美股肱義未足故續歌先君後臣衆事乃安以成其義􅆳加孟反劉皆行反􅀃文以爲古續字又歌曰元首叢脞哉股肱惰哉萬事墮哉叢脞細碎無大略君如此則臣懈惰萬事堕廢其功不成歌以申戒叢才公反脞倉果反徐音鎻馬云叢揔也脞小也惰徒卧反墮許規反帝拜曰俞往欽哉拜受其歌戒羣臣自今以往敬其職事哉重言往欽哉三堯典舜典本篇各一監本纂圖重言重意互註􅀧校尚書卷第二
