body:
  text: 監本纂圖重言重意互註尚書卷第九洛誥第十五周書孔氏傳召公旣相宅周公往營成周使來告卜召公先相宅卜之周公自後至經營作之遣使以所卜吉兆逆告成王相息亮反注及下同使所吏反注遣使同作洛誥洛誥旣成洛邑將致政成王告以居洛之義周公拜手稽首曰朕復子明辟周公盡禮致敬言我復還明君之政於子子成王年二十成人故必歸政而退老辟必亦反重言周公拜手稽首二重見篇末王如弗敢及天基命定命如往也言王往曰㓜少不敢及知天始命周家安定天下之命故己攝少詩照反予乃㣧保大相東土其基作民明辟我乃繼文武安天下之道大相洛邑其始爲民明君之治治直吏反予惟乙卯朝至于洛師致政在冬本其春來至洛衆􅀃始卜定都之意重意朝至于洛師召誥太保朝至于洛我卜河朔黎水我乃卜澗水東􅗉水西惟洛食我使人卜河北黎水卜不吉又卜澗􅗉之間南近洛吉今河南城也卜必先墨畫􅀛然後灼之兆順食墨河朔朔北也􅈆直連反近附近之近我又卜􅗉水東亦惟洛食伻來以圖及獻卜今洛陽也將定下都遷殷頑民故并卜之遣使以所卜地圖及獻所卜吉兆來告成王伻晋耕反徐敷耕反又甫耕反下同王拜手稽首曰公不敢不敬天之休來相宅其作周匹休成王尊敬周公荅其拜手稽首而受其言述而美之言公不敢不敬天之美來相宅其作周以配天之美重言王拜手稽首二太甲中一來相宅二見篇末公旣定宅伻來來視予卜休􅁪吉我二人共貞言公前巳定宅遣使來來視我以所卜之美常吉之居我與公共正其美貞正也馬云當也公其以予萬億年敬天之休公其當用我萬億年敬天之美十千爲萬十萬爲億言乆逺拜手稽首誨言成王盡禮致敬於周公求教誨之言盡子忍反周公曰王肇稱殷禮祀于新邑咸秩無文言王當始舉殷家􅀕祀以禮典祀于新邑皆次秩不在禮文者而祀之重言咸秩無文二見下文予齊百工伻從王于周予惟曰庶有事我整齊百官使從王於周行其禮典我惟曰庶幾有善政事今王即命曰記功宗以功作元祀今王就行王命於洛邑曰當記人之功尊人亦當用功大小爲序有大功則列大祀謂功施於民者曰記上音越一音人實反惟命曰汝受命篤弼丕視功載乃汝其悉自教工惟天命我周􅀖汝受天命厚矣當輔大天命視羣臣有功者記載之乃汝新即政其當盡自教衆官躬化之孺子其朋孺子其朋其往少子愼其朋黨少子愼其朋黨戒其自今巳往無􅀂火始燄燄厥攸灼叙弗其絶言朋黨敗俗所冝禁絶無令􅀂火始然􅆋􅆋尚微其所及灼然有次序不其絶事從微至著防之冝以􅀄燄音豔叙絶句馬讀叙句字屬下令力呈反厥􅀂彞及撫事如予惟以在周工其順常道及撫國事如我所爲惟用在周之百官往新邑伻嚮即有僚明作有功惇大成􅁉汝永有辭往行政化於新邑當使臣下各嚮就有官明爲有功厚大成寛􅁉之德則汝長有歎譽之辭於後丗嚮許亮反注同惇都昆反公曰巳汝惟冲子惟終巳乎汝惟童子嗣父祖之位惟當終其美業重意巳汝惟冲子大誥巳予惟小子康誥巳汝惟小子汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享奉上謂之享言汝爲王其當敬識百君諸侯之奉上者亦識其有違上者奉上之道多威儀威儀不及禮物惟曰不奉上惟不役志于享凡民惟曰不享惟事其爽侮言人君惟不役志于奉上則凡人化之惟曰不奉上矣如此則惟政事其差錯侮慢不可治理重言凡民惟曰不二重見多方享乃惟孺子頒朕不暇聽朕教汝于棐民彞我爲政常􅀂不暇汝惟小子當分取我之不暇而行之聽朕教汝於輔民之常而用之頒音班徐甫云反馬云猶也棐音匪又芳􅀑反汝乃是不蘉乃時惟不永哉汝乃是不勉爲政汝是惟不可長哉欲其必勉爲可長蘉徐莫剛反又武剛反馬云勉也篤叙乃正父罔不􅀂予不敢廢乃命厚次序汝正父之道而行之無不順我所爲則天下不敢棄汝命常奉之汝往敬哉兹予其明農哉彼􅁉我民無逺用戾汝往居新邑敬行教化哉如此我其退老明教農人以義哉彼天下􅀍寛􅁉之政則我民無逺用來言皆來􅀍皮􅀉反又彼美反重言敬哉五康誥二本篇蔡仲之命君陳各一王􅀂曰公明保予冲子成王順周公意請留之自輔言公當明安我童子不可去之公稱丕顯德以予小子揚文武烈言公當留舉大明德用我小子褒揚文武之業而奉順天褒薄謀反切韻博毛反奉荅天命和􅁪四方民居師又當奉當天命以和常四方之民居處其衆惇宗將禮稱秩元祀咸秩無文厚尊大禮舉秩大祀皆次秩無禮文而冝在祀典者凡此待公而行重言咸秩無文二見上文惟公德明光于上下勤施于四方言公明德光于天地勤政施於四海萬􅀖四夷服仰公德而化之旁作穆穆迓衡不迷文武勤教四方旁來爲敬敬之道以迎太平之政不迷惑於文武所勤之教言化洽旁歩光反迓五嫁反馬鄭王皆音魚據反予冲子夙夜毖祀言政化由公而立我童子徒早起夜寐愼其􅀕祀而巳無所能毖音祕王曰公功棐迪篤罔不􅀂時公之功輔道我巳厚矣天下無不順而是公之功王曰公予小子其退即辟于周命公後我小子退坐之後便就君於周命立公後公當留佐我四方迪亂未定于宗禮亦未克敉公功言四方雖道治猶未定於尊禮禮未彰是亦未能撫順公之大功明不可以去敉亡婢反治直吏反下同迪將其後監我士師工公留教道將助我其今巳後之政監篤我政事衆官委任之言監古衘反注同誕保文武受民亂爲四輔大安文武所受之民治之爲我四維之輔明當依􅀝公王曰公定予往巳公功肅將祗歡公留以安定我我從公言往至洛邑巳矣公功巳進大天下咸敬樂公功樂音洛公無困哉我惟無斁其康事公勿替刑四方其丗享公必留無去以困我哉我惟無厭其安天下事公勿去以廢法則四方其丗丗享公之德斁音亦厭於􅃩反周公拜手稽首曰王命予來承保乃文祖受命民拜而後言許成王留言王命我來承安汝文徳之祖文王所受命之民是所以不得去重言周公拜手稽首二見篇首越乃光烈考武王弘朕恭於汝大業之父武王大使我恭奉其道叙成王留己意孺子來相宅其大惇典殷獻民少子今所以來相宅於洛邑其大厚行典常於殷賢人亂爲四方新辟作周恭先言當治理天下新其政化爲四方之新君爲周家見恭敬之主後丗所推先也曰其自時中乂萬􅀖咸休惟王有成績日其當用是土中爲治使萬國皆􅀍羙德如此惟王乃有成功重言其自時中乂二前見召誥萬􅀖咸休二後見冏命予旦以多子越御事篤前人成烈荅其師作周孚先我旦以衆卿大夫於御治事之臣厚率行先王成業當其衆心爲周家立信者之所推先重言越御事二前見梓材考朕昭子刑乃單文祖德伻來毖殷乃命寜我所成明子法乃盡文祖之德謂典禮也所以居土中是文武使己來慎教殷民乃見命而安之單音丹馬丁但反信也予以秬鬯二卣曰明禋拜手稽首休享周公攝政七年致太平以黒􅁰酒二器明㓗致敬告文武以美享旣告而致政成王留之本􅀃之秬音巨鬯勑亮反香酒也卣由手反又音由中樽也禋音因予不敢􅀫則禋于文王武王言我見天下太平則㓗告文武不經􅀫惠篤叙無有遘自疾萬年厭于乃德殷乃引考汝爲政當順典常厚行之使有次序無有遇用患疾之道者則天下萬年厭於汝德殷乃長成爲周遘工豆反厭於豔反注同馬云厭飫也徐於廉反王伻殷乃承叙萬年其永觀朕子懷德王使殷民上下相承有次序則萬年之道民其長觀我子孫而歸其德矣勉使終之戊辰王在新邑成王旣受周公誥遂就居洛邑以十二月戊辰晦到王在新邑馬孔絶句烝􅀕歳文王騂牛一武王騂牛一王命作􅁽逸祝􅁽惟告周公其後明月夏之仲冬始於新邑烝􅀕故曰烝􅀕歳古者褒德賞功必於􅀕日示不專也特加文武各一牛告曰尊周公立其後爲魯侯烝之承反鄭讀王在新邑烝騂息營反祝之又反一音之六反王賔殺禋咸格王入太室祼王賔異周公殺牲精意以享文武皆至其廟親告也太室清廟祼鬯告神王賔絶句殺禋絶句一讀連咸格絶句太室馬云廟中之夾室祼官喚反王命周公後作􅁽逸誥王爲􅁽書使史逸誥伯禽封命之書皆同在烝􅀕日周公拜前魯公拜後在十有二月惟周公誕保文武受命惟七年言周公攝政盡此十二月大安文武受命之事惟七年天下太平自戊辰以下史所終述受命絶句馬同惟七年周公攝政七年天下太平馬同鄭云文王武王受命及周公居攝皆七年多士第十六周書孔氏傳成周旣成洛陽下都遷殷頑民殷大夫士心不則德義之經故徙近王都教誨之不則如字或作測非近附近之近周公以王命誥稱成王命告令之作多士多士所告者即衆土故以名篇惟三月周公􅀄于新邑洛用告商王士周公致政明年三月始於新邑洛用王命誥商王之衆上王􅀂曰爾殷遺多士順其事稱以告殷遺餘衆士所順在下弗弔旻天大降䘮于殷稱天以愍下言愍道至者殷道不至故旻天下䘮亡於殷弔音的旻天上閔巾反仁覆愍下謂之旻馬云秋曰旻天秋殺也方言降䘮故稱旻天也愍眉隕反䘮息浪反重言弗弔三前見大誥後見君奭我有周佑命將天明威言我有周受天佑助之命故得奉天明威致王罰勑殷命終于帝天命周致王者之誅罰正黜殷命終周於帝王肆爾多士非我小國敢弋殷命天佑我故汝衆士臣服我弋取也非我敢取殷王命乃天命弋徐音翼馬本作翼義同惟天不􅂌允罔固亂弼我我其敢求位惟天不與信無堅固治者故輔佐我我其敢求天位乎治直吏反􅂌必利反下同重言惟天不􅂌二見本篇惟帝不􅂌惟我下民秉爲惟天明畏惟天不與紂惟我周家下民秉心爲我皆是天明德可畏之效爲于僞反畏如字一音威重言天明畏三前見皐陶謨大誥我聞曰上帝引逸有夏不適逸則惟帝降格言上天欲民長逸樂有夏桀爲政不之逸樂故天下至戒以譴告之樂音洛下同譴棄戰反嚮于時夏弗克庸帝大淫泆有辭天下至戒是嚮於時夏不背棄桀不能用天戒大爲過逸之行有惡辭聞於丗嚮許亮反于時夏絶句馬以時字絶句泆音逸又作佾注同馬本作屑云過也背音佩行下孟反惟時天罔念聞厥惟廢元命降致罰惟是桀惡有辭故天無所念聞言不佑其惟廢其大命下致天罰乃命爾先祖成湯革夏俊民甸四方天命湯更代夏用其賢人治四方甸徒遍反自成湯至于帝乙罔不明德恤祀自帝乙以上無不顯用有德憂念齊敬奉其􅀕祀言能保宗廟社稷上時掌反齊側皆反亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤湯旣革夏亦惟天大立安治於殷殷家諸王皆能憂念􅀕祀無敢失天道者故無不配天布其德澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家後嗣王紂大無明於天道行昬虐天且忽之况曰其有聽念先祖勤勞國家之事乎誕淫厥泆罔顧于天顯民祗言紂大過其過無顧於天無能明人爲敬暴亂甚惟時上帝不保降􅀂兹大䘮惟是紂惡天不安之故下􅀂此大䘮亡之誅䘮息浪反惟天不􅂌不明厥德凡四方小大􅀖䘮罔非有辭于罰惟天不與不明其德者故凡四方小大國䘮滅無非有辭於天所罰言皆有闇亂之辭重言惟天不􅂌二見篇首王􅀂曰爾殷多士今惟我周王丕靈承帝事周王文武也大神奉天事言明德恤祀重意今惟我周王丕靈承帝事多方惟我周王靈承于旅有命曰割殷告勑于帝天有命命周割絶殷命告正於天謂旣克紂柴於牧野告天不頓兵傷士惟我事不貳適惟爾王家我適言天下事巳之我周矣不貳之佗惟汝殷王家巳之我不復有變復扶又反予其曰惟爾洪無度我不爾動自乃邑我其曰惟汝大無法度謂紂無道我不先動誅汝亂從汝邑起言自召禍予亦念天即于殷大戾肆不正我亦念天就於殷大罪而加誅者故以紂不能正身念法王曰猷告爾多士予惟時其遷居西爾以道告汝衆士我惟汝未逹德義是以徙居西汝於洛邑教誨汝非我一人奉德不康寜時惟天命我徙汝非我天子奉德不能使民安之是惟天命冝然重言時惟天命二見下文無違朕不敢有後無我怨汝無違命我亦不敢有後誅汝無怨我惟爾知惟殷先人有􅁽有典殷革夏命言汝所親知殷先丗有􅁽書典籍􅀃殷改夏王命之意今爾又曰夏迪簡在王庭有服在百僚簡大也今汝又曰夏之衆士蹈道者大在殷王庭有服職在百官言見任用重意夏迪簡在王庭有服在百僚多方迪簡在王庭尚爾事有服在大僚予一人惟聽用德肆予敢求爾于天邑商言我周亦法殷家惟聽用有德故我敢求汝於大邑商將任用之予惟率肆矜爾非予罪時惟天命惟我循殷故事憐愍汝故徙教汝非我罪咎是惟天命重言時惟天命上文王曰多士昔朕來自奄予大降爾四國民命昔我來從奄謂先誅三監後伐奄淮夷民命謂君也天下汝民命謂誅四國君重意予大降爾四國民命多方我惟大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜四國君叛逆我下其命乃所以明致天罰今移徙汝於洛邑使汝逺於惡俗比近臣我宗周多爲順道逖他歷反比毗志反注同逺于萬反王曰告爾殷多士今予惟不爾殺予惟時命有申所以徙汝是我不欲殺汝故惟是教命申戒之今朕作大邑于兹洛予惟四方罔攸賔今我作此洛邑以待四方無有逺近無所賔外賔如字徐音殯馬云却也亦惟爾多士攸服奔走臣我多遜非但待四方亦惟汝衆士所當服行奔走臣我多爲順事爾乃尚有爾土爾乃尚寜幹止汝多爲順事乃庶幾還有汝本土乃庶幾安汝故事止居以反所生誘之爾克敬天惟􅂌矜爾汝能敬行順事則爲天所與爲天所憐重言天惟􅂌矜爾立後見多方爾不克敬爾不啻不有爾土予亦致天之罰于爾躬汝不能敬愼其罰深重不但不得還本土而巳我亦致天罰於汝身言刑殺啻始䜴反徐本作商音同下篇放此重意予亦致天之罰于爾躬多方我則致天之罰湯誓致天之罰今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛今汝惟是敬順居汝邑繼汝所當居爲則汝其有安事有豐年於此洛邑言由洛修善得還本土有幹有年爾小子乃興從爾遷汝能敬則子孫乃起從汝化而遷善王曰又曰時予乃或言爾攸居言汝衆士當是我勿非我也我乃有教誨之言則汝所當居行無逸第十七周書孔氏傳周公作無逸中人之性好逸豫故戒以無逸好呼報反無逸成王即政恐其逸豫故以所戒名篇周公曰嗚呼君子所其無逸歎美君子之道所在念德其無逸豫君子且猶然况王者乎先知稼穡之艱難乃逸則知小人之依稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怙怙音戸相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難視小人不孝者其父母躬勤艱難而子乃不知其勞相息亮反重意厥父母止艱難見大誥乃逸乃諺旣誕否則侮厥父母曰昔之人無聞知小人之子旣不知父母之勞乃爲逸豫遊戲乃叛諺不恭巳欺誕父母不欺則輕侮其父母曰古老之人無所聞知諺音彦周公曰嗚呼我聞曰昔在殷王中宗太戊也殷家中丗尊其德故稱宗嚴恭寅畏天命自度言太戊嚴洛恭敬畏天命用法度嚴如字又魚檢反注同馬作儼治民祗懼不敢荒寜爲政敬身畏懼不敢荒怠自安治直吏反重言不敢荒寜重見下文肆中宗之享國七十有五年以敬畏之故得壽考之福其在髙宗時舊勞于外爰曁小人武丁其父小乙使之乆居民間勞是稼穡與小人出入同事作其即位乃或亮隂三年不言武丁起其即王位小乙死乃有信黙三年不言言孝行著行下孟反重言作其即位二重見下文其惟不言言乃雍不敢荒寜在䘮則其惟不言䘮畢發言則天下和亦法中宗不敢荒怠自安互註記檀弓子張問曰書云髙宗三年不言言乃讙有諸仲尼曰胡爲其不然也古者天子崩王丗子聽於􅃁宰三年嘉靖殷􅀖至于小大無時或怨善謀殷國至于小大之政人無是有怨者言無非肆髙宗之享國五十有九年髙宗爲政小大無怨故亦享國永年其在祖甲不義惟王舊爲小人湯孫太甲爲王不義乆爲小人之行伊尹放之桐作其即位爰知小人之依能保惠于庶民不敢侮鰥寡在桐三年思集用光起就王位於是知小人之所依依仁政故能安順於衆民不敢侮慢惸獨惸求營反字又作焭重言不敢侮鰥寡三康誥一肆祖甲之享國三十有三年太甲亦以知小人之依故得乆年此以德優劣立年多少爲先後故祖甲在下殷家亦祖其功故稱祖自時厥後立王生則逸從是三三各承其後而立者生則逸豫無度重言自時厥後二重見下文生則逸不知稼穡之艱難言與小人之子同其敝不聞小人之勞惟耽樂之從過樂謂之耽惟樂之從言荒淫耽丁南反注下同樂音洛注下同自時厥後亦罔或克壽以耽樂之故從是其後亦無有能壽考或十年或七八年或五六年或四三年髙者十年下者三年言逸樂之損壽周公曰嗚呼厥亦惟我周太王王季克自抑畏大王周公曾祖王季即祖言皆能以義自抑畏敬天命將􅀃文王故本其父祖文王卑服即康功田功文王節儉卑其衣服以就其安人之功以就田功以知稼穡之艱難卑服如字馬本作俾使也徽柔懿恭懷保小民惠鮮鰥寡以羙道和民故民懷之以美政恭民故民安之又加惠鮮乏鰥寡之人鮮息淺反注同自朝至于日中􅉴不遑暇食用咸和萬民從朝至日昳不暇食思慮政事用皆和萬民􅉴音側本又作仄昳田節反文王不敢盤于遊田以庻􅀖惟正之供文王不敢樂於遊逸田獵以衆國所取法則當以正道供待之故供音恭文王受命惟中身厥享國五十年文王九十七而終中身即位時年四十七言中身舉全數周公曰嗚呼繼自今嗣王繼從今巳往嗣丗之王皆戒之則其無淫于觀于逸于遊于田以萬民惟正之供所以無敢過於觀遊逸豫田獵者用萬民當惟正身以供待之故無皇曰今日耽樂乃非民攸訓非天攸􅀂時人丕則有愆無敢自暇曰惟今日樂後日止夫耽樂者乃非所以教民非所以順天是人則大有過矣愆起䖍反夫音扶無􅀂殷王受之迷亂酗于酒德哉以酒爲凶謂之酗言紂心迷政亂以酗酒爲德戒嗣王無如之酗况付反周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨歎古之君臣雖君明臣良猶相道告相安順相教誨以義方民無或胥譸張爲幻譸張誑也君臣以道相正故下民無有相欺誑幻感也譸竹求反馬本作輈爾雅及詩作侜同侜張誑也勾音患誑九况反此厥不聽人乃訓之乃變亂先王之正刑至于小大此其不聽中正之君人乃教之以非法乃變亂先王之正法至于小大無不變亂言己有以致之重言此厥不聽二重見下文民否則厥心違怨否則厥口詛祝以君變亂正法故民否則其心違怨否則其口詛祝言皆患其上詛側助反祝之又反周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人迪哲言此四人皆蹈智明德以臨下厥或告之曰小人怨汝詈汝則皇自敬德其有告之言小人怨詈汝者則大自敬德増修善政詈力致反厥愆曰朕之愆允􅀂時不啻不敢含怒其人有過則曰我過百姓有過在予一人信如是怨詈則四王不啻不敢含怒以罪之言常和恱此厥不聽人乃或譸張爲幻曰小人怨汝詈汝則信之此其不聽中正之君有人誑惑之言小人怨憾詛詈汝則信受之憾胡暗反重言此厥不聽二重見上文則􅀂時不永念厥辟不寛綽厥心則如是信讒者不長念其爲君之道不寛緩其心言含怒亂罰無罪殺無辜怨有同是叢于厥身信讒含怒罰殺無罪則天下同怨讎之叢聚於其身叢才工反周公曰嗚呼嗣王其監于兹視此亂罰之禍以爲戒重意嗣王其監于兹太甲上嗣王戒哉監本纂圖重言重意互註尚書卷第九
