body:
  text: 􅁥本纂圖重言重意􅀧校尚書卷第三禹貢第一夏書孔氏傳禹別九州分其圻界别彼列反九州周公職録云黄帝受命風后受圖割地布九州鄹子云中國爲赤縣赤縣之内有九州春秋􅀃題辭云州之言殊也圻其依反隨山濬川刋其木深其流濬思俊反刋苦安反重言隨山刋木二前見益稷任土作貢任其土地所有定其貢賦之差此堯時事而在夏書之首禹之王以是功任而鴆反貢或作贛王于况反禹貢禹制九州貢法禹敷土隨山刋木洪水汎溢禹分布治九州之土隨行山林斬木通道敷芳無反馬云分也汎敷劒反行下孟反奠髙山大川奠定也髙山五岳大川四瀆定其差秩祀禮所視奠田遍反瀆音獨下同冀州旣載堯所都也先施貢賦役載於書冀居器反州九州名義見爾雅音載如字載載於書也馬同鄭韋昭云載事也壷口治梁及􅄮壷口在冀州梁岐在雍州從東循山治水而西壷音胡馬云壷口山名治如字􅄮其冝反雍於用反後州名同旣修太原至于岳陽髙平曰太原今以爲郡名岳太岳在太原西南山南曰陽岳字又作嶽太岳山名陽山南曰陽水北亦曰陽覃懷底績至于衡漳覃懷近河地名漳水横流入河從覃懷致功至横漳覃徒南反底之履反衡如字横也馬云水名漳音章近附近之近厥土惟白壤無塊曰壤水去土復其性色白而壤壤􅀂丈反馬云天性和美也塊苦對反厥賦惟上上錯賦謂土地所生以供天子上上第一錯雜􅄂出第二之賦上如字賦第一錯倉各反馬云地有上下相錯通率第一供音恭厥田惟中中田之髙下肥瘠九州之中爲第五中丁仲反又如字中馬云土地有髙下肥符非反瘠在亦反􅁪衛旣從大陸旣作二水巳治從其故道大陸之地巳可耕作從丁容反㠀夷皮服海曲謂之㠀居㠀之夷還服其皮明水害除㠀當老反馬云㠀夷北夷國夾右碣石入于河碣石海畔山禹夾行此山之右而入河逆上此州帝都不􅀃境界以餘州所至則可知先賦後田亦殊於餘州不言貢篚亦差於餘州夾音協注同帶也碣其列反韋昭其逝反上時掌反篚方尾反重言入于河三冀州一又篇末導沇導渭各一濟河惟兖州東南據濟西北距河濟子禮反下同兖恱轉反九河旣道河水分爲九道在此州界平原以北是丸河徒駭一太史二馬頰三覆釡四胡蘇五簡六絜七鉤盤八鬲津九岀爾雅雷夏旣澤灉沮㑹同雷夏澤名灉沮二水㑹同此澤灉徐音邕王於用反沮七餘反桑土旣蠶是降丘宅土地髙曰丘大水去民不丘居平土就桑蠶蠶在南反厥土黒墳色黒而墳起墳扶粉反後同韋昭音勃憤反起也馬云有膏肥也厥草惟繇厥木惟條繇茂條長也繇音遥馬云抽也重意厥草惟繇厥木惟條後揚州厥草惟夭厥木惟喬厥田惟中下田第六厥賦貞貞正也州第九賦正與九相當作十有三載乃同治水十三年乃有賦法與他州同載馬鄭本作年厥貢漆絲厥篚織文地冝漆林又冝桑蠶織文錦綺之屬盛之筐篚而貢焉漆音七盛音成浮于濟漯逹于河順流曰浮濟漯两水名因承入水曰逹漯天荅反篇韻他合反重言逹于河三重見徐州豫州海岱惟青州東北據海西南距岱岱音代泰山也嵎夷旣略濰淄其道嵎夷地名用功少曰略濰淄二水復其故道嵎音隅濰音惟本亦作惟又作維淄側其反厥土白墳海濵廣斥濵涯也言復其斥鹵濵必人反斥音尺􅀃文云東方謂之斥西方謂之鹵又鄭云斥謂地鹹鹵涯魚佳反厥田惟上下厥賦中上田第三賦第四厥貢鹽絺海物惟錯絺細葛錯􅄂非一種鹽餘占反絺勑其反種章勇反岱畎絲枲鈆松怪石畎谷也怪異好石似玉者岱山之谷岀此五物皆貢之畎工犬反徐作畎谷枲思似反鈆寅專反字從㕣㕣音以選反怪如字怪石碔砆之屬萊夷作牧萊夷地名可以放牧萊音來牧牧養之牧徐音目一音茂注同厥篚檿絲檿桑蠶絲中琴瑟絃檿烏簟反山桑也浮于汶逹于濟汶音問海岱及淮惟徐州東至海北至岱南及淮淮沂其乂􅀩羽其藝二水巳治二山巳可種藝沂魚依反水名藝魚丗反大野旣豬東原底平大野澤名水所停曰豬東原致功而平言可耕豬張魚反馬云水所停止深者曰豬劉東胡反厥土赤埴墳草木漸包土黏曰埴漸進長包叢生埴市力反鄭作戠徐鄭王皆讀曰熾韋昭音試漸如字本又作蔪字林木冉反草之相包褁也包必茅反字或作苞非叢生也馬云相包褁也黏女占反長丁丈反叢才公反厥田惟上中厥賦中中田第二賦第五厥貢惟土五色王者封五色土爲社建諸侯則各割其方色土與之使立社燾以黄土苴以白茅茅取其㓗黄取王者覆四方燾徒報反覆也苴子餘反包裹也羽畎夏翟嶧陽􅀌桐夏翟翟雉名羽中旌旄羽山之谷有之􅀌特也嶧山之陽特生桐中琴瑟夏行雅反翟徒歷反嶧音亦一音夕泗濵浮磬淮夷蠙珠曁魚泗水涯水中見石可以爲磬蠙珠珠名淮夷二水出蠙珠及美魚泗音四水名淮夷鄭云淮水之夷民也馬云淮夷二水名孔傳云淮夷之水本亦有作淮夷二水也蠙蒲邊反徐扶堅反字又作蚍韋昭薄迷反蚌也曁其器反見賢遍反厥篚玄纎縞玄黒繒縞白繒纎細也纎在中明二物皆當細纎息廉反縞古老反又古到反繒似陵反浮于淮泗逹于河河如字􅀃文作菏工可反云水出山陽湖陵南重言逹于何三前兖州一後豫州一淮海惟􅀭州北據淮南距海彭蠡旣豬陽鳥攸居彭蠡澤名隨陽之鳥鴻鴻之屬冬月所居於此澤蠡音禮張勃呉錄云今名洞庭湖案今在九江郡界三江旣入震澤底定震澤呉南大湖名言三江巳入致定爲震澤三江韋昭云謂呉松江錢塘江浦陽江也呉地記云松江東北行七十里得三江口東北入海爲婁江東南入海爲東江并松江爲三江震澤呉都大湖底之履反致也史記音致大音泰篠簜旣敷篠竹箭簜大竹水去巳布生篠西了反簜徒黨反或作他莽反厥草惟夭厥木惟喬少長曰夭喬髙也夭於嬌反馬云長也喬其嬌反徐音驕少詩照反長丁丈反重意厥草惟夭厥木惟喬前兖州厥草惟繇厥木惟條厥土惟塗泥地泉濕重言厥土惟塗泥二又見荆州厥田惟下下厥賦下上上錯田第九賦第七雜出第六厥貢惟金三品金銀銅也重言惟金三品二又見荆州瑶琨篠簜瑶琨皆美玉瑶音遥琨音昆美石也馬夲作瑻韋昭音貫齒革羽毛惟木齒象牙革犀皮羽鳥羽毛旄牛尾木楩楠豫章犀細􅀆反旄音毛楩音緶又婢善反㠀夷卉服南海㠀夷草服葛越卉徐許貴反厥篚織貝織細紵貝水物厥包橘柚錫貢小曰橘大曰柚其所包裹而致者錫命乃貢言不常橘均必反柚由究反裹音果㳂于江海逹于淮泗順流而下曰㳂㳂江入海自海入淮自淮入泗㳂恱專反鄭作松松當爲㳂馬本作均云均平荆及衡陽惟荆州北據荆山南及衡山之陽江漢朝宗于海二水經此州而入海有似於朝百川以海爲宗宗尊也朝直遥反九江孔殷江於此州界分爲九道甚得地􅀔之中九江㝷陽地記云一白烏白江二曰蚌江三曰烏江四曰嘉靡江五曰畎江六曰源江七曰廪江八曰提江九曰箘江張須元縁江圖云一曰三里江二曰五州江三曰嘉靡江四曰烏土江五曰白蚌江六曰白烏江七曰􅙪江八曰沙提江九曰廪江參差隨水長短或百里或五十里始於鄂陵終于江口㑹于桑落洲太康地記曰九江劉歆以爲湖漢九水入彭蠡澤也沱濳旣道沱江别名潜水名皆復其故道沱徒河反潜捷廉反馬云沱湖也其中泉出而不流者謂之潜重言沱潜旣道二後見梁州雲土夢作乂雲夢之澤在江南其中有平土丘水去可爲耕作畎畒之治雲本亦作云夢亡弄反一音武仲反徐莫公反治直吏反厥土惟塗泥厥田惟下中厥賦上下田第八賦第三人功修重言厥土惟塗泥二又前見揚州厥貢羽毛齒革惟金三品土所岀與揚州同重意惟金三品揚州有厥貢字杶榦栝柏榦柘也柏葉松身曰栝杶勑倫反徐勑荀反木名又作櫄榦本又作幹故旦反栝古活反馬云白栝也柘章夜反礪砥砮丹砥細於礪皆磨石也砮石中矢鏃丹朱􅀋礪力丗反砥音脂徐之履反韋昭音旨砮音奴韋昭乃固反磨末佐反鏃子木反一音七木反惟箘簵楛三􅀖底貢厥名箘簵美竹楛中矢􅆬三物皆岀雲夢之澤近澤三國常致貢之其名天下稱善箘求隕反韋昭一名聆風簵音路楛音戸馬云木名可以爲箭毛詩草木䟽云葉如荆而赤莖似􅆱近附近之近包橘柚匭菁茅匭匣也菁以爲菹茅以縮酒匭音􅁤菁子丁反徐音精馬同鄭云茅有毛刺曰菁茅匣胡甲反又音甲菹切韻側魚反縮所六反厥篚玄纁璣組此州染􅀇纁色善故貢之璣珠􅀋生於水組綬􅀋纁許云反璣其依反又音機馬同􅀃文珠不圎也字書云小珠也玉篇渠依居沂二反組音祖馬云組文也九江納錫大􅀛尺二寸曰大􅀛出於九江水中􅀛不常用錫命而納之納馬云入也浮于江沱潜漢逾于洛至于南河逾越也河在冀州南東流故越洛而至南河江沱潜漢四水名本或作潜于漢非逾羊朱反荆河惟豫州西南至荆山北距河水伊洛􅈆澗旣入于河伊出陸渾山洛出上洛山澗出􅃆池山􅗉出河南北山四水合流而入河􅗉直然反澗故晏反渾音䰟又胡困胡昆二反沔亡淺反又亡忍反下同陸渾沔池二縣屬河南郡重意旣入于河冀州導沇導渭皆無旣字導洛有又東北字滎波旣豬滎澤波水已成遏豬滎戸扄反滎澤也波如字馬本作播滎播澤名遏烏曷反導菏澤􅀍孟豬菏澤在胡陵孟豬澤名在菏東北水流溢覆􅀍之導音道下同菏音柯又士可反注同韋胡阿反􅀍皮􅀉反徐扶義反注同豬張魚反又音諸左傳爾雅皆作孟諸宋藪澤也厥土惟壤下土墳壚髙者壤下者壚壚䟽壚音盧􅀃文云黒剛土也厥田惟中上厥賦錯上中田第四賦第二雜出第一厥貢漆枲絺紵厥篚纎纊纊細綿絺勑其反紵直吕反纊音曠綿切韻武延反錫貢磬錯治玉石曰錯治磬錯浮于洛逹于河重言逹于河三前見兖州徐州下華陽黒水惟梁州東據華山之南西距黒水華胡化反又胡瓜反岷嶓旣藝沱潜旣道岷山嶓􅃁皆山名水去已可種藝沱潜發源此州入荆州岷武巾反嶓音波徐甫河反韋音播重言沱潜旣道前見荆州下蔡􅀩旅平和夷底績蔡􅀩二山名􅀕山曰旅平言治功畢和夷之地致功可藝旅如字韋音盧和如字又作龢鄭云和讀曰洹治直吏反下同厥土青黎色青黒而沃壤黎鄭力􅀆反徐力私反馬云小䟽也厥田惟下上厥賦下中三錯田第七賦第八雜出第七第九三等厥貢璆鐵銀鏤砮磬璆玉名鏤剛鐵璆音蚪徐居蚪閭㓜二反馬同韋昭郭璞云紫磨金案郭注爾雅璆即紫磨金鐵天結反鏤婁豆反熊羆狐貍織皮貢四獸之皮織金罽熊音雄羆彼宜反如熊而黄貍力疑反罽紀例反西傾因桓是來浮于潜逾于􅃆西傾山名桓水自西傾山南行因桓水是來浮于潜漢上曰沔傾窺井反入于渭亂于河越沔而北入渭浮東渡河而還帝都自所治正絶流曰亂渭音謂黒水西河惟雍州西距黒水東據河龍門之河在冀州西雍於用反弱水旣西導之西流至於合黎涇屬渭汭屬逮也水北曰汭言治涇水入於渭涇音經屬之蜀反汭本又作内同如銳反馬云入也逮音代漆沮旣從灃水攸同漆沮之水已從入渭灃水所同同之於渭沮七徐反灃芳弓反荆􅄮旣旅已旅􅀕言治功畢此荆在􅄮東非荆州之荆治直吏反終南悙物至于鳥䑕三山名言相望終南山名漢書地理志一名太一三秦記云又名地肺悙物山名漢書云垂山也原隰底績至于豬野下濕曰隰豬野地名言皆致功三危旣宅三苗丕叙西裔之山已可居三苗之族大有次叙美禹之功丕普悲反厥土惟黄壤厥田惟上上厥賦中下田第一賦第六人功少厥貢惟球琳琅玕球琳皆玉名琅玕石而似珠球音求琳韋音來金反琅音郎玕音干山海經云崑崙山有琅玕樹浮于積石至于龍門西河積石山在金城西南河所經也㳂河順流而北千里而東千里而南龍門山在河東之西界㑹于渭汭逆流曰㑹自渭北涯逆水西上上時掌反織皮崐崘析支渠搜西戎即叙織皮毛布有此四國在荒服之外流沙之内􅆧髳之屬皆就次叙美禹之功及戎狄也崘魯門反馬云崐崘在臨􅆧西析星歷反馬云析攴在河􅀜西搜所由反漢書志朔方郡有渠搜縣武紀云北發渠搜是也髳音謀又音毛西戎國名導岍及􅄮至于荆山更理􅀃所治山川首尾所在治山通水故以山名之三山皆在雍州導音道從首起也岍音牽本亦作汧山名一名呉岳馬本作開重言至于荆山二後見導嶓􅃁下逾于河此謂梁山龍門西河壷口雷首至于太岳二山在冀州太岳上黨西底柱析城至于王屋此三山在冀州南河之北東行底之履反山在揚州豫章界重言過九江二又見導江下導弱水至于合黎合􅀺水名在流沙東弱本或作溺合如字黎力􅀆反馬云地名餘波入于流沙弱水餘波西溢入流沙溢音逸導黒水至于三危入于南海黒水自北而南經三危過梁州入南海重意入于南海上丈入于海四無南字導河積石至于龍門施功發于積石至于龍門或鑿山或穿地以通流南至于華隂河自龍門南流至華山北而東行東至于底柱底柱山名河水分流包山而過山見水中􅀂柱然在西虢之界見賢遍反􅉑寡白反又東至于孟津孟津地名在洛北都道所湊古今以爲津孟津如字洛北地名湊七豆反東過洛汭至于大伾洛汭洛入河處山再成曰伾至于大伾而北行伾本亦作岯音丕又皮鄙反徐扶眉反又敷眉反韋音嚭郭撫梅反字或作北過降水至于大陸降水水名入河大陸澤名降如字鄭戸江反又北播爲九河北分爲九河以殺其溢在兖州界殺所界反溢字又作隘於賣反同爲逆河入于海同合爲一大河名逆河而入於渤海皆禹所加功故叙之渤蒲兀反重言入于海四前見導岍及􅄮下嶓冡導􅃞東流爲漢泉始出山爲􅃞水東南流爲沔水至漢中東行爲漢水又東爲滄浪之水別流在荆州浪音郎過三澨至于大别三澨水名入漢大别山名澨市制反南入于江觸山回南入江觸切韻尺玉反東匯澤爲彭蠡匯廻也水東㢠爲彭蠡大澤匯徐音胡罪反韋空爲反東爲北江入于海自彭蠡江分爲三入震澤遂爲北江而入海重言入于海四見導岍章末岷山導江東别爲沱江東南流沱東行沱東何反又東至于澧澧水名澧音禮過九江至于東陵江分爲九道在荆州東陵地名重言過九江二前見導嶓冢下東迆北㑹于匯迆溢也東溢分流都共北㑹爲彭蠡迆以爾反馬云靡也東爲中江入于海有北有中南可知重言入于海四並見前導岍章末導沇水東流爲濟泉源爲沇流去爲濟在温西北平地沇音兖又以轉反入于河溢爲滎濟水入河並流十數里而南截河又並流數里溢爲滎澤在敖倉東南數色住反下同一本作十數重言入于河三前見冀州末一後又見導渭末一東出于陶丘北陶丘丘再成陶音桃又東至于菏菏澤之水又東北會于汶濟與汶合又北東入于海北折而東折之設反導淮自桐柏桐柏山在南陽之東東會于泗沂東入于海與泗沂二水合入于海重言入于海四並本篇詳附上文導岍下導渭自鳥䑕同穴鳥䑕共爲雄雌同穴處此山遂以名山曰鳥䑕渭水出焉東會于灃又東㑹于涇灃水自南涇水自北而合灃音豐又東過漆沮入于河漆沮二水名亦曰洛水出馮翊北翊與職反重言入于河三前見冀州及導沇下導洛自熊耳在冝陽之西東北㑹于澗􅈆㑹于河南城南又東㑹于伊合於洛陽之南又東北入于河合於鞏之東鞏恭勇反縣名屬河南郡重言入于河三前見豫州無又東北有旣字九州攸同所同事在下四隩旣宅四方之宅已可居隩於六反玉篇於報反九山刋旅九川滌源九澤旣陂九州名山已槎木通道而旅􅀕矣九州之川巳滌除泉源無壅塞矣九州之澤巳陂障無决溢矣滌待歷反陂彼冝反槎仕雅反障章尚反四海㑹同六府孔修四海之内㑹同京師九州同風萬國共貫水火金木土榖甚修理言政化和貫工喚反重意六府孔修禹謨六府三事􅁢治庶土交正底慎財賦交俱也衆土俱得其正謂壤墳壚致所慎者財貨貢賦言取之有節不過度咸則三壤成賦中􅀖皆法壤田上中下大較三品成九州之賦明水害除較音角錫土姓祗台德先不距朕行台我也天子建德因生以賜姓謂有德之人生此地以此地名賜之姓以顯之王者常自以敬我德爲先則天下無距違我行者台徐音怡行下孟反注同五百里甸服規方千里之内謂之甸服爲天子服治田去王城面五百里甸田遍反爲于僞反百里賦納緫甸服内之百里近王城者禾槀曰緫入之供飼國馬納如字本又作内音同下如字緫音揔近附近之近槀故老反供音恭飼音嗣二百里納銍銍刈謂禾穗銍珍栗反穗亦作穟音遂三百里納秸服秸槀也服槀役秸本或作稭工八反馬云去其頴音鞂四百里粟五百里米所納精者少麤者多五百里侯服甸服外之五百里侯候也斥候而服事百里采侯服内之百里供王事而巳不主二二百里男􅀖男任也任王者事任而針反又而鳩反下同三百里諸侯三百里同爲王者斥候故合三爲一名同爲于僞反五百里綏服綏安也侯服外之五百里安服王者之政教綏息遺反三百里揆文教揆度也度王者文教而行之三百里皆同揆葵癸反度待洛反二百里奮武衛文教外之二百里奮武衛天子所以安奮方問反五百里要服綏服外之五百里要束以文教要一遥反束如字一音來三百里夷守平常之教事王者而巳夷馬云易也二百里蔡蔡法也法三百里而差簡差􅀄佳反又􅀄賣反五百里荒服要服外之五百里言荒又簡畧三百里蠻以文徳蠻來之不制以法二百里流流移也言政教隨其俗凡五服相距爲方五千里東漸于海西􅀍于流沙朔南曁聲教漸入也􅀍及也此言五服之外皆與王者聲教而朝見漸子廉反􅀍皮􅀉反朔朔北也與音預朝直遥反見賢遍反訖于四海禹錫玄圭告厥成功玄天色禹功盡加於四海故堯賜玄圭以彰顯之言大功成訖斤宻反甘誓第二夏書孔氏傳啓與有扈戰于甘之野作甘誓夏啓嗣禹位伐有扈之罪啓禹子嗣禹爲天子也扈音户有扈國名與夏同姓馬云姒姓之國爲無道者案京兆鄠縣即有扈之國也甘有扈郊地名馬云南郊地也甘水名今在鄠縣西誓馬云軍旅曰誓㑹同曰誥重意啓與有扈戰于甘之野湯誓遂與桀戰于鳴條之野牧誓與受戰于牧野甘誓甘有扈郊地名將戰先誓大戰于甘乃召六卿天子六軍其將皆命卿將子匠反王曰嗟六事之人各有軍事故曰六事予誓告汝有扈氏威侮五行怠棄三正五行之德王者相承所取法有扈與夏同姓恃親而不恭是則威虐侮慢五行怠惰棄廢天地人之正道言亂常侮亡甫反正如字徐音征馬云建子建丑建寅三正也惰徒卧反重意威侮五行洪範汨陳其五行天用勦絶其命用其失道故勦截也截絶謂㓕之勦子六反玉篇子小反馬作巢與玉篇切韻同今予惟恭行天之罰恭奉也言欲截絶之罰音伐重意今予惟恭行天之罰牧誓有發字左不攻于左汝不恭命左車左左方主射攻治也治其職重言汝不恭命三連見下文右不攻于右汝不恭命右車右勇力之士執戈矛以退敵御非其馬之正汝不恭命御以正馬爲政三者有失皆不奉我命御魚慮反用命賞于祖天子親征必載遷廟之祖主行有功則賞祖主前示不專弗用命戮于社天子親征又載社主謂之社事不用命奔北者則戮之於社主前社主隂隂主殺親祖嚴社之義戮音六北如字又音佩軍走曰北重意用命賞于祖弗用命戮于社泰誓功多有厚賞不迪有顯戮互註禮小宗伯􅀂大師則帥有司而立軍社奉主車註云王出軍必先有事於社及遷廟而以其主行社主曰軍社遷主曰祖社之主蓋用石爲之予則孥戮汝孥子也非但止汝身辱及汝子言恥累也孥音奴累劣僞反重言予則孥戮汝二後見湯誓五子之歌第三夏書孔氏傳太康失􅀖啓子也盤于遊田不恤民事爲羿所逐不得反國昆弟五人須于洛汭作五子之歌太康五弟與其母待太康於洛水之北怨其不反故作歌五子名字書傳無聞仲康蓋其一也須馬云止也汭如銳反本又作内音同五子之歌啓之五子因以名篇太康尸位以逸豫尸主也主以尊位爲逸䂊不勤逸本又作佾豫本又作忬音同滅厥德􅀺民咸貳君䘮其德則衆民皆貳心矣􅀺力􅀆反䘮息浪反乃盤遊無度盤樂游逸無法度盤歩干反本或作槃度如字樂音洛畋于有洛之表十旬弗反洛水之表水之南十日曰旬田獵過百日不還畋音田有窮后羿因民弗忍距于河有窮國名羿諸侯名距太康於河不得入國遂廢之羿五計反徐胡細反距音巨厥弟五人御其母以從御侍也言從畋從如字或作才用反非徯于洛之汭五子咸怨待太康怨其乆畋失國徯胡啓反述大禹之戒以作歌􅄒循也歌以叙怨其一曰皇祖有訓民可近不可下皇君也君祖禹有訓戒近謂親之下謂失分近附近之近分扶問反重意民可近不可下太甲下無輕民事惟難民惟􅀖本本固􅀖寜言人君當固民以安國予視天下愚夫愚婦一能勝予言能畏敬小民所以得衆心一人三失怨豈在明不見是圖三失過非一也不見是謀備其微三如字又息暫反見賢遍反予臨兆民懔乎􅀂㣧國之君受王命往征之㣧國名㣧征奉辭罰罪曰征惟仲康肇位四海羿廢太康而立其弟仲康爲天子肇音兆下同㣧侯命掌六師仲康命㣧侯掌王六師爲大司馬重意掌六師周官篇統六師羲和廢厥職酒荒于厥邑舎其職官還其私邑以酒迷亂不修其業舎音捨㣧后承王命徂征徂徃也就其私邑往討之告于衆曰嗟予有衆誓勑之聖有謨訓明徴定保徴證也保安也聖人所謀之教訓爲丗明證所以定國安家先王克謹天戒臣人克有常憲言君能慎戒臣能奉有常法百官修輔厥后惟明明修職輔君君臣俱明重意厥后惟明明太甲下惟明明后毎􅀊孟春遒人以木鐸徇于路道人宣令之官木鐸金鈴木舌所以振文教遒在由反鐸待洛反鈴音令官師相規工執藝事以諌官衆衆官更相規闕百工各執其所治技藝以諌諌失常藝本又作蓺更音庚技其綺反甚干犯也政典曰先時者殺無赦政典夏后爲政之典籍􅀂周官六卿之治典先時謂曆象之法四時節氣弦望晦朔先天時則罪死無赦先悉薦反又如字注先時先天同赦時夜反治直吏反不及時者殺無赦不及謂曆象後天時雖治其官苟有先後之差則無赦况廢官乎後胡豆反今予以爾有衆奉將天罰將行也奉王命行王誅謂殺􅊺淫之身立其賢子弟重意今予以爾有衆奉將天罰湯誓爾尚輔予一人致天之罰泰誓上以爾有衆底天之罰泰誓下奉予一人恭行天罰爾衆士同力王室尚弼予欽承天子威命以天子威命督其士衆使用命重言爾衆士三本篇二泰誓下一火炎崐岡玉石俱焚山脊曰岡崐山出玉言火逸而害玉崐音昆天吏逸德烈于猛火逸過也天王之吏爲過惡之德其傷害天下甚於火之害玉猛火烈矣又烈於火殱厥渠魁脅從罔治殱滅渠大魁帥也指謂羲和罪人之身其脅從距王師者皆無治殱子廉反魁苦回反脅虚業反帥色􅀋反舊染汙俗咸與惟新言其餘人乆染汙俗本無惡心皆與更新一無所問汙烏故反汙辱之汙又音烏涴泥著物也一音烏卧反嗚呼威克厥愛允濟歎能以威勝所愛則必有成功愛克厥威允罔功以愛勝威無以濟衆信無功其爾衆士懋戒哉言當勉以用命戒以辟戮懋音茂辟音避重意懋戒哉大禹謨戒哉太甲嗣王戒哉自契至于成湯八遷十四丗凢八徙國都契悉列反殷之始祖八遷八遷之書史唯見四湯始居亳從先王居契父帝嚳都亳湯自商丘遷焉故曰從先王居作帝告􅁵沃告來居治沃土二篇皆亡告工毒反沃徐烏酷反此五亡篇舊解是夏書馬鄭之徒以爲商書兩義俱通湯征諸侯爲夏方伯得專征伐葛伯不祀湯始征之葛國伯爵也廢其土地山川及宗廟神祇皆不祀湯始伐之伐始於葛祇巨支反作湯征述始征之義也亡伊尹去亳適夏伊尹字氏湯進於桀旣醜有夏復歸于亳醜惡其政不能用賢故退還復扶又反重言復歸于亳三後見湯誥太甲上入自北門乃遇汝鳩汝方鳩方二人湯之賢臣不期而會曰遇作汝鳩汝方言所以醜夏而還之意二篇皆亡監本纂圖重言重意互註􅀧校尚書卷第三
