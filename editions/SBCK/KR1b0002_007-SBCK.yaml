body:
  text: 監本纂圖重言重意互註尚書卷第七洪範第六周書孔氏傳武王勝殷殺受立武庚不放而殺紂自焚也武庚紂子以爲王者後一名禄父勝商證反禄父下音甫以箕子歸作洪範歸鎬京箕子作之範音范鎬胡老反本又作鄗武王所都也洪範洪大範法也言天地之大法惟十有三祀王訪于箕子商曰祀箕子稱祀不忘本此年四月歸宗周先告武成次問天道重意惟十有三祀泰誓惟十有三年春王乃言曰嗚呼箕子惟天隂騭下民相協厥居隲定也天不言而黙定下民是助合其居使有常生之資隂默也馬云覆也騭之逸反馬云升也升猶舉也舉猶生也相協上息亮反助也我不知其彞倫攸叙言我不知天所以定民之常道理次序問何由彞以之反重言彞倫攸叙二並本篇箕子乃言曰我聞在昔鯀陻洪水汨陳其五行陻塞汨亂也治水失道亂陳其五行鯀工本反陻音因汨工怱反五行戸庚反重意汨陳其五行甘誓威侮五行帝乃震怒不􅂌洪範九疇彞倫攸斁􅂌與斁敗也天動怒鯀不與大法九疇疇􅀋也故常道所以敗不􅂌必二反徐甫至反注同與也斁多路反徐同路反敗也重意帝乃震怒泰誓上皇天震怒鯀則殛死禹乃嗣興放鯀至死不赦嗣繼也廢父興子堯舜之道殛紀力反本或作極音同天乃錫禹洪範九疇彞倫攸叙天與禹洛出書神􅀛􅀒文而出列於背有數至于九禹遂因而第之以成九􅀋常道所以次序錫星歷反􅀄一曰五行九􅀋􅀋一章以五行爲始次二曰敬用五事五事在身用之必敬乃善次三曰農用八政農厚也厚用之政乃成農馬云食爲八政之首故以農名之次四曰協用五紀協和也和天時使得正用五紀次五曰建用皇極皇大極中也凡立事當用大中之道次六曰乂用三德治民必用剛柔正直之三德次七曰明用稽疑明用卜筮考疑之事次八曰念用庶徴次九曰嚮用五福威用六極言天所以嚮勸人用五福所以威沮人用六極此巳上禹所第叙嚮許亮反又許兩反沮在汝反此巳上時掌反禹所第叙馬云從五行巳下至六極洛書文也漢書五行志以􅀄一巳下皆洛書文也一五行一曰水二曰火三曰木四曰金五曰土皆其生數水曰潤下火曰炎上言其自然之常性炎榮鉗反上時掌反又如字下同木曰曲直金曰從革木可以揉曲直金可以改更揉如酉反土爰稼穡種曰稼歛曰穡土可以種可以歛潤下作鹹水鹵所生鹹音咸鹵音魯炎上作苦焦氣之味曲直作酸木實之性從革作辛金之氣味稼穡作甘甘味生於百穀五行以下箕子所陳二五事一曰貌容儀貌本亦作䫉二曰言詞章三曰視觀正視常止反徐市止反四曰聽察是非五曰思心慮所行思如字徐息吏反下同貌曰恭儼恪儼魚檢反言曰從是則可從視曰明必清審聽曰聦必微諦諦音帝思曰睿必通於微睿恱歳反馬云通也恭作肅心敬從作乂可以治明作晢照了晢之舌反徐丁列反又之丗反聦作謀所謀必成當當丁浪反睿作聖於事無不通謂之聖三八政一曰食勸農業二曰貨寳用物三曰祀敬􅀑神以成教四曰司空主空土以居民五曰司徒主徒衆教以禮義六曰司寇王姦盗使無縱縱子用反或作從音同七曰賔禮賔客無不敬八曰師簡師所任必良士卒必練士卒子忽反四五巳罍一曰歳所以紀四時二曰月所以紀一月三曰日紀一日四曰星辰二十八􅀫迭見以叙氣節十二辰以紀日月所㑹􅀫音秀迭田節反見賢遍反五曰曆數曆數節氣之度以爲曆敬授民時五皇極皇建其有極大中之道大立其有中謂行九疇之義歛時五福用敷錫厥庶民歛是五福之道以爲教用布與衆民使慕之惟時厥庶民于汝極錫汝保極君上有五福之教衆民於君取中與君以安中之善言從化凡厥庶民無有淫朋人無有比德惟皇作極民有安中之善則無淫過朋黨之惡比周之德惟天下皆大爲中正比毗志反注同重言凡厥庶民二並本篇凡厥庶民有猷有爲有守汝則念之民戢有道有所爲有所執守汝則念録叙之不協于極不罹于咎皇則受之凡民之行雖不合於中而不罹於咎惡皆可進用大法受之罹馬力馳反又來多反之行下孟反而康而色曰予攸好德汝則錫之福汝當安汝顔色以謙下人人曰我所好者德汝則與之爵禄好呼報反下人遐稼反時人斯其惟皇之極不合於中之人汝與之福則是人此其惟大之中言可勉進無虐煢獨而畏髙明煢單無兄弟也無子曰獨單獨者不侵虐之寵貴者不枉法畏之無虐馬本作亡侮煢􅄮扄反畏如字徐云鄭音威人之有能有爲使羞其行而􅀖其昌功能有爲之士使進其所行汝國其昌盛其行如字徐不孟反重意而􅀖其昌仲虺之誥􅀖乃其昌凡厥正人旣富方榖凡其正直之人旣當以爵禄富之又當以善道接之重意凡厥正人康誥惟厥正人汝弗能使有好于而家時人斯其辜不能使正直之人有好于國家則是人斯其詐取罪而去于其無好德汝雖錫之福其作汝用咎於其無好德之人汝雖與之爵禄其爲汝用惡道以敗汝善其爲于僞反無偏無陂遵王之義偏不平陂不正言當循先王之正義以治民陂音祕舊本作頗音普多反無有作好遵王之道無有作惡遵王之路言無有亂爲私好惡動必循先王之道路好呼報反惡烏路反注同無偏無黨王道蕩蕩言開闢闢婢亦反互注左襄公三年君子謂祁奚於是能舉善矣稱其讎不爲謟立其子不爲比舉其偏不爲黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣無黨無偏王道平平言辯治平平婢綿反治直吏反無反無側王道正直言所行無反道不正則王道正直㑹其有極歸其有極言㑹其中而行之則天下皆歸其有中矣曰皇極之敷言是彞是訓于帝其訓曰者大其義言以大中之道布陳言教不失是常則人皆是順矣天且其順而况于人乎凡厥庶民極之敷言是訓是行以近天子之光凡其衆民中心之所陳言凡順是行之則可以近益天子之光明以近附近之近曰天子作民父母以爲天下王言天子布德惠之教爲兆民之父母是爲天下所歸往不可不務重意天子作民父母泰誓元后作民父母以爲天下王禹謨爲天下君六三德一曰正直能正人之曲直二曰剛克剛能立事克馬云勝也三曰柔克和柔能治三者皆德平康正直丗平安用正直治之彊弗友剛克友順也丗彊禦不順以剛能治之禦魚吕反能治直吏反爕友柔克爕和也丗和順以柔能治之爕息恊反沈潛剛克沈潜謂地雖柔亦有剛能出金石髙明柔克髙明謂天言天爲剛德亦有柔克不干四時喻臣當執剛以正君君亦當執柔以納臣惟辟作福惟辟作威惟辟玉食言惟君得專威福爲美食辟徐􅀘亦反玉食張晏注漢書云玉食珍食也韋昭云諸侯備珍異之食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒在位不敦平則下民僭差頗普多反僻匹亦反僭子念反忒他得反馬云惡也七稽疑擇建立卜筮人􅀛日卜蓍曰筮考正疑事當選擇知卜筮人而建立之蓍音尸乃命卜筮建立其人命以其職曰雨曰霽􅀛兆形有似雨者有似雨止者霽子細反曰蒙蒙隂闇蒙武工反徐亡鉤反曰驛氣落驛不連屬驛音亦注同屬音燭曰克兆相交錯五者卜兆之常法曰貞曰悔内卦曰貞外卦曰悔凡七卜筮之數卜五占用二􅄛忒立時人作卜筮三人占則從二人之言立是知卜筮人使爲卜筮之事夏殷周卜筮各異三法並卜從二人之言善鈞從衆卜筮各三人占用二馬云占筮也􅄛以淺反汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮將舉事而汝則有大疑先盡汝心以謀慮之次及卿士衆民然後卜筮以决之汝則從􅀛從筮從卿士從庶民從是之謂大同人心和順􅀛筮從之是謂大同於吉身其康彊子孫其逢吉動不違衆故後丗遇吉逢馬云逢大也汝則從􅀛從筮從卿士逆庶民逆吉三從二逆中吉亦可舉事卿士從􅀛從筮從汝則逆庶民逆吉君臣不同决之卜筮亦中吉庶民從􅀛從筮從汝則逆卿士逆吉民與上異心亦卜筮以决之汝則從􅀛從筮逆卿士逆庶民逆作内吉作外凶二從三逆􅀛筮相違故可以􅀕祀冠㛰不可以出師征伐冠官喚反􅀛筮共違于人皆逆用靜吉用作凶安以守常則吉動則凶八庶徴曰雨曰􅊙曰燠曰寒曰風曰時雨以潤物暘以乾物煖以長物寒以成物風以動物五者各以其時所以爲衆驗暘音陽乾音干煖乃管反以長丁丈反五者來備各以其叙庶草蕃廡言五者備至各以次序則庶草蕃滋廡豐也蕃音煩廡無甫反徐莫柱反一極備凶一極無凶一者備極過甚則凶一者極無不至亦凶謂失時失序曰休徴叙美行之驗美行下孟反曰肅時雨􅀂君行敬則時雨順之曰乂時􅊙􅀂君行政治則時暘順之治直吏反治其職同曰晢時燠􅀂君能照晢則時燠順之曰謀時寒􅀂君能謀則時寒順之曰聖時風􅀂君能通理則時風順之曰咎徴叙惡行之驗咎其九反曰狂􅁪雨􅀂君行往妄則常雨順之曰僭􅁪􅊙􅀂君行僭差則常􅊙順之曰豫􅁪燠􅀂君行逸豫則常煖順之䂊羊庶反徐又音舒曰急􅁪寒􅀂君行急則常寒順之曰蒙􅁪風􅀂君行蒙闇則常風順之曰王省惟歳王所省職兼所揔羣吏如歳兼四時省息井反卿士惟月卿士各有所掌如月之各有别别彼列反師尹惟日衆正官之吏分治其職如日之有歳月歳月日時無易各順常百榖用成乂用明歳月日時無易則百榖成君臣無易則政治明俊民用章家用平康賢臣顯用國家平寜日月歳時旣易是三者巳易喻君臣易職百榖用不成乂用昬不不明俊民用微家用不寜君失其柄權臣擅命治闇賢隱國家亂庶民惟星星有好風星有好雨星民象故衆民惟􅀂星箕星好風畢星好雨亦民所好好呼報反日月之行則有冬有夏日月之行冬夏各有常度君臣政治小大各有常法月之從星則以風雨月經於箕則多風離於畢則多雨政教失常以從民欲亦所以亂九五福一曰壽百二十年二曰冨財豐備三曰康寜無疾病四曰攸好德所好者德福之道五曰考終命各成其短長之命以自終不撗夭撗華孟反又如字六極一曰凶短折動不遇吉短未六十折未三十言辛苦凶馬云終也折時設反又之舌反二曰疾常抱疾苦三曰憂多所憂四曰貧困於財五曰惡醜惡六曰弱尫劣尫烏黄反武王旣勝殷􅀖諸侯班宗彞賦宗廟彞器酒鐏賜諸侯班本又作般音同作分器言諸侯尊卑各有分也亡分器扶問反注同旅􅋙第七周書孔氏傳西旅獻獒西戎逺國貢大犬獒五羔反馬云作豪酋豪也太保作旅獒召公陳戒召公詩照反後召公皆放此旅獒因􅋙而陳道義惟克商遂通道于九夷八蠻四夷慕化貢其方賄九八言非一皆通道路無逺不服賄呼罪反西旅厎貢厥獒西戎之長致貢其獒大髙四尺曰獒以犬爲異厎之履反長丁丈反太保乃作旅獒用訓于王陳貢􅋙之義以訓諌王曰嗚呼明王愼德四夷咸賔言明王愼德以懷逺故四夷皆賔服無有逺邇畢獻方物惟服食器用天下萬國無有逺近盡貢其方土所生之物惟可以供服食器用者言不爲耳目華侈供音恭爲于僞反侈昌氏反重言無有逺邇重見盤庚王乃昭德之致于異姓之􅀖無替厥服德之所致謂逺夷之貢以分賜異姓諸侯使無廢其職分寳玉于伯叔之國時庸展親以寳玉分同姓之國是用誠信其親親之道人不易物惟德其物言物貴由人有德則物貴無德則物賤所貴在於德易羊質反德盛不狎侮盛德必自敬何狎易侮慢之有易以䜴反狎侮君子罔以盡人心以虚受人則人盡其心矣盡津忍反下同狎侮小人罔以盡其力以恱使民民忘其勞則力盡矣不役耳目百度惟貞言不以聲色自役則百度正玩人䘮德玩物䘮志以人爲戲弄則䘮其德以器物爲戲弄則䘮其志玩五貫反䘮息浪反志以道寜言以道接在心爲志發氣爲言皆以道爲本故君子勤道不作無益害有益功乃成不貴異物賤用物民乃足遊觀爲無益竒巧爲異物言明王之道以德義爲益器用爲貴所以化俗生民觀官喚反犬馬非其土性不畜非此土所生不畜以不習其用畜許六反珍禽竒獸不育于國皆非所用有損害故不寳逺物則逺人格不侵奪其利則來服矣所寳惟賢則邇人安寳賢任能則近人安近人安則逺人安矣嗚呼夙夜罔或不勤言當早起夜寐常勤於德不矜細行終累大德輕忽小物積害毀大故君子愼其微行下孟反累劣僞反爲山九仞功虧一簣八尺曰仞喻向成也未成一簣猶不爲山故曰功虧一簣是以聖人乾乾日􅉴愼終如始仞音刃字又作刃七尺曰仞虧曲爲反簣其貴反向許亮反乾其連反􅉴音側允迪兹生民保厥居惟乃丗王言其能信蹈行此誡則生人安其居天子乃丗丗王天下武王雖聖猶設此誡况非聖人可以無誡乎其不免於過則亦冝矣丗王如字又于况反注同巢伯來朝殷之諸侯伯爵也南方逺國武王克商慕義來朝巢仕交反徐吕交反芮伯作旅巢命芮伯周同姓圻内之國爲卿大夫陳威德以命巢亡芮如銳反圻音祈金縢第八周書孔氏傳武王有疾周公作金縢爲請命之書藏之於匱緘之以金不欲人開之縢徒登反緘工咸反金縢遂以所藏爲篇名旣克商二年王有疾弗豫伐紂明年武王有疾不恱豫豫本又作忬二公曰我其爲王穆卜周公曰未可以戚我先王穆敬戚近也召公太公言王疾當敬卜吉凶周公言未可以死近我先王相順之辭爲于僞反戚千歷反公乃自以爲功周公乃自以請命爲己事爲三壇同墠因大王王季文王請命於天故爲三壇壇築土墠除地大除地於中爲三壇璮徒丹反築土也馬云土堂墠音善爲壇於南方北面周公立焉立壇上對三王植璧秉珪乃告太王王季文王璧以禮神植置也置於三王之坐周公秉桓珪以爲贄告謂祝辭植時職反徐音置贄音至祝如字或之又反下同史乃􅁽祝曰惟爾元孫某遘厲虐疾史爲􅁽書祝辭也元孫武王某名臣諱君故曰某厲危虐暴也遘工豆反遇也􅀂爾三王是有丕子之責于天以旦代某之身太子之責謂疾不可救於天則當以旦代之死牛有命不可請代聖人叙臣子之心以垂丗教丕普悲反馬同徐甫眉反鄭音不予仁􅀂考能多材多藝能事􅀑神我周公仁能順父又多材多藝能事􅀑神言可以代武王之意乃元孫不􅀂旦多材多藝不能事􅀑神乃命于帝庭敷佑四方汝元孫受命於天庭爲天子布其德教以佑助四方言不可以死用能定爾子孫于下地四方之民罔不祗畏言武王用受命帝庭之故能定先人子孫於天下四方之民無不敬畏嗚呼無墜天之降寳命我先王亦永有依歸歎惜武王言不救則墜天之寳命救之則先王長有依歸今我即命于元􅀛就受三王之命於大􅀛卜知吉凶爾之許我我其以璧與珪歸俟爾命許謂疾瘳特命當以事神瘳勑留反下同爾不許我我乃屏璧與珪不許謂不愈也屏藏也言不得事神乃卜三􅀛一習吉習因也以三王之􅀛卜一相因而吉啓籥見書乃并是吉三兆旣同吉開籥見占兆書乃亦并是吉箚茅􅀂反徐以略反馬云藏卜兆書管并必政反公曰體王其罔害公視兆曰如此兆體王其無害言必愈予小子新命于三王惟永終是圖周公言我小子新受三王之命武王惟長終是謀周之道兹攸俟能念予一人言武王愈此所以待能念我天子事成周道公歸乃納􅁽于金縢之匱中王翼日乃瘳從壇歸翼明瘳差也差􅀄賣反武王旣䘮管叔及其羣弟乃流言於國武王死周公攝政其弟管叔及蔡叔霍叔乃放言於國以誣周公以惑成王䘮息浪反曰公將不利於孺子三叔以周公大聖有次立之􅀔遂生流言孺稚也稚子成王孺如樹反周公乃告二公曰我之弗辟我無以告我先王辟法也告召公太公言我不以法法三叔則我無以成周道告我先王辟扶亦反治也􅀃文作璧音必亦反法也馬鄭音避謂避居東都周公居東二年則罪人斯得周公旣告二公遂東征之二年之中罪人此得于後公乃爲詩以貽王名之曰鴟鴞王亦未敢誚公成王信流言而疑周公故周公旣誅三監而作詩解所以冝誅之意以遺王王猶未悟故欲讓公而未敢貽羊支反名如字徐亡政反鴟尺夷反鴞吁嬌反誚在􅀏反以遺唯季反秋大熟未穫天大雷電以風二年秋也蒙􅁪風􅀂雷以威之故有風雷之異穫戸郭反禾盡偃大木斯拔􅀖人大恐風災所及􅀖人皆大恐拔皮八反王與大夫盡弁以啓金縢之書皮弁質服以應天弁皮彦反徐扶變反應應對之應乃得周公所自以爲功代武王之􅀃所藏請命􅁽書本􅀃如字徐始銳反二公及王乃問諸史與百執事二公倡王啓之故先見書史百執事皆從周公請命倡昌亮反皆從才用反又如字對曰信噫公命我勿敢言史百執事言信有此事周公使我勿道今言之則􅀒周公噫恨辭噫於其反馬本作懿猶憶也王執書以泣曰其勿穆卜本欲敬卜吉凶今天意可知故止之昔公勤勞王家惟予冲人弗及知言巳幼童不及知周公昔日忠勤冲直中反重意昔公勤勞王家武成王季其勤王家惟予冲人弗及知大誥肆予冲人永思艱今天動威以彰周公之德發雷風之威以明周公之聖德惟朕小子其新逆我國家禮亦冝之周公以成王未寤故留東未還改過自新遣使者迎之亦國家禮有德之冝新逆馬本作親迎遣使所吏反王出郊天乃雨反風禾則盡起郊以玉幣謝天天即反風起禾明郊之是重意天乃雨反風舜典烈風雷雨弗迷二公命􅀖人凡大木所偃盡起而築之歳則大熟木有偃拔起而立之築有其根桑果無虧百榖豐熟周公之德此巳上大誥後因武王䘮并見之築音竹本亦作筑謂筑其根馬云築拾也見賢遍反大誥第九周書孔氏傳武王崩三監及淮夷叛三監管蔡商淮夷徐奄之屬皆叛周監古懴反視也周公相成王將黜殷作大誥相謂攝政黜絶也將以誅叛者之義大誥天下相息亮反注同大誥陳大道以誥天下遂以名篇誥本亦作靠王􅀂曰猷大誥爾多􅀖越爾御事周公稱成王命順大道以告天下衆國及於御治事者盡及之猷音由道也馬本作大誥繇爾多􅀖盡津忍反重言越爾御事三本篇二下篇一弗弔天降割于我家不少言周道不至故天下凶害於我家不少謂三監淮夷並作難弔音的又如字割馬本作害不少朱氏依馬讀不少延爲句難乃旦反重言弗弔重見多士君奭延洪惟我㓜冲人凶害延大惟累我㓜童人成王言其不可不誅之意累劣僞反嗣無疆大歷服弗造哲迪民康言子孫承繼祖考無窮大數服行其政而不能爲智道以安人故使叛先自責矧曰其有能格知天命安人且猶不能况其有能至知天命者乎矧失忍反巳予惟小子􅀂渉淵水予惟往求朕攸濟已發端歎辭也我惟小子承先人之業如渉淵水往求我所以濟渡言祗懼重言巳予惟小子本篇二康誥巳汝惟小子又洛誥巳汝惟冲子重意􅀂渉淵水微子􅀂渉大水君奭􅀂游大川敷賁敷前人受命兹不忘大功前人文武也我求濟渡在布行賢者有十大來翼佐我周用撫安武事謀立其功言人事先應敉亡婢反應應對之應我有大事休朕卜并吉大事戎事也人謀旣從卜又并吉所以爲美并必政反注及篇末同肆予告我友􅀖君越尹氏庶士御事以美故告我友國諸侯及於正官尹氏卿大夫衆士御治事者言謀及之曰予得吉卜予惟以爾庶􅀖于伐殷逋播臣用汝衆國往伐殷逋亡之臣謂禄父逋布吾反爾庶􅀖君越庶士御事罔不反曰艱大汝衆國上下無不反曰征伐四國爲大難叙其情以戒之重言爾庶􅀖君二並本篇民不靜亦惟在王宫􅀖君室言四國不安亦在天子諸侯教化之過自責不能綏近以及逺越予小子考翼不可征王害不違卜於我小子先卜敬成周道􅀂謂今四國不可征則王室有害故冝從卜肆予冲人永思艱曰嗚呼允蠢鰥寡哀哉故我童人成王長思此難而歎曰信蠢動天下使無妻無夫者受其害可哀哉鰥故頑反重意肆予冲人永思艱金縢惟予冲人弗及知予造天役遺大投艱于朕身我周家爲天下役事遺我甚大投此艱難於我身言不得巳造爲也馬云遺也越予冲人不卬自恤義爾􅀖君越爾多士尹氏御事言征四國於我童人不惟自憂而巳乃欲施義於汝衆國君臣上下至御治事者卬五剛反我也綏予曰無毖于恤不可不成乃寜考圖功汝衆國君臣當安勉我曰無勞於憂不可不成汝寜祖聖考文武所謀之功責其以善言之助毖音祕巳予惟小子不敢替上帝命不敢廢天命言卜吉當必征之重言巳予惟小子二並本篇又康誥巳汝惟小子洛誥巳汝惟冲子天休于寜王興我小􅀖周寜王惟卜用克綏受兹命言天美文王興周者以文王惟卜之用故能安受此天命明􅁲冝用今天其相民矧亦惟卜用人獻十夫是天助民况亦用卜乎吉可知矣亦言文王相息亮反嗚呼天明畏弼我丕丕基歎天之明德可畏輔成我大大之基業言卜不可違也畏如字徐音威重言天明畏三臯陶本篇多士重意弼我丕丕基立政以並受此丕丕基王曰爾惟舊人爾丕克逺省爾知寜王􅀂勤哉特命乆老之人知文王故事者大能逺省識古事汝知文王􅀂彼之勤勞哉目所親見法之又明省息井反天閟毖我成功所予不敢不極卒寜王圖事閟愼也言天愼勞我周家成功所在我不敢不極盡文王所謀之事謂致太平閟音祕肆予大化誘我友􅀖君我欲極盡文王所謀故大化天下道我友國諸侯天棐忱辭其考我民言我周家有大化誠辭爲天所輔其成我民矣棐徐音匪又芳􅀑反忱市林反予曷其不于前寜人圖功攸終我何其不於前文王安人之道謀立其功所終乎天亦惟用勤毖我民􅀂有疾天亦勞愼我民欲安之如人有疾欲己去之重言􅀂有疾二本篇康誥予曷敢不于前寜人攸受休畢天欲安民我何敢不於前文王所受美命終畢之王曰􅀂昔朕其逝朕言艱日思順古道我其往東征矣我所言國家之難備矣日思念之日人實反難乃旦反下爲難同􅀂考作室旣厎法厥子乃弗肯堂矧肯構以作室喻治政也父巳致法子乃不肯爲堂基况肯構立屋乎不爲其易則難者可知底之履反構古候反治直吏反厥父菑厥子乃弗肯播矧肯穫又以農喻其父巳菑耕其田其子乃不肯播種况肯収穫乎菑側其反草也田一歳曰菑穫戸郭反重意厥父菑厥子乃弗肯播矧肯穫無逸厥父母勤勞稼穡厥子乃不知稼穡之艱難厥考翼其肯曰予有後弗棄基其父敬事創業而子不能繼成其功其肯言我有後不棄我基業乎今不征是棄之肆予曷敢不越卬敉寜王大命作室農人猶惡棄基故我何敢不於今日撫循文王大命以征逆乎惡烏路反􅀂兄考乃有友伐厥子民養其勸弗救􅀂兄弟父子之家乃有明友來伐其子民養其勸心不救者以子惡故以此四國將誅而無救者罪大故王曰嗚呼肆哉爾庶􅀖君越爾御事歎今伐四國必克之故以告諸侯及臣下御治事者重言爾庶􅀖君二並本篇越爾御事三本篇二後篇一爽􅀖由哲亦惟十人迪知上帝命言其故有明國事用智道十人蹈知天命謂人獻十夫來佐周越天棐忱爾時罔敢易法矧今天降戾于周􅀖於天輔誠汝天下是知無敢易天法况今天下罪於周使四國叛乎重意越天棐忱康誥天畏棐忱君奭􅀂天棐忱惟大艱人誕鄰胥伐于厥室爾亦不知天命不易惟大爲難之人謂三叔也大近相伐於其室家謂叛逆也􅀂不早誅汝天下亦不知天命之不易也易以䜴反重言天命不易重見君奭予永念曰天惟䘮殷􅀂穡夫予曷敢不終朕畒稼穡之夫除草養苗我長念天亡殷惡主亦猶是矣我何敢不順天終竟我壟畒乎言當滅殷壟力勇反天亦惟休于前寜人予曷其極卜敢弗于從天亦惟美于文王受命我何其極卜法敢不於從言必從也率寜人有指疆土矧今卜并吉循文王所有指意以安疆土則善矣况今卜并吉乎言不可不從重意矧今卜并吉本篇朕卜并吉金縢乃并是吉肆朕誕以爾東征天命不僭卜陳惟􅀂兹以卜吉之故大以汝衆東征四國天命不僭差卜兆陳列惟􅀂此吉必克之不可不勉僭子念反微子之命第十周書孔氏傳成王旣黜殷命殺武庚一名禄父命微子啓代殷後啓知紂必亡而奔周命爲宋公爲湯後作微子之命封命之書微子之命稱其本爵以名篇王􅀂曰猷殷王元子微子帝乙元子故順道本而稱之惟稽古崇德象賢惟考古典有尊德象賢之義言今法之重意惟稽古見堯典崇德象賢武成崇德報功統承先王修其禮物言二王之後各修其典禮正朔服色與時王並通三統正音政作賔于王家與國咸休永丗無窮爲時王賔客與時皆美長丗無竟嗚呼乃祖成湯克齊聖廣淵言汝祖成湯能齊德聖逹廣大深逺澤流後世重意克齊聖廣淵冏命聦明齊聖皇天眷佑誕受厥命大天眷顧湯佑助之大受其命謂天命重言皇天眷佑二泰誓中本篇大禹謨皇天眷命誕受厥命重見康誥撫民以寛除其邪虐撫民以寛政放桀邪虐湯之德功加于時德垂後裔言湯立功加於當時德澤垂及後世裔末也裔以制反重意德垂後裔仲虺垂􅁉後昆爾惟踐修厥猷舊有令聞汝微子言能踐湯德乆有善譽昭聞逺近令聞如字又音問恪愼克孝肅恭神人予嘉乃德曰篤不忘言微子敬愼能孝嚴恭神人故我善汝德謂厚不可忘篤本又作笁東谷反上帝時歆下民祗協庸建爾于上公尹兹東夏孝恭之人􅀕祀則神歆享施令則人敬和用是封立汝於上公之位正此東方華夏之國宋在京師東歆許今反重意尹兹東夏君奭尹兹東郊欽哉往敷乃訓愼乃服命率由典常以蕃王室敬哉敬其爲君之德往臨人布汝教訓愼汝祖服命數循用舊典無失其常以蕃屏周室戒之蕃方元反本又作藩重言欽哉八堯典禹謨本篇景命各一舜典益稷二以蕃王室二本篇蔡仲之命弘乃烈祖律乃有民永綏厥位毗予一人大汝烈祖成湯之道以法度齊汝所有之人則長安其位以輔我一人言上下同榮慶毗房脂反重意永綏厥位文侯之命永綏在位毗予一人泰誓周官弼予一人丗丗享德萬􅀖作式言微子累丗享德不忝厥祖雖同公侯而特爲萬國法式俾我有周無斁汝丗丗享德則使我有周好汝無厭俾必爾反斁音亦好呼報反厭於豔反嗚呼往哉惟休無替朕命歎其德遣往之國言當惟爲美政無廢我命重言往哉七舜典二盤庚本篇康誥畢命文侯之命各一唐叔得禾異畒同頴唐叔成王母弟食邑内得異禾也畒壟頴穗也禾各生一壟而合爲一穗頴役領反穗似醉反本亦作遂獻諸天子拔而貢之王命唐叔歸周公于東異畒同頴天下和同之象周公之德所致周公東征未還故命唐叔以禾歸周公唐叔後封􅀳作歸禾亡周公旣得命禾旅天子之命巳得唐叔之禾遂陳成王歸禾之命而推美成王善則稱君作嘉禾天下和同政之善者故周公作書以嘉禾名篇告天下亡監本纂圖重言重意互註尚書卷第七
