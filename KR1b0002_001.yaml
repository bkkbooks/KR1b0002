body:
  text: 監本纂圖重言重意互注點校尚書卷第一堯典第一虞書孔氏傳昔在帝堯聰明文思光宅天下言聖德之逺著昔古也堯唐帝名馬融云諡也翼善傳聖曰堯聰千公反思息嗣反又如字下同著張慮反重意昔在帝堯聰明文思囧命昔在文武聰明齊聖將遜于位讓于虞舜遜遁也老使攝遂禪之遁本又作遁徒遜反退也避也禪時戰反讓也授也作堯典堯典言堯可為百代常行之道曰若稽古帝堯若順稽考也能順考古道而行之者帝堯重言若稽古四本篇舜典大禹謨皋陶謨各一又周官唐虞稽古又微子之命惟稽古曰放勳欽明文思安安勳功欽敬也言堯放上丗之功化而以敬明文思之四德安天下之當安者放方往反注同徐云鄭王如字勳許云反功也馬云放勳堯名皇甫謐同一云放勳堯字欽明文思馬云威儀表備謂之欽照臨四方謂之明經緯天地謂之文道德純備謂之思允恭克讓光𬒳四表格于上下允信克能光充格至也既有四德又信恭能讓故其名聞充溢四外至于天地𬒳皮寄反徐扶義反聞音問本亦作問溢音逸重意光𬒳四表泰誓光于四方吕刑灼于四方格于上下皋陶謨逹于上下克明俊德以親九族能明俊德之士任用之以睦髙祖玄孫之親九族上自髙祖下至玄孫凡九族馬鄭同重意以親九族皋謨悙叙九族仲虺之誥九族乃離互注記大學帝典曰克明俊德康誥曰克明德太甲曰顧諟天之明命皆自明也九族既睦平章百姓既已也百姓百官言化九族而平和章明百姓昭明協和萬邦黎民於變時雍昭亦明也協合黎衆時是雍和也言天下衆民皆變化化上是以風俗大和黎力兮反乃命羲和欽若昊天曆象日月星辰敬授人時重黎之後羲氏和氏丗掌天地四時之官故堯命之使敬順昊天昊天言元氣廣大星四方中星辰日月所會曆象其分節敬記天時以授人也此舉其目下别序之羲和馬云羲氏掌天官和氏掌地官四子掌四時昊胡老反重直龍反少昊之後黎髙陽之後日月所㑹謂日月交會於十二次也寅曰析木卯曰大火辰曰壽星巳曰鶉尾午曰鶉火未曰鶉首申曰實沉酉曰大梁戌曰降婁亥曰娵訾子曰玄枵丑曰星紀重意曆象日月星辰敬授人時舜典協時月正日分命羲仲宅嵎夷曰暘谷宅居也東表之地稱嵎夷暘明也日出於谷而天下明故稱暘谷暘谷嵎夷一也羲仲居治東方之官嵎音隅馬曰嵎海嵎也夷萊夷也尚書考靈耀及史記作禺鐵暘音陽谷工木反又音欲下同馬云暘谷海嵎夷之地名日出於谷本或作日出於陽谷陽衍字寅賔出日平秩東作寅敬賔導秩序也歲起於東而始就耕謂之東作東方之官敬導出日平均次序東作之事以務農也寅徐以真反又音夷下同賔如字徐音殯馬云從也出尺遂反又如字注同平如字馬作蘋普耕反云使也下皆放此秩如字日中星鳥以殷仲春日中謂春分之日鳥南方朱鳥七宿殷正也春分之昏鳥星畢見以正仲春之氣節轉以推季孟則可知中貞仲反又如字殷於勤反馬鄭云中也宿音秀下同見賢遍反下同厥民析鳥獸孳尾冬寒無事並入室處春事既起丁壯就功厥其也言其民老壯分析乳化曰孳交接曰尾析星歷反孳音字乳儒付反說文云人及鳥生子曰乳獸曰産申命羲叔宅南交申重也南交言夏與春交舉一隅以見之此居治南方之官重直用反平秩南訛敬致訛化也掌夏之官平序南方化育之事敬行其教以致其功四時同之亦舉一隅訛五禾反日永星火以正仲夏永長也謂夏至之日火蒼龍之中星舉中則七星見可知以正仲夏之氣節季孟亦可知厥民因鳥獸希革因謂老弱因就在田之丁壯以助農也夏時鳥獸毛羽希少改易革改也分命和仲宅西曰昧谷昧冥也日入於谷而天下冥故曰昧谷昧谷曰西則嵎夷東可知此居治西方之官掌秋天之政昧武內反冥莫定反寅餞納日平秩西成餞送也日出言導日入言送因事之宜秋西方萬物成平序其政助成物也餞賤衍反馬云滅也滅猶沒也宵中星虛以殷仲秋宵夜也春言日秋言夜互相備虛玄武之中星亦言七星皆以秋分日見以正三秋厥民夷鳥獸毛毨夷平也老壯在田與夏平也毨理也毛更生整理毨先典反說文云仲秋鳥獸毛盛可選取以為器用也申命和叔宅朔方曰幽都平在朔易北稱朔亦稱方言一方則三方見矣北稱幽則南稱明從可知也都謂所聚也易謂歲改易於北方平均在察其政以順天常上揔言羲和敬順昊天此分別仲叔各有所掌別彼列反下同日短星昴以正仲冬日短冬至之日昴白虎之中星亦以七星並見以正冬之三節厥民隩鳥獸氄毛隩室也民改歲入此室處以辟風寒鳥獸皆生耎毳細毛以自溫焉隩於六反馬云暖也氄如勇反徐又而充反馬云溫柔貌辟音避耎如兖反本或作濡音儒毳尺鋭反帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成歲咨嗟暨與也匝四時曰朞一歲十二月月三十日正三百六十日除小月六為六日是為一歲有餘十二日未盈三歲足得一月則置閏焉以定四時之氣節成一歲之曆象暨其器反朞居其反下同旬似遵反十日為旬匝子合反允釐百工庶績咸熙允信釐治工官績功咸皆熙廣也言定四時成歲曆以告時授事則能信治百官衆功皆廣歎其善釐力之反熙許其反興也重言庶績咸熙二又見舜典又皋陶謨庶績其疑帝曰疇咨若時登庸疇誰庸用也誰能咸熙庶績順是事者將登用之疇直由反放齊曰㣧子朱啓明帝曰吁嚚訟可乎放齊臣名胤國子爵朱名啓開也吁疑怪之辭言不忠信為嚚又好爭訟可乎言不可放方往反注同㣧引信反馬云嗣也吁况于反徐往付反一音于嚚魚巾反下注同爭鬭也重言帝曰吁四本篇三益稷一帝曰疇咨若豫采采事也復求誰能順我事者豫音餘又羊汝反采七在反馬云官也復扶又反歡兜曰都共工方鳩僝功歡兜臣名都於歎美之辭共工官稱鳩聚僝見也歎共工能方方聚見其功歡呼端反兜丁侯反共音恭注同僝仕簡反徐音撰馬云具也於音烏稱尺證反帝曰吁靜言庸違象恭滔天靜謀滔漫也言共工自為謀言起用行事而違背之貌象恭敬而心傲很若漫天言不可用滔吐刀反漫末旦反下同又末寒反背音佩傲五報反下同很胡懇反帝曰咨四嶽四嶽即上羲和之四子分掌四嶽之諸侯故稱焉重言咨四嶽四本篇舜典各二湯湯洪氷方割湯湯流貌洪大割害也言大水方方為害湯並音傷洪戶工反蕩蕩懷山襄陵浩浩滔天蕩蕩言水奔突有所滌除懷包襄上也包山上陵浩浩盛大若漫天浩胡老反滌大歷反上時掌反下民其咨有能俾乂俾使乂治也言民咨嗟憂愁病水困苦故問四嶽有能治者將使之俾必已反重意湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨益稷洪水滔天浩浩懷山襄陵下民昏墊僉曰於鯀哉僉皆也鯀崇伯之名朝臣舉之僉七廉反又七劒反於音烏鯀故本反馬云禹父也朝直遙反重言僉曰四本篇一舜典三於二又見大禹謨篇帝曰吁咈哉方命圯族凡言吁者皆非帝意咈戾圯毀族類也言鯀性很戾好比方名命而行事輒毁敗善類咈扶弗反忿戾也方如字馬云方放也徐云鄭王音放圯皮美反戾力計反嶽曰异哉試可乃已异巳也退也言餘人盡巳惟鯀可試無成乃退异徐云鄭音異孔王音怡重言嶽曰三連見下文帝曰往欽哉勑鯀往治水命使敬其事堯知其性狠戾圯族未明其所能而據衆言可試故遂用之重言往欽哉三本篇舜典益稷各一九載績用弗成載年也三考九年功用不成則放退之帝曰咨四嶽朕在位七十載堯年十六以唐侯升為天子在位七十年則時年八十六老將求代朕直錦反馬云我也重言咨四嶽四本篇二舜典二汝能庸命巽朕位巽順也言四嶽能用帝命故欲使順行帝位之事巽音遜馬云讓也嶽曰否德忝帝位否不忝辱也辭不堪否方久反又音鄙忝他簟反曰明明揚側陋堯知子不肖有禪位之志故明舉明人在側陋者廣求賢也肖音笑說文云肖骨肉相似也不似其先故曰不肖師錫帝曰有鰥在下曰虞舜師衆錫與也無妻曰鰥虞氏舜名在下民之中衆臣知舜聖賢恥己不若故不舉乃不獲巳而言之錫星歷反鰥故頑反虞舜虞氏舜名也馬云舜諡也舜死後賢臣録之臣子為諱故變名曰諡帝曰俞豫聞如何俞然也然其所舉言我亦聞之其德行如何俞羊朱反行下孟反下其行同重言帝曰俞十二本篇一舜典八大禹謨二益稷一如何三本篇皋陶謨益稷各一嶽曰瞽子父頑母嚚象傲無目曰瞽舜父有目不能分别好惡故時人謂之瞽配字曰瞍瞍無目之稱心不則德義之經為頑象舜弟之字傲慢不友言並惡瞽音古傲五報反瞍素后反稱尺證反又如字克諧以孝蒸蒸乂不格姦諧和蒸進也言能以至孝和諧頑嚚昏傲使進進以善自治不至於姦惡諧戶皆反蒸之承反姦古顔反帝曰我其試哉言欲試舜觀其行迹女于時觀厥刑于二女女妻刑法也堯於是以二女妻舜觀其法度接二女以治家觀治國女干尼據反妻千計反釐降二女于媯汭嬪于虞降下嬪婦也舜為匹夫能以義理下帝女之心於所居媯水之汭使行婦道於虞氏媯居危反汭如鋭反水之內也杜預注左傳云水之隈曲曰汭嬪毗人反帝曰欽哉歎舜能修己行敬以安人則其所能者大矣重言欽哉九本篇一舜典三益稷二大禹謨微子之命冏命各一舜典第二虞書孔氏傳虞舜側微為庶人故微賤堯聞之聰明將使嗣位歷試諸難嗣繼也試以治民之難事難乃丹反作舜典舜典典之義與堯同曰若稽古帝舜亦言其順考古道而行之重意若稽古四詳附堯典曰重華協于帝華謂文德言其光又重合於堯俱聖明曰若稽古帝舜曰重華協于帝此十二字是姚方興所上孔氏傳本無阮孝緒七録亦云然方興本此下更有濬哲文明溫恭允塞玄德升聞乃命以位凡二十八字異聊出之於王注無施也重意重華協于帝顧命宣重光濬哲文明溫恭允塞濬深哲智也舜有深智文明溫恭之德信允塞上下重意濬哲文明堯典欽明文思玄德升聞乃命以位玄謂幽潜潜行道德升聞天朝遂見徵用愼徽五典五典克從徽美也五典五常之教父義母慈兄友弟恭子孝舜愼美篤行斯道舉八元使布之於四方五教能從無違命徽許韋反王云美馬云善也從才容反八元左傳髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅恭懿宣慈惠和天下之民謂之八元重意愼徽五典五典克從皋陶謨勑我五典五悙哉納于百揆百揆時叙揆度也度百事揔百官納舜於此官舜舉八凱使揆度百事百事時叙無廢事業揆葵癸反凱開在反左傳髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八凱賔于四門四門穆穆穆穆美也四門四方之門舜流四凶族四方諸侯來朝者舜賔迎之皆有美德無凶人互注左文公十八年故虞書數舜之功曰愼徽五典五典克從無違教也曰納于百揆百揆時叙無廢事也曰賔于四門四門穆穆無凶人也納于大麓烈風雷雨弗迷麓録也納舜使大録萬機之政隂陽和風雨時各以其節不有迷錯愆伏明舜之德合於天麓音鹿王云録也馬鄭云山足也愆起䖍反帝曰格汝舜詢事考言乃言砥可績三載汝陟帝位格來詢謀乃汝砥致陟升也堯呼舜曰來汝所謀事我考汝言汝言致可以立功三年矣三載考績故命使升帝位將禪之詢音荀砥之履反玉云致也馬云定也本或作㕄非重意帝曰格汝舜大禹謨帝曰格汝禹重言乃言底可績二又見皋陶謨舜讓于德弗嗣辭讓於德不堪不能嗣成帝位正月上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯文德之祖廟正音政又音征王云文祖廟名馬云丈祖天也天為文萬物之祖故曰文祖重意正月上日受終于丈祖下文月正元日舜格于文祖大禹謨正月朔旦受命于神宗在璿璣玉衡以齊七政在察也璿美玉璣衡王者正天文之器可運轉者七政日月五星各異政舜察天文齊七政以審己當天心與否璿音旋肆類于上帝堯不聽舜讓使之攝位舜察天文考齊七政而當天心故行其事肆遂也類謂攝位事類遂以攝告天及五帝王云上帝天也馬云上帝太一神在紫微宫天之最尊者重言肆類于上帝二又泰誓上無肆字禋于六宗精意以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也祭亦以攝告禋音因王云潔祀也馬云精意以享也六宗王云四時寒暑日月星水旱也馬云天地四時也望于山川遍于羣神九州名山大川五嶽四瀆之屬皆一時望祭之羣神謂丘陵墳衍古之聖賢皆祭之墳扶云反衍音演重意望于山川下文望秩于山川輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯斂既盡覲見班還后君也舜斂公侯伯子男之瑞圭璧盡以正月中乃日日見四嶽及九州牧監還五瑞於諸侯與之正始輯徐音集王云合馬云斂也瑞垂僞反信也牧牧養之牧徐音目歲二月東巡守至于岱宗柴諸侯為天子守土故稱守巡行之既班瑞之明月乃順春東巡岱宗泰山為四嶽所宗燔柴祭天告至巡似遵反徐養純反守時救反本或作狩岱音代泰山也柴士皆反爾雅祭天曰燔柴馬云祭時積柴加牲其上而燔之行下孟反燔扶袁反又扶云反望秩于山川東嶽諸侯境內名山大川如其秩次望祭之謂五嶽牲禮視三公四瀆視諸侯其餘視伯子男瀆徒木反肆覲東后遂見東方之國君協時月正日同律度量衡合四時之氣節月之大小日之甲乙使齊一也律法制及尺丈斛斗斤兩皆均同同律王云同齊也律六律也馬云律法也鄭云隂吕陽律也度如字丈尺也量力尚反斗斛也衡稱也重意協時月正日堯典曆象日月星辰敬授人時修五禮五玉修吉凶賔軍嘉之禮五等諸侯執其玉三帛二生一死贄三帛諸侯丗子執纁公之孤執玄附庸之君執黃二生卿執羔大夫執鴈一死士執雉玉帛生死所以為贄以見之贄音至本又作摯纁許云反如五器卒乃復卒終復還也器謂圭璧如五器禮終則還之三帛生死則否復扶又反下同還音旋五月南巡守至于南嶽如岱禮南嶽衡山自東嶽南巡五月至八月西巡守至于西嶽如𥘉西嶽華山𥘉謂岱宗華胡化反華山在弘農十有一月朔巡守至于北嶽如西禮北嶽恆山有如字徐于救反如西禮方興本同馬本作如𥘉歸格于藝祖用特巡守四嶽然後歸告至文祖之廟藝文也言祖則考著特一牛藝魚丗反馬王云禰也重意歸格于藝祖下文舜格于文祖五載一巡守羣后四朝各㑹朝于方嶽之下凡四處故曰四朝將說敷奏之事故申言之堯舜同道舜攝則然堯又可知四朝馬王皆云四靣朝於方嶽之下鄭云四朝四季朝京師也朝直遙反注同重意五載一巡守周官又六年王乃時巡羣后四朝周官諸侯名朝于方嶽敷奏以言明試以功車服以庸敷陳奏進也諸侯四朝各使陳進治理之言明試其言以要其功功成則賜車服以表顯其能用敷音孚重言敷奏以言明試以功車服以庸二重見益稷奏字作納試字作庶肇十有二州肇始也禹治水之後舜分冀州為幽州并州分青州有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦杜預云即歡兜也帝鴻黃帝也竄三苗于三危三苗國名縉雲氏之後為諸侯號叨餮三危西裔竄七亂反三苗馬王云國名縉雲氏之後為諸侯蓋叨餮也左傳縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不念孤寡不恤窮匱天下之民以比三凶謂之叨餮杜預云縉雲黃帝時官名非帝子孫故以比三凶也貪財曰叨貪食曰餮縉音晉叨土刀反餮他節反殛鯀于羽山方命圯族績用不成殛竄放流皆誅也異其文述作之體羽山東裔在海中殛紀力反鯀故本反左傳顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲很明德以亂天常天下之民謂之檮杌杜預云即鯀也檮杌凶頑無儔匹之貌四罪而天下咸服皆服舜用刑當其罪故作者先敘典刑而連引四罪明皆徴用所行於此揔見之互注左文公十八年舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子二十有八載帝乃殂落殂落死也堯年十六即位七十載求禪試舜三載自正月上日至崩二十八載堯凡壽一百一十七歲殂才枯反百姓如喪考妣考妣父母言百官感德思慕喪如字又息浪反妣必禮反父曰考母曰妣三載四海遏密八音遏絶密靜也八音金石絲竹匏土革木四夷絶音三年則華夏可知言盛德恩化所及者逺遏安葛反或音謁八音謂金鐘也石磬也絲琴瑟也竹箎笛也匏笙也土塤也革鼓也木柷敔也匏白交反月正元日舜格于文祖月正正月元日上日也舜服堯喪三年畢將即政故復至文祖廟告復扶又反重意月正元日舜格于文祖篇首正月上日受終于文祖又歸格于藝祖又大禹謨正月朔旦受命于神宗詢于四嶽闢四門詢謀也謀政治于四嶽開闢四方之門未開者廣致衆賢闢婢亦反徐甫亦反明四目逹四聰廣視聽於四方使天下無壅塞重意明四目逹四聰太甲上視逺惟明聽德惟聰咨十有二牧曰食哉惟時咨亦謀也所重在於民食惟當敬授民時柔逺能邇悙德允元柔安邇近惇厚也元善之長言當安逺乃能安近厚行德信使足長善悙音敦長丁丈反下同重意柔逺能邇三本篇顧命文侯之命各一而難任人蠻夷率服任佞難拒也佞人斥逺之則忠信昭於四夷皆相率而來服難乃旦反任音壬又而鴆反舜曰咨四嶽有能奮庸熙帝之載奮起庸功載事也訪羣臣有能起發其功廣堯之事者言舜曰以別堯奮弗運反重言咨四嶽四下文一堯典二使宅百揆亮采惠疇亮信惠順也求其人使居百揆之官信立其功順其事者誰乎僉曰伯禹作司空四嶽同辭而對禹代鯀為崇伯入為天子司空治洪水有成功言可用之重言僉曰五堯典一本篇四帝曰俞咨禹汝平水土惟時懋哉然其所舉稱禹前功以命之懋勉也惟居是百揆勉行之俞以朱反懋音茂王云勉也馬云美也重言帝曰俞十二本篇八詳附堯典咨禹二重見大禹謨汝平水土吕刑禹平水土懋哉四本篇禹謨一皋陶謨二禹拜稽首讓于稷契暨皋陶居稷官者棄也契皋陶二臣名稽首首至地稽音啓稽首首至地臣事君之禮契息列反陶音遙帝曰俞汝往哉然其所推之賢不詐其讓勑使往宅百癸重言汝往哉二後見蔡仲之命帝曰棄黎民阻飢汝后稷播時百榖阻難播布也衆人之難在於飢汝后稷布種是百榖以濟之美其前功以勉之阻莊吕反王云難也播波左反重意汝后稷播時百榖吕刑稷降播種農殖嘉榖帝曰契百姓不親五品不遜五品謂五常遜順也汝作司徒敬敷五教在寬布五常之教務在寬所以得人心亦美其前功帝曰皋陶蠻夷猾夏寇賊姦宄猾亂也夏華夏羣行攻劫曰寇殺人曰賊在外曰姦在內曰宄言無教所致猾戶八反寇苦豆反宄音軌汝作士五刑有服士理官也五刑墨劓剕宫木辟服從也言得輕重之中正劓魚器反截鼻也剕扶味反刖足也大辟婢亦反死刑也重言汝作士二重見禹謨五服三就既從五刑謂服罪也行刑當就三處大罪於原野大夫於朝士於市處昌慮反朝直遙反五流有宅五宅三居謂不忍加刑則流放之若四凶者五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外惟明克允言皋陶能明信五刑施之逺近蠻夷猾夏使咸信服無敢犯者因禹讓三臣故歷述之帝曰疇若豫工僉曰垂哉問誰能順我百工事者朝臣舉垂垂臣名垂如字徐又音睡帝曰俞咨垂汝共工共謂供其職事共音恭垂拜稽首讓于殳斨暨伯與殳斨伯與二臣名斨七良反與音餘帝曰俞往哉汝諧汝能諧和此官重言往哉七本篇二盤庚微子康誥畢命文侯之命各一往哉汝諧二重見下文帝曰疇若豫上下草木鳥獸僉曰益哉上謂山下謂澤順謂施其政教取之有時用之有節言伯益能之益皋陶子也重意疇若豫上下草木鳥獸伊訓暨鳥獸魚鱉咸若帝曰俞咨益汝作朕虞虞掌山澤之官益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧朱虎熊羆二臣名垂益所讓四人皆在元凱之中羆彼皮反帝曰咨四嶽有能典朕三禮僉曰伯夷三禮天地人之禮伯夷臣名姜姓重言咨四嶽四堯典三本篇一帝曰俞咨伯汝作秩宗秩序宗尊也主郊廟之官夙夜惟寅直哉惟清夙早也言早夜敬思其職典禮施政教使正直而清明寅如字徐音夷伯拜稽首讓于夔龍夔龍二臣名夔求龜反帝曰俞往欽哉然其賢不許讓重言往欽哉三堯典本篇益稷各一帝曰夔命汝典樂教胄子胄長也謂元子以下至卿大夫子弟以歌詩蹈之舞之教長國子中和祗庸孝友胄直又反王云胄子國子也馬云胄長也教長天下之子弟直而溫寬而栗教之正直而溫和寬弘而能莊栗栗戰栗也重言直而溫寬而栗二重見皋陶謨剛而無虐簡而無傲剛失入虐簡失入傲教之以防其失重意剛而無虐簡而無傲皋陶謨簡而廉剛而塞詩言志歌永言謂詩言志以導之歌詠其義以長其言永徐音詠又如字聲依永律和聲聲謂五聲宫商角徴羽律謂六律六吕十二月之音氣言當依聲律以和樂八音克諧無相奪倫神人以和倫理也八音能諧理不錯奪則神人咸和命䕫使勉之夔曰於豫擊石拊石百獸率舞石磬也磬音之清者拊亦擊也舉清者和則其餘音皆從矣樂感百獸使相率而舞則神人和可知於如字或音烏而絶句者非拊音撫徐音府重言於豫擊石拊石百獸率舞二重見益稷帝曰龍朕堲讒說殄行震驚朕師堲疾殄絶震動也言我疾讒說絶君子之行而動驚我衆欲遏絶之堲徐在力反讒切韻仕咸反說如字注同徐失鋭反殄切韻徒典反行下孟反注同命汝作納言夙夜出納朕命惟允納言喉舌之官聽下言納於上受上言宣於下必以信喉音侯重意命汝作納言益稷以出納五言夙夜出納朕命說命朝夕納誨帝曰咨汝二十有二人禹垂益伯夷䕫龍六人新命有職四嶽十二牧凡二十二人特勑命之欽哉惟時亮天功各敬其職惟是乃能信立天下之功重言欽哉九本篇三益稷二堯典大禹謨微子之命囧命各一三載考績三考黜陟幽明三年有成故以考功九歲則能否幽明有别黜退其幽者升進其明者黜丑律反重意三考黜陟幽明周官王乃大明黜陟庶績咸熙分北三苗考績法明衆功皆廣三苗幽暗君臣善否分北流之不令相從善惡明北如字又音佩令力呈反重言庶績咸熙二前見堯典又皋陶謨庶績其凝舜生三十徴庸言其始見試用三十在位歷試二年攝位二十八年五十載陟方乃死方道也舜即位五十年升道南方巡守死於蒼梧之野而葬焉三十徵庸三十在位服喪三年其一在三十之數為天子五十年凡壽百一十二歲帝釐下土方設居方言舜理四方諸侯各設其官居其方釐力之反馬云賜也理也下土絶句一讀至方字絶句別生分類生姓也別其姓族分其類使相從别彼列反分方云反徐扶問反作汩作汩治作興也言其治民之功興故為汩作之篇亡汩音骨九共九篇槀飫槀勞飫賜也凡十一篇皆亡共音恭王已勇反法也馬同槀苦報反飫於庶反槀飫亦書篇名也汩作等十一篇同此序其文皆亡而序與百篇之序同編故存今馬鄭之徒百篇之序揔為一卷孔以各冠其篇首而亡篇之序即隨其次第居見存者之間衆家經文並盡此唯王注本下更有汩作九共故逸故亦作古監本纂圖重言重意互注點校尚書卷之一
